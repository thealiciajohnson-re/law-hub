      {t:'case', n:'Brown v. Kendall (Mass. 1850) — Seminar 7 origins note. Widely credited with firmly establishing the NEGLIGENCE principle in the United States and placing the BURDEN of proving the defendant\'s fault on the PLAINTIFF. Context Brown gave: negligence liability is of relatively recent origin; the negligence principle asserted itself in the mid-1800s, its rise tied to industrialization (requiring proof of fault made it harder to hold enterprise liable).'},
      {t:'case', n:'Roberts v. State of Louisiana (La. Ct. App. 1981) — PHYSICAL CONDITION (blindness) lead case. Mike Burson, the blind operator of a post-office concession stand, left his stand without his cane (relying on his facial/echo sense for short trips in the familiar building) and bumped 75-year-old Roberts, who fell and broke his hip. Held: for the State — a blind person must take the precautions a reasonable person would take IF BLIND, and Burson acted as a reasonably prudent blind person (mobility training, years in the building, a reasoned choice common among blind people). Quoting Prosser: it is inaccurate to say a blind man must use a GREATER degree of care — only the care a reasonable person would use if blind. The disability is one of the circumstances; it neither raises nor lowers the duty to act reasonably.'},
      {t:'case', n:'Creasy v. Rusk (Ind. 2000) — LEAD CASE on mental disability & duty (two parts). Lloyd Rusk, an Alzheimer\'s patient in a nursing home, kicked Carol Creasy, a certified nursing assistant, while she put him to bed. PART I (the general rule): adopting the Restatement, a person with a mental disability is generally held to the SAME reasonable-person standard as anyone else, without regard to his capacity to understand or control his actions. PART II (the outcome): but on these facts Rusk owed Creasy NO DUTY — she was a paid caregiver employed to encounter exactly these dangers, knew his violent history, and could take precautions. By analogy to the FIREMAN\'S RULE, paid caregivers assume the risks of their occupation (workers\' comp, not tort, covers the loss). Dissent (Dickson, J.): Part II can\'t be squared with Part I — the caregiver\'s superior knowledge goes to breach/comparative fault (a jury question), not to the existence of a duty.'},
      {t:'concept', n:'Creasy v. Rusk — FIVE policy rationales for holding the mentally disabled to a duty of reasonable care (memorize as a list): (1) LOSS ALLOCATION — between two innocents, the loss falls on the one who caused it; (2) INCENTIVE TO RESTRAIN — prompts those responsible for the disabled person to prevent harm; (3) NO FEIGNING — removes any inducement to fake a disability to escape liability; (4) ADMINISTRABILITY — avoids courts/juries measuring degrees of disability; (5) EQUAL PARTICIPATION — policy integrates the disabled, treating them as others are treated. The CAREGIVER EXCEPTION: for a paid caretaker these rationales drop away, so no duty is owed. Hypo (Brown): if Rusk had instead run over Creasy\'s foot with a wheelchair while recovering from back surgery, his PHYSICAL condition WOULD be relevant — judged as a reasonable person of like physical infirmity.'},
      {t:'case', n:'Dakter v. Cavallino (Wis. 2015) — SUPERIOR SKILL / the trade principle. A car driven by Dakter collided with a 65-foot semi driven by Cavallino, a commercially licensed driver of 31 years; the jury got a "truck driver" instruction (weigh the care a reasonable semi-truck driver would use) and found Cavallino 65% at fault. Held: affirmed — the instruction did NOT impose a heightened standard. Two principles: the SUPERIOR-KNOWLEDGE rule (an actor with special skill must USE it) and the TRADE/PROFESSION principle (one engaged in a trade must act as a reasonable member of that trade). Both are just CIRCUMSTANCES the jury weighs; neither raises the standard above ordinary care. (Superior skill supporting authority: Fredericks v. Castora — experienced trucker still held to the reasonable-person standard, not higher; Hill v. Sparks — one who has more than the minimum attention/skill/judgment must exercise the superior qualities he actually has.)'},
      {t:'case', n:'Robinson v. Lindsay (Wash. 1979) — CHILD standard, the ADULT-ACTIVITY / inherently-dangerous exception. 11-year-old Kelly Robinson lost the use of a thumb in a snowmobile accident; the 13-year-old driver had operated snowmobiles ~2 years on a 30-hp machine capable of 65 mph. Held: a minor operating a snowmobile is held to the ADULT standard. Washington frames the test as INHERENT DANGEROUSNESS (rather than merely "adult activity"), but either framing usually reaches the same result for motorized vehicles — it protects children\'s freedom to be children while discouraging immature operators of dangerous machines. Compare Dellwo v. Pearson (Minn.) — 12-year-old operating a motorboat held to the adult standard as an "adult activity." Q&A frame: adult activities = driving, boating, flying, handling guns; child activities = play, games, slides. (The ELDERLY get no special standard.)'},
      {t:'rule', n:'DEGREES OF NEGLIGENCE — there are none. Courts sometimes speak of a "highest duty of care" (e.g., common carriers toward passengers, or where great danger is involved), but that language makes little sense: the STANDARD never changes — the defendant must always act as a reasonable person under the circumstances. What changes is the AMOUNT of care reasonableness demands. Assembling a roller coaster still calls only for reasonable care, but because the gravity of harm is enormous, reasonable care requires great precaution. One flexible standard absorbs the danger of the activity: the standard stays static; the precautions scale with the circumstances.'}
    ,
      {t:'grade', n:'📝 GRADED ESSAY — Module 7 Essay Quiz (Score: 65/100). NOTE: despite Module 7 being "Negligence – General Duty of Care," this timed 100-pt essay tested INTENTIONAL TORTS. FACT PATTERN: David enters a room and sees Paul animatedly gesturing at Fran with a large antique knife; believing Paul is about to hurt Fran, David rushes at Paul with his fist raised, threatening to knock Paul to the ground. David swings his fist at Paul but strikes BEV (standing next to Paul) when Paul ducks and runs. Paul flees into a bathroom and locks it; David breaks the lock trying to force his way in but cannot open it, then leaves; Paul is trapped in the bathroom for OVER AN HOUR until a locksmith frees him. It turns out Paul (an antique-weapons collector) and Fran are friends and Paul was merely showing Fran an estate-sale purchase. CALLS: (1) What claims can Paul bring against David, and what defenses can David raise? (2) What claims can Bev bring against David, and what defenses?'},
      {t:'grade', n:'📝 Module 7 essay — the CLAIMS MAP (what the prompt was built to test): PAUL v. DAVID → (a) ASSAULT (fist raised + threat to knock Paul down = intent to cause, and Paul\'s reasonable apprehension of, an imminent harmful contact); (b) FALSE IMPRISONMENT (Paul trapped over an hour behind the lock David broke — intent to confine, confinement to a bounded area with no reasonable escape, and Paul\'s awareness/harm) — this is a SEPARATE claim, one of the two the prompt targets. NO battery on Paul (David swung but missed — Paul ducked — so no contact). BEV v. DAVID → BATTERY via TRANSFERRED INTENT (David intended to hit Paul; intent transfers Paul→Bev; David\'s swing caused a harmful contact with Bev). DAVID\'S DEFENSE → DEFENSE OF OTHERS (defending Fran), which requires analyzing David\'s MISTAKE (Paul was only showing an antique knife, not attacking) and the split on whether a REASONABLE mistake is allowed in defense of others.'},
      {t:'grade', n:'📝 Module 7 essay — PROFESSOR FEEDBACK & lessons (what cost points, 65/100): (1) ★ BIGGEST MISS = leaving FALSE IMPRISONMENT out as a standalone claim — "that missing major issue sets the ceiling." The bathroom sequence (trapped 1+ hour behind a lock David broke) was folded into the assault discussion instead of analyzed as its own FI claim; it raises the intent-to-confine question squarely and credit was available either way (resolve for liability OR against). ALWAYS analyze each distinct claim separately. (2) RULE-TERM precision: she wrote "voluntary act" — the term of art is "VOLITIONAL act"; on the exam the precise word earns the point. (3) DEFENSE OF OTHERS under-developed — the analysis only began ("Paul was going toward Fran") then broke off; it needed the MISTAKE (Paul was merely showing an antique knife) AND the split on whether a reasonable mistake is allowed, to earn its points. WHAT WENT WELL: Bev\'s battery was built out properly (transferred intent Paul→Bev, causation, harmful contact, David liable); the assault was thorough (intent, reasonable apprehension, imminence, and contact each given their own treatment for the raised fist and the threat to knock Paul down). TAKEAWAY: (i) spot and separately analyze EVERY claim — especially false imprisonment when someone is confined; (ii) use exact terms of art (volitional, not voluntary); (iii) fully develop defenses, including mistake and the majority/minority split.'}
    ]},
    { w:8, topic:'Negligence Per Se', tags:['negligence per se','statute','standard of care','Totsky','O\'Guin'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 6 (Negligence Per Se), plus the assigned statutes (see below).'},
      {t:'concept', n:'Negligence per se: when a defendant violates a statute meant to protect a class of persons from a type of harm, and the plaintiff is in that class and suffered that type of harm, the violation sets the standard of care (and often establishes breach) as a matter of law.'},
      {t:'rule', n:'Assigned statutes: Wisconsin Statute §346.46; North Carolina Statute §20-158 (stopping / school-bus statutes).'},
      {t:'case', n:'Totsky v. Riteway Bus Service (233 Wis.2d 371, Wis. 2000) — required case to brief (negligence per se).'},
      {t:'case', n:'O\'Guin v. Bingham County (142 Idaho 49, 2005) — required case: statutory violation as the standard of care; plaintiff must be in the protected class and harm of the type the statute guards against.'},
      {t:'exam', n:'Graded: Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'concept', n:'The negligence per se doctrine provides that in certain situations a criminal statute (or administrative regulation or municipal ordinance) may be used to set the standard of care in a negligence case, even though such statutes make no mention of civil liability and only impose fines or imprisonment. The rationale is that a court may justifiably adopt the determination of a representative body that, through a deliberative process, defined appropriate conduct, so a specific legislative standard replaces the general reasonable person standard.'},
      {t:'rule', n:'Not every criminal statute becomes the standard of care. The judge must first find the statute is specific enough to provide useful guidance (a law merely requiring drivers to \'use care and prudence\' would be rejected as adding nothing to the reasonable person standard), and the determination is wholly for the judge, investing the judge with great discretion.'},
      {t:'rule', n:'To adopt a statute as the standard of care, the judge must find two things: (1) the statute was designed to protect against the type of harm the plaintiff suffered (class-of-risks / type-of-harm test), and (2) the plaintiff falls within the class of persons the statute was designed to protect (class-of-persons test). Restatement (Third) §14 states an actor is negligent if, without excuse, the actor violates a statute designed to protect against the type of accident the conduct causes and the victim is within the class of persons the statute is designed to protect.'},
      {t:'case', n:'Gorris v. Scott illustrates the type-of-harm requirement: the plaintiff\'s livestock washed overboard from a ship, and he tried to use a Contagious Diseases Act provision requiring animals be kept in pens. The court refused to apply the statute as the standard of care because its purpose was to prevent the spread of disease, not to prevent the animals from drowning.'},
      {t:'concept', n:'\'Key-in-the-ignition\' statutes are a classic example of ambiguous statutory purpose: courts split on whether such laws are designed to deter theft and conserve police resources, or to protect the public from injury caused by stolen cars. This ambiguity, and uncertainty over whether an unauthorized user (like a joyriding thief) falls in the protected class, gives judges enormous leeway on both the type-of-harm and class-of-persons questions.'},
      {t:'case', n:'Most courts refuse to apply negligence per se to licensing statutes (e.g., driving without a valid license or practicing medicine without a license). Because licensing statutes are meant to protect the public from those lacking requisite skill, the plaintiff must prove the defendant\'s actual lack of due care or ability rather than relying on the bare licensing violation, as shown in Brown v. Shyne.'},
      {t:'rule', n:'If the judge does NOT adopt the statute (because it does not fit the plaintiff, the harm, or is otherwise inappropriate), the plaintiff\'s claim is not foreclosed; the case simply proceeds under the ordinary reasonably prudent person standard, and the rejected statute may sometimes still be admissible as relevant evidence of unreasonableness.'},
      {t:'rule', n:'MAJORITY rule (negligence per se): once the judge adopts the statute, it replaces the reasonably prudent person standard, and an unexcused violation of the statute IS breach of duty; the jury\'s role shrinks to merely finding whether the statute was violated. A small MINORITY of jurisdictions treat the statute as merely evidence the jury may consider in deciding whether the defendant acted reasonably, with no effect on the standard of care itself.'},
      {t:'exam', n:'Even where a statutory violation establishes breach under negligence per se, the plaintiff does NOT automatically recover. She must still prove the remaining elements: cause-in-fact, proximate cause, and damages. For example, P must show that the injury would not likely have occurred had D used headlights as the statute required.'},
      {t:'rule', n:'Modern courts recognize excused statutory violations, and an excused violation means the statute no longer affects the outcome. Acceptable excuses (Restatement (Second) §288A) include: a sudden emergency not of the actor\'s making; that compliance would involve greater danger than violation; that the actor neither knows nor should know of the occasion for compliance; an incapacity making the violation reasonable; or inability to comply after reasonable efforts. Typically the judge decides whether the excuse is legally appropriate and the jury resolves factual disputes.'},
      {t:'case', n:'Tedla v. Ellman illustrates judicial creativity to avoid harsh per se results: a pedestrian walked with his back to traffic, violating a statute requiring pedestrians to face oncoming traffic, but complying would have been more dangerous under the circumstances. The court characterized the statute as a flexible \'rule of the road\' whose violation was not negligence per se.'},
      {t:'rule', n:'Negligence per se and children: most jurisdictions hold the more flexible child standard of care (comparing the child to others of like age, intelligence, maturity, and experience) prevails over a statutory standard, so the violation is only relevant evidence of breach. However, if the child is engaged in an adult activity, the child standard no longer applies and negligence per se becomes central.'},
      {t:'rule', n:'Compliance with a statute is NOT conclusive of due care; it is merely relevant evidence of reasonableness. A statute sets only a minimum standard, and the reasonable person may be required to exceed it, so a defendant who complied with a statute or regulation (e.g., a drug maker\'s mandated warning) may still be found negligent if a jury concludes a reasonable person would have taken additional precautions.'},
      {t:'concept', n:'Criticisms of negligence per se: (1) it imports criminal statutes (often strict-liability offenses carrying only a modest fine and lacking criminal safeguards like an elevated burden of proof) into tort, where the consequences are enormous because the defendant is liable for all harm proximately caused; (2) it greatly constricts the jury\'s traditional role in deciding breach while investing the trial judge with broad discretion; and (3) it arguably encroaches on the legislature\'s domain by presuming an intent to create civil liability the legislature did not actually express.'}
    ,
      {t:'concept', n:'Seminar 8 framing (Prof. Brown) — breach can be proved THREE ways: (1) NEGLIGENCE PER SE (an unexcused statutory violation sets the standard = tonight); (2) UNREASONABLE CONDUCT (failing to act as a reasonably prudent person — the default); (3) RES IPSA LOQUITUR (the nature of the accident itself permits an inference of negligence). Per se fixes DUTY and BREACH only; the plaintiff still must prove causation and damages. Rationale (the better view): a representative body, through a deliberative process, defined appropriate conduct for a specific context, and the court ADOPTS that standard — as Traynor put it, a legislative standard becomes the civil standard \'only because the court accepts it\' (Clinkscales v. Carver).'},
      {t:'concept', n:'The judge GATEKEEPS via two questions (great judicial discretion): (1) SCOPE — does the law govern the activity the defendant was engaged in AND protect the class the plaintiff belongs to? A precise command (headlights after dusk) gives concrete guidance a court can adopt; a vague command (\'use care and prudence\') adds nothing and falls outside the doctrine. (2) PRIVILEGE/EXCUSE — even a violation within scope is not negligence if privileged or excused. Scope opens the door; a privilege can still close it.'},
      {t:'rule', n:'THREE approaches to what a violation establishes (strongest → weakest): (1) NEGLIGENCE PER SE (MAJORITY) — the unexcused violation CONCLUSIVELY establishes breach; the jury only decides whether the statute was violated; (2) REBUTTABLE PRESUMPTION (some courts) — the violation creates a PRESUMPTION of negligence the defendant may rebut with evidence of reasonable conduct or a recognized excuse; (3) EVIDENCE ONLY (MINORITY) — the violation is merely some evidence the jury may weigh, and does NOT change the standard of care. Under every approach the plaintiff must still prove causation and damages, and a privilege/excuse can still defeat the claim.'},
      {t:'case', n:'O\'Guin v. Bingham County (142 Idaho 49, 2005) — required brief. FACTS: two O\'Guin children, walking home from a lunch program, entered a closed, unattended county landfill across an unfenced boundary; a pit wall collapsed and killed them. A prior appeal fixed their status as TRESPASSERS (owed only a duty against willful/wanton conduct, which wasn\'t alleged). ISSUE: did the county\'s violation of solid-waste access regulations constitute negligence per se, replacing the limited trespasser duty with a statutory standard? RULE (Idaho\'s FOUR elements): a statute replaces the common-law duty when (1) it clearly defines the required standard of conduct; (2) it was intended to prevent the type of harm caused; (3) the plaintiff is in the protected class; and (4) the violation proximately caused the injury. HOLDING: the access rules (fence/block the site when unattended — \'unauthorized vehicles and persons shall be prohibited access\') were violated; the deaths were the right type of harm and the children, as unauthorized entrants, were in the protected class → negligence per se, and the statutory duty SUPPLANTED the willful-or-wanton trespasser standard. Proximate cause remained a fact question. Summary judgment vacated and remanded.'},
      {t:'concept', n:'O\'Guin — the contested element was INTERPRETIVE: how broadly does the statute\'s purpose of protecting \'human health\' reach? MAJORITY read \'health\' broadly to include physical injury and death from uncontrolled access (guidance materials list injury/death among landfill hazards → a safety purpose), rejecting the county\'s view that the rules target only illegal dumping. DISSENT read \'health\' narrowly as freedom from DISEASE, so the crushing deaths were not the type of harm addressed and per se should not apply. Lesson: the type-of-harm question often turns on how the court frames statutory purpose.'},
      {t:'case', n:'Totsky v. Riteway Bus Service (233 Wis.2d 371, Wis. 2000) — required brief (per se, then EXCUSED). FACTS: on an icy morning a Riteway school bus braked for a stop sign, skidded on ice that looked merely wet, and slid through the intersection into Totsky\'s car on an uncontrolled arterial; the driver was below a reasonable speed for conditions. Statute: Wis. Stat. §346.46(1) (stop and yield). ISSUE: was the violation negligence per se, and could the emergency doctrine excuse it? RULE: a safety statute\'s violation is negligence per se where it was meant to prevent the harm inflicted, the plaintiff is in the protected class, and the legislature intended civil liability; but an emergency the actor did NOT create, leaving too little time for a deliberate choice, can EXCUSE the violation. HOLDING: §346.46(1) is a safety statute and Totsky (on the arterial) was in the protected class → negligence per se; BUT because the ice looked only wet and the bus was at a reasonable speed, the driver did not create the emergency, and whether she had time for a deliberate choice was a JURY question. Directing a verdict for the Totskys was error; court of appeals affirmed.'},
      {t:'rule', n:'LEGISLATIVE INTENT CONTROLS — two stop-sign statutes, opposite results (a key Seminar 8 takeaway): (1) WISCONSIN §346.46(1) is silent on civil liability, but the court IMPLIED that intent from the statute\'s clear concern for highway-user safety → violation IS negligence per se (subject to excuse), as in Totsky. (2) NORTH CAROLINA §20-158(d) expressly provides that a failure to stop shall NOT be \'negligence or contributory negligence per se\' (though the facts may be weighed as evidence of reasonableness) → the legislature OPTED OUT, so no per se. Same command, opposite results, because the legislatures expressed different intentions about civil liability.'},
      {t:'concept', n:'Children — negligence vs. intentional torts (a standard-of-care contrast). In NEGLIGENCE the flexible CHILD standard usually governs (judged against a child of like age/intelligence/experience), so a statutory violation does not automatically bind the child — it is only evidence of breach — UNLESS the child is engaged in an adult/inherently dangerous activity (Robinson v. Lindsay — snowmobile), where the adult standard applies and negligence per se can too. But for INTENTIONAL torts, minority is generally NO shield: there is no \'reasonable child\' gloss on intent — a child who acts with the requisite intent (desire, or substantial certainty of the contact) is liable like anyone else (Garratt v. Dailey — 5-year-old liable for battery if he knew with substantial certainty pulling the chair would cause the contact).'}
    ]},
    { w:9, topic:'Negligence — Breach of Duty', tags:['breach','reasonable person','Hand formula','risk-utility','Carroll Towing','custom'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 4 (Negligence – Breach of Duty).'},
      {t:'concept', n:'Breach of duty: whether the defendant\'s conduct fell below the standard of care of a reasonably prudent person, often analyzed by balancing the burden of precautions against the probability and gravity of the harm.'},
      {t:'case', n:'United States v. Carroll Towing Co. (159 F.2d 169, 2d Cir. 1947) — Judge Learned Hand\'s formula: a party is negligent if the Burden of adequate precautions (B) is less than the Probability of harm (P) times the gravity of the Loss (L): B < P × L.'},
      {t:'case', n:'Trimarco v. Klein (56 N.Y.2d 98, 1982) — optional (recommended): custom or common industry practice is evidence of the standard of care, but is not conclusive.'},
      {t:'case', n:'Pipher v. Parsell (930 A.2d 890, Del. 2007) — required case to brief (driver\'s duty regarding foreseeable passenger conduct).'},
      {t:'case', n:'Indiana Consolidated Insurance Co. v. Mathew (402 N.E.2d 1000, Ind. Ct. App. 1980) — required case to brief (reasonableness of conduct).'},
      {t:'exam', n:'Graded: Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'rule', n:'Breach of duty is the defendant\'s failure to meet the standard of care - in most negligence cases, the failure to act as a reasonable, prudent person would under the same or similar circumstances.'},
      {t:'rule', n:'Under Judge Learned Hand\'s risk-utility formula, articulated in United States v. Carroll Towing Co., conduct is unreasonable (a breach) where the burden of avoiding the harm is less than the probability of the harm multiplied by its likely magnitude: B < P x L.'},
      {t:'concept', n:'The Hand formula\'s three variables are probability (P) - the likelihood of the harm-causing event; magnitude/injury (L) - the likely (not most or least severe) harm if it occurs; and burden (B) - the cost or interest sacrificed to avoid the risk, which Hand also called \'the value of the interest to be sacrificed.\''},
      {t:'case', n:'In United States v. Carroll Towing Co. (2d Cir. 1947), Judge Hand affirmed a finding of contributory negligence against the plaintiff\'s absent bargee, reasoning that the probability of the barge breaking loose was high in the busy harbor, the potential loss was significant, and the burden of having an attendant aboard during working hours was minor.'},
      {t:'rule', n:'Because the Hand factors are relative, the more serious the potential injury, the smaller the probability of harm needed to find a breach - so a tiny likelihood of harm will not preclude liability where the conduct risks enormous harm such as death.'},
      {t:'concept', n:'The focus of the magnitude inquiry is the likely foreseeable harm, not the actual harm that happened; conduct is not made reasonable merely because the plaintiff fortuitously suffered minor injury, nor unreasonable merely because the plaintiff happened to suffer great harm.'},
      {t:'concept', n:'A reasonable defendant need not take all possible measures to eliminate all risk; because nearly every activity creates some risk, liability is typically imposed only where there are reasonable, cost-effective means to make the activity safer, weighed against the activity\'s social value.'},
      {t:'rule', n:'Deviation from a well-established custom (one widespread enough that the defendant knew or should have known of it) is admissible and often powerful evidence of breach, but it does not itself establish breach or alter the standard of care - the defendant is still judged as a reasonable person.'},
      {t:'rule', n:'Compliance with custom is admissible as evidence of due care but is likewise not conclusive; a jury remains free to find \'customary negligence,\' deciding that the entire custom itself is unreasonable.'},
      {t:'case', n:'In The T.J. Hooper (2d Cir. 1932), Judge Hand held custom is never the legal measure of reasonable prudence, explaining that \'a whole calling may have unduly lagged in the adoption of new and available devices\' and that \'courts must in the end say what is required\' - some precautions are so imperative that even their universal disregard will not excuse their omission.'},
      {t:'concept', n:'Custom evidence relates to the Hand factors: a custom suggests both that the harm was probable (the industry developed the practice to guard against that very risk) and that taking the precaution was not too burdensome, so the plaintiff must show the harm the custom guards against is the same harm she suffered.'},
      {t:'exam', n:'While the jury ordinarily decides reasonableness, a judge may take breach from the jury only where no reasonable minds could differ; Holmes\' attempt in B&O Railroad v. Goodman to set a fixed judge-made standard was rejected by Cardozo in Pokora v. Wabash Railway, so courts now rarely impose fixed standards of reasonableness.'}
    ]},
    { w:10, topic:'Negligence — Proof of Breach & Res Ipsa Loquitur', tags:['res ipsa loquitur','proof of breach','circumstantial evidence','exclusive control'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 5 (Negligence – Proof of Breach & Res Ipsa Loquitur).'},
      {t:'concept', n:'Res ipsa loquitur (\'the thing speaks for itself\') allows breach to be proved circumstantially when: (1) the harm ordinarily does not occur without negligence, (2) it was caused by an instrumentality within the defendant\'s exclusive control, and (3) the plaintiff did not contribute to it.'},
      {t:'case', n:'Koch v. Norris Public Power District (632 N.W.2d 391, Neb. Ct. App. 2001) — required case (circumstantial proof / res ipsa).'},
      {t:'case', n:'Cosgrove v. Commonwealth Edison Co. (734 N.E.2d 155, Ill. App. Ct. 2000) — required case to brief.'},
      {t:'case', n:'Giles v. City of New Haven (636 A.2d 1335, Conn. 1994) — required case (exclusive-control element).'},
      {t:'case', n:'Novak Heating & Air Conditioning v. Carrier Corp. (622 N.W.2d 495, Iowa 2001) — required case to brief.'},
      {t:'case', n:'Collins v. Superior Air-Ground Ambulance Service (789 N.E.2d 394, Ill. App. Ct. 2003) — required case (res ipsa with multiple potential defendants).'},
      {t:'exam', n:'Graded: Resource Quiz (10 pts); Module Quiz (20 pts, 30 min timed); Seminar (2 pts).'}
    ,
      {t:'concept', n:'Breach may be proved by direct evidence (which establishes the fact without inference) or, far more commonly, by circumstantial evidence - proof of one fact from which the existence of another fact (the defendant\'s unreasonable conduct) may reasonably be inferred.'},
      {t:'concept', n:'Res ipsa loquitur (\'the thing speaks for itself\') is a special form of circumstantial evidence: unlike ordinary circumstantial evidence, the plaintiff need not identify the specific unreasonable act, and the jury may infer breach from the mere fact that the accident occurred together with the defendant\'s connection to it.'},
      {t:'rule', n:'The traditional elements of res ipsa loquitur are: (1) the accident is of a kind that normally does not happen without negligence; (2) it was caused by an instrumentality within the defendant\'s exclusive control; and (3) it was not due to any voluntary action or contribution by the plaintiff - each shown by a preponderance of the evidence.'},
      {t:'case', n:'Byrne v. Boadle (1863), where a barrel of flour fell from the defendant\'s warehouse onto the plaintiff, is credited with introducing res ipsa loquitur; Chief Baron Pollock reasoned that a barrel could not roll out without some negligence and that requiring the plaintiff to call warehouse witnesses to prove it would be \'preposterous.\''},
      {t:'rule', n:'For the \'probably negligence\' element, the plaintiff need not eliminate every possible non-negligent cause, and the defendant\'s offering of alternative causes does not defeat the doctrine; it is enough that a reasonable jury could find negligence was the likely cause.'},
      {t:'concept', n:'The \'exclusive control\' element has been widely liberalized; modern courts and the Restatement require only that the plaintiff show the defendant was probably the responsible party (e.g., that the manufacturer, retailer, and consumer were probably not), and the Second Restatement states that \'exclusive control is not essential to a res ipsa loquitur case.\''},
      {t:'exam', n:'Even with liberalization, the control/responsibility element can be fatal - res ipsa was denied to a plaintiff who slipped on a banana peel in a store and to a pedestrian struck by a chair thrown from a hotel window, because the defendant lacked control over the harm-causing instrumentality.'},
      {t:'case', n:'In Ybarra v. Spangard, the California Supreme Court allowed an unconscious appendectomy patient with an unexplained shoulder injury to invoke res ipsa loquitur against all the doctors and nurses who had control over his body or the instrumentalities, shifting to each defendant the burden of explaining their conduct.'},
      {t:'concept', n:'Ybarra is controversial because it relaxed the usual rule that a plaintiff must identify the specific culpable defendant; the court was influenced by the patient\'s helplessness (the defendants rendered him unconscious), their acting as a team, and the value of res ipsa in \'smoking out\' evidence - but courts are unlikely to extend it much beyond its facts.'},
      {t:'rule', n:'In most jurisdictions res ipsa loquitur creates only a permissible inference, not a presumption: it does not shift the burden of proof, but lets the case reach the jury, which may then choose whether to infer that the defendant was more likely than not at fault.'},
      {t:'concept', n:'A key rationale for res ipsa is the defendant\'s superior knowledge of how the harm occurred, though most courts and the Restatement do not require superior knowledge as a prerequisite; some courts will deny the doctrine where the plaintiff could have investigated the cause and failed to do so.'}
    ,
      {t:'rule', n:'Week 10 presentation — BURDEN & TWO KINDS OF EVIDENCE. The plaintiff bears the burden of proving each negligence element (duty, breach, actual cause, proximate cause, damages) by a PREPONDERANCE of the evidence (more likely than not the defendant did not act as a reasonable person would). To prove BREACH she may use: (1) DIRECT evidence — evidence that addresses the issue without inference (an eyewitness who saw/heard/recorded the act); or (2) CIRCUMSTANTIAL / INDIRECT evidence — proof of other facts from which the fact-finder may INFER unreasonableness. Ex: no witness to a car crash, but long skid marks (→ high speed) and the force of impact let the jury infer the driver sped or ran the stop sign.'},
      {t:'rule', n:'RES IPSA LOQUITUR (\'the thing speaks for itself\') — Prof. Brown\'s framing. A special form of CIRCUMSTANTIAL evidence, used ONLY when there is NO direct evidence of the breach. It lets the jury INFER breach (the jury may accept OR reject the inference) from the fact that harm occurred plus the defendant\'s connection to it. Three requirements the plaintiff must show: (1) the incident is one that ORDINARILY would not happen without negligence; (2) the defendant was RESPONSIBLE FOR / in control of whatever caused the harm; and (3) the injury happened IRRESPECTIVE of any action by the plaintiff. (Some courts state it as two requirements, folding the third into the first two.)'},
      {t:'exam', n:'Classic res ipsa example (presentation): Paul has his gallbladder removed; a later procedure finds a SURGICAL CLAMP left inside him. He has no direct evidence of who left it or how, but: this kind of harm ordinarily doesn\'t happen without negligence (a reasonable surgeon removes clamps), the clamp was in the surgical team\'s control, and Paul (unconscious) did nothing to cause it. → Res ipsa applies; the jury may infer breach. (Left-in surgical instruments are the textbook res ipsa fact pattern.)'},
      {t:'case', n:'Cosgrove v. Commonwealth Edison Co. (Ill. App. 2000) — TWO defendants, SPLIT result on element 1. A fire started when a downed power line sparked AND a buried gas line leaked. POWER-LINE defendant: a downed line is NOT ordinarily caused only by negligence — wind, lightning, a storm, or an animal could cause it, and it was a STORMY night → element 1 not met, res ipsa does NOT apply. GAS-LINE defendant: a ruptured gas line does not ordinarily occur without negligence AND the line was in that defendant\'s control → res ipsa DOES apply. Lesson: run element 1 separately for each defendant/instrumentality.'},
      {t:'case', n:'Koch v. Norris Public Power District (Neb. App. 2001) — contrast with Cosgrove. A power line broke, fell, and started a fire causing considerable property damage. Res ipsa DID apply: power lines should be built and maintained so they do NOT fall absent the intervention of nature or a person, so an unexplained fall implies negligent construction/maintenance. The different result from Cosgrove turned on the WEATHER: Cosgrove = a stormy night (an obvious non-negligent cause), while Koch = a sunny (though windy) day, and the court found it was NOT windy enough to down the line → negligence was the most likely explanation.'},
      {t:'case', n:'Giles v. City of New Haven (Conn. 1994) — the 2nd & 3rd elements. An elevator operator was injured when the elevator shuddered; she reversed it and jumped out. Holding: (2) the plaintiff need NOT show the defendant had EXCLUSIVE control or eliminate all other possible causes — only that the defendant was RESPONSIBLE for the specific instrumentality (control/management is just one way to show responsibility); and (3) the plaintiff\'s own USE of the item does NOT preclude res ipsa. The point of res ipsa is to decide whether the defendant\'s negligence is the most plausible explanation for the injury.'},
      {t:'concept', n:'COMPARATIVE FAULT / COMPARATIVE NEGLIGENCE (raised in Giles; covered fully later): where the plaintiff is PARTLY to blame for her own injury, her recovery is REDUCED by her percentage of fault (ex: the McDonald\'s hot-coffee case — damages reduced because the plaintiff was partly at fault for the spill). In Giles the defendant argued the plaintiff\'s possible fault should DEFEAT res ipsa; the court REJECTED that — res ipsa still applies, and if the plaintiff is partly to blame her recovery is simply reduced under comparative fault (it does not bar the inference).'},
      {t:'rule', n:'MULTIPLE DEFENDANTS / who controlled the instrumentality: the general rule is that res ipsa is NOT available where defendants had CONSECUTIVE (sequential) control, but IS available where there was SHARED control/responsibility or uncertainty about who controlled it when. Novak Heating & Air Conditioning v. Carrier Corp. (Iowa 2001): NO res ipsa against multiple defendants for damage to an HVAC unit because they controlled it at DIFFERENT times (consecutive control). Collins v. Superior Air-Ground Ambulance Service (Ill. App. 2003): res ipsa DID apply against both an ambulance company and a hospital where an injury occurred at some point while the plaintiff was under the control of one or both — shared/uncertain control was enough. (Cf. Ybarra v. Spangard — team of medical providers over an unconscious patient.)'}
    ]},
    { w:11, topic:'Negligence — Actual Cause', tags:['actual cause','but-for','alternative liability','market share','Summers v. Tice','Sindell'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 11 and §§13.01–13.02 of Chapter 13 (Negligence – Actual Cause).'},
      {t:'concept', n:'Actual cause (cause in fact): usually the \'but-for\' test — the harm would not have happened but for the defendant\'s conduct. Special doctrines address multiple or uncertain causes.'},
      {t:'case', n:'Summers v. Tice (199 P.2d 1, Cal. 1948) — alternative liability: where two negligent defendants could each have caused the harm but only one did, the burden shifts to each to prove they did not cause it.'},
      {t:'case', n:'Sindell v. Abbott Laboratories (607 P.2d 924, Cal. 1980) — market-share liability: where the plaintiff cannot identify which manufacturer (DES) caused the harm, liability may be apportioned by each defendant\'s share of the market.'},
      {t:'case', n:'Right v. Breen (890 A.2d 1287, Conn. 2006) — required case to brief (causation / damages).'},
      {t:'case', n:'Hale v. Ostrow (166 S.W.3d 713, Tenn. 2005) — required case (but-for causation).'},
      {t:'exam', n:'Graded: Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'rule', n:'Cause-in-fact requires the plaintiff prove by a preponderance of the evidence that, more likely than not, the defendant\'s culpable conduct was a but-for cause of the injury: but for the defendant\'s conduct, the plaintiff would not have been injured.'},
      {t:'concept', n:'But-for analysis is hypothetical and abstract: A\'s negligence is not a but-for cause if the same outcome would have occurred even absent the negligence, so a speeding driver who would have hit the plaintiff at a lawful speed is generally not a but-for cause of the collision.'},
      {t:'rule', n:'There can be more than one but-for cause of a single injury; where separate negligent acts combine to produce one injury and any actor could have avoided it by reasonable care, each is a but-for cause (e.g., a negligent bus driver, crossing guard, and train engineer).'},
      {t:'rule', n:'The substantial factor test supplements the but-for test where redundant multiple causes would otherwise preclude liability; it asks only whether the defendant materially contributed to the injury.'},
      {t:'case', n:'In the classic two-fires scenario (e.g., Anderson v. Minneapolis), two independently sufficient fires merge to destroy a house, so neither is a but-for cause; courts apply the substantial factor test to hold each defendant liable rather than let both escape.'},
      {t:'concept', n:'The Third Restatement abandons substantial factor language as confusing and misused, returning to a but-for test for actual causation while still affirming liability for two or more redundant (independently sufficient) causes.'},
      {t:'case', n:'Summers v. Tice: two hunters negligently fired toward the plaintiff and one pellet struck his eye, but he could not prove which hunter caused it; the court shifted the burden of causation to each defendant to prove he was not the cause, holding both liable as joint tortfeasors if neither could exculpate himself.'},
      {t:'rule', n:'Alternative liability under Summers v. Tice applies where a small number of defendants engaged in substantially simultaneous culpable conduct imposing similar risks; the plaintiff must still prove each defendant breached a duty, and courts generally require all wrongdoers be joined as defendants.'},
      {t:'case', n:'Sindell v. Abbott Laboratories: where DES daughters could not identify which manufacturer\'s drug their mothers took, the court adopted market-share liability, requiring plaintiffs to join enough manufacturers to represent a substantial share of the market and holding each liable for its percentage of the market unless it could disprove supplying the drug.'},
      {t:'concept', n:'Under market-share liability each defendant pays damages proportional to its share of the market (e.g., a maker with 15% of the DES market pays 15% of each plaintiff\'s damages); California treats this liability as several only, and most courts have declined to extend market-share theory beyond DES.'},
      {t:'case', n:'Herskovitz v. Group Health: a physician\'s malpractice reduced a patient\'s already-below-50% survival chance from 39% to 25%; the court let the jury find that this reduction of the chance of survival was a substantial factor in death, relaxing the requirement of proof of but-for causation. The modern loss-of-chance approach instead treats the lost substantial chance as a compensable injury valued as a percentage of a wrongful-death recovery.'},
      {t:'rule', n:'Joint and several liability (where retained): where two or more tortfeasors cause a single indivisible injury, each is liable for the entire harm, so the plaintiff may collect the full judgment from any one of them; that defendant may then seek contribution from the others according to their share of fault. Many states have modified or abolished this rule by statute in favor of several (proportionate) liability.'}
    ,
      {t:'case', n:'Right v. Breen (Conn. 2006) — Week 11 required case, but-for causation. The plaintiff claimed injuries from a car accident, but it turned out her injuries came from a PRIOR accident; the jury found she did NOT establish that THIS accident was the actual (but-for) cause of her injuries, so it found for the defendant. Note the flip side: a plaintiff CAN recover where a pre-existing injury is AGGRAVATED/made worse by a later accident — the defendant is liable for the aggravation — but here the plaintiff didn\'t prove that happened. Lesson: the plaintiff must prove, by a preponderance, that this defendant\'s conduct was a but-for cause of the harm claimed.'},
      {t:'case', n:'Hale v. Ostrow (Tenn. 2005) — Week 11 required case, MULTIPLE but-for causes. The plaintiff, forced off a sidewalk by overgrown BUSHES blocking the path, looked toward traffic, then tripped on a CRUMBLED sidewalk and fell. She sued both the sidewalk owner and the bush owner; the bush owner argued the sidewalk (not his bushes) caused the injury. Held: it was for the JURY to decide whether, but for the bushes, she would have been hurt — she argued she would not have had to look away but for the bushes, and would not have tripped but for looking away. Illustrates that a single injury can have MORE THAN ONE but-for cause, and if each is a but-for cause, each defendant can be liable.'},
      {t:'concept', n:'Key distinction — combined-necessary causes vs. redundant sufficient causes (use the right test). In Hale v. Ostrow the two causes (bushes + crumbled sidewalk) were each NECESSARY — remove either and the plaintiff might not have been hurt — so the ordinary BUT-FOR test works and each is a but-for cause. Contrast the two-fires case (A burns the left side, C the right; each fire alone would destroy the house): the causes are REDUNDANT / independently sufficient, so but-for fails for each (the house burns anyway) and courts switch to the SUBSTANTIAL FACTOR test to avoid letting both escape.'},
      {t:'rule', n:'JOINT TORTFEASORS — three ways two or more defendants are jointly responsible: (1) ACTING IN CONCERT — one intentionally aids or encourages another to commit the tort (e.g., Dave eggs Dan on to speed/run a stop sign) → both liable; (2) ACTING INDEPENDENTLY but causing the SAME (indivisible) injury — like the two-fires case, or two negligent drivers who collide and injure a passenger — no agreement needed; (3) VICARIOUS LIABILITY — one defendant is liable for another\'s tort because of a control/responsibility relationship.'},
      {t:'rule', n:'VICARIOUS LIABILITY / RESPONDEAT SUPERIOR: an employer is liable for the negligent acts of its employee committed within the SCOPE OF EMPLOYMENT, even if the employer neither knew of nor directed the specific act. Ex: Dave, delivering a cake for Dan\'s Bakery, negligently passes a truck and runs Paul off the road — Dave is the actual cause, but Dan (the employer) is VICARIOUSLY liable because Dave was acting within the scope of his employment. (Vicarious liability is a way one becomes a joint tortfeasor without personally doing the negligent act.)'},
      {t:'concept', n:'INDEMNIFICATION & CONTRIBUTION (allocating a paid judgment among joint tortfeasors). Because joint & several liability can make the deepest-pocket defendant pay a large or full share, a defendant who pays may recover from the others: CONTRIBUTION = recovering the OTHERS\' proportionate share of fault; INDEMNIFICATION = shifting the ENTIRE loss to another party (e.g., an employer held vicariously liable indemnifying itself from the actually-negligent employee). Some states limit joint & several liability by statute. (Covered further with Damages.)'}
    ]},
    { w:12, topic:'Negligence — Proximate Cause', tags:['proximate cause','foreseeability','zone of danger','Palsgraf'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 12 (Negligence – Proximate Cause).'},
      {t:'concept', n:'Proximate (legal) cause limits liability to harms that are a foreseeable result of the defendant\'s conduct, cutting off liability for far-fetched or unforeseeable consequences.'},
      {t:'case', n:'Palsgraf v. Long Island R. Co. (162 N.E. 99, N.Y. 1928) — Cardozo (majority): duty and proximate cause extend only to plaintiffs within the foreseeable zone of danger. Andrews (dissent): duty is owed to the world, and proximate cause turns on direct consequences.'},
      {t:'case', n:'Osborne v. Atlantic Ice & Coal Co. (177 S.E. 796, N.C. 1935) — required case to brief.'},
      {t:'case', n:'Abrams v. City of Chicago (811 N.E.2d 670, Ill. 2004) — required case (foreseeability limits on proximate cause).'},
      {t:'case', n:'Hart v. Curry (78 S.E.2d 170, N.C. 1953) — required case to brief.'},
      {t:'exam', n:'Graded: Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'rule', n:'Even after actual cause is proven, the plaintiff must also establish proximate (legal) cause; courts deny recovery when the connection between the defendant\'s conduct and the injury is too attenuated, remote, or freakish to justify imposing liability.'},
      {t:'concept', n:'Proximate cause is ultimately a policy question about who should fairly bear the loss, not a mechanical rule; it is generally a fact question for the jury, though a court may decide it as a matter of law when no reasonable jury could differ.'},
      {t:'rule', n:'The prevailing test is foreseeability: the plaintiff\'s injury must be a foreseeable result or general type of harm the defendant should reasonably have anticipated, but the precise manner of occurrence and the extent of the harm need not be foreseeable.'},
      {t:'concept', n:'Under the type-versus-manner distinction, if a lighted flame near a gas outlet makes an explosion a foreseeable type of harm, the bizarre manner (a flaming rat triggering it) need not be foreseeable; likewise a fire that unforeseeably spreads to a larger area is not precluded since extent need not be foreseen.'},
      {t:'case', n:'Palsgraf v. Long Island R.R. (N.Y. 1928): Cardozo for the majority held duty (and thus liability) runs only to plaintiffs within the foreseeable zone of danger, so the railroad owed no duty to Mrs. Palsgraf, who stood far from the dislodged package. Andrews\' dissent argued a duty is owed to the world and proximate cause turns on a practical, policy-laden assessment of directness and foreseeability.'},
      {t:'case', n:'Wagon Mound No. 1: the defendant\'s ship negligently spilled oil that later ignited and burned the plaintiff\'s dock; the Privy Council ruled for the defendant because, on the trial findings, the fire was not a reasonably foreseeable consequence, establishing foreseeability as the test for proximate cause.'},
      {t:'case', n:'Wagon Mound No. 2: suing on the same oil spill, a different shipowner persuaded the court the fire was foreseeable; the court held that even a relatively remote risk is foreseeable where the harm would be significant and there is no justification for incurring the risk.'},
      {t:'case', n:'In re Polemis illustrates the older direct-causation test: dropping a plank created a spark that ignited petrol fumes and destroyed a ship, and the defendant was the direct cause because no intervening force existed even though the explosion was unforeseeable; the direct test was later supplanted by Wagon Mound\'s foreseeability rule.'},
      {t:'rule', n:'Under the eggshell-plaintiff (thin-skull) rule, the defendant takes the plaintiff as he finds him: once any personal injury is a foreseeable type of harm, the defendant is liable for its full unforeseeable extent, even catastrophic injury from a minor bump to a vulnerable victim.'},
      {t:'rule', n:'Restatement (Second) uses \'legal cause\': conduct is a legal cause if it is a substantial factor in bringing about the harm and no rule of law relieves the actor; liability is not limited because the extent or manner was unforeseeable unless, looking back from the harm, it appears highly extraordinary that the conduct produced it.'},
      {t:'concept', n:'The Restatement (Third) reframes proximate cause as \'scope of liability,\' limiting liability to physical harms resulting from the risks that made the conduct tortious, a test the drafters describe as essentially the same as the prevailing foreseeability test.'},
      {t:'concept', n:'In his Palsgraf dissent, Justice Andrews argued proximate cause cannot be reduced to a formula but is a matter of convenience, public policy, and a rough sense of justice, drawing on factors like a natural and continuous sequence, directness, remoteness in time and space, and foreseeability viewed in hindsight.'}

      {t:'concept', n:'📖 Reading — Diamond & Levine §12.03[A][3] (Proximate Cause & Intervening Forces).'},
      {t:'concept', n:'An intervening force arises after the defendant\'s negligence and contributes to the harm. A foreseeable intervening force does NOT break the causal chain; an unforeseeable superseding cause does, cutting off the defendant\'s liability.'},
      {t:'case', n:'Derdiarian v. Felix Contracting Corp. (414 N.E.2d 666, N.Y. 1980) — a foreseeable intervening act does not relieve the original negligent defendant; what matters is foreseeability of the general risk, not the precise manner of harm.'},
      {t:'case', n:'Ventricelli v. Kinney System Rent A Car (383 N.E.2d 1149, N.Y. 1978) — required case: liability can fail where the intervening event made the location/timing of harm merely coincidental rather than a foreseeable result of the negligence.'},

      {t:'rule', n:'The complete foreseeability test for proximate cause has two parts: (1) a reasonably foreseeable result or type of harm, and (2) no superseding intervening force; an intervening force is a new force, arising after the defendant\'s conduct, that joins with it to cause the injury.'},
      {t:'rule', n:'A foreseeable intervening force does not cut off liability; only an intervening force characterized as superseding does, and a force is generally deemed superseding only when its occurrence appears highly improbable and extraordinary under the circumstances.'},
      {t:'concept', n:'Courts distinguish dependent intervening forces (stimulated by the defendant\'s negligence, like a rescuer\'s efforts) from independent ones (not so stimulated, like an unrelated waterskier), but this label is generally not decisive; what matters is how improbable the intervening force is.'},
      {t:'case', n:'If A negligently drops gasoline at a service station, fire is a foreseeable harm; if B then carelessly drops a match igniting it, B is an intervening but not superseding force, whereas if B intentionally drops the match the criminal arson is more likely superseding -- though it is wrong to assume negligent acts never supersede and intentional acts always do.'},
      {t:'rule', n:'Acts of nature can be superseding, but a storm or other natural force that should have been anticipated is foreseeable and not superseding even if extraordinarily strong; the Restatement finds a natural force superseding only if its operation is extraordinary and it produces a different kind of harm than made the conduct negligent.'},

      {t:'concept', n:'Tort damages aim to make the plaintiff whole: compensatory damages (economic — medical bills, lost wages; non-economic — pain and suffering, loss of enjoyment) and, in egregious cases, punitive damages.'},

      {t:'concept', n:'Tort damages come in three forms: nominal damages (symbolic, often one dollar, given when a tort like trespass is established but no actual harm is proven), compensatory damages (to compensate for harm sustained, covering both economic and non-economic losses), and punitive damages (to punish and deter egregious conduct). Torts requiring proof of actual harm, like negligence, never support nominal damages.'},
      {t:'rule', n:'Compensatory damages for personal injury cover four categories: (1) medical expenses, (2) lost wages or impaired earning capacity, (3) other incidental economic consequences, and (4) pain and suffering. Economic categories include all reasonable past and future medical expenses caused by the tortfeasor, ordinarily proven through expert medical testimony.'},
      {t:'concept', n:'A personal injury plaintiff may recover for lost wages OR, alternatively, for impaired earning capacity. Impaired earning capacity measures the lost potential to earn and does not require proof the victim would actually have exploited that capacity, so a defendant cannot reduce liability by arguing the plaintiff would have chosen not to work; it does require proof of the victim\'s specific skills, education, and aptitude.'},
      {t:'rule', n:'Property damages are measured by value: permanent destruction is compensated by market value (usually at the time of the tort), while property damaged but not destroyed is compensated by diminished market value, sometimes by reasonable repair cost. Courts hesitate to award repair costs that significantly exceed the loss in value, though they often allow repair costs for a personal residence or property with sentimental value.'},

      {t:'rule', n:'Reduction to present value: because awards for future losses (future lost earnings, medical expenses) are paid as a lump sum in advance, the award must be reduced to present value to reflect the interest the plaintiff can earn, while also accounting for future inflation. Most courts do NOT require pain and suffering awards to be reduced to present value, given their inherent imprecision.'},
      {t:'exam', n:'Per-diem arguments ARE generally permitted: plaintiffs\' attorneys may ask the jury to value pain and suffering on a per-day basis and multiply by the number of days. By contrast, \'Golden Rule\' arguments asking jurors to consider what they would demand to trade places with the victim are NOT allowed.'},
      {t:'rule', n:'Mitigation (avoidable consequences doctrine): an injured victim must act reasonably to limit losses, such as seeking appropriate medical care; if she fails, the defendant is not liable for the incremental losses that could have been avoided. This differs from contributory/comparative negligence, which goes to causing the accident; failure to wear a seat belt or helmet is sometimes treated as \'anticipatory mitigation\' folded into comparative-fault allocation.'},

// ── SAVE / LOAD (cloud-backed, with local cache as offline fallback) ───────────
function save() {
  try { localStorage.setItem('lshub_final', JSON.stringify(courses)); } catch(e) {}
  if (!supa || !_session) return;
  setSync('saving');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    supa.from("hub_state").upsert(
      { user_id:_session.user.id, key:CLOUD_KEY, value:courses, updated_at:new Date().toISOString() },
      { onConflict:"user_id,key" }
    ).then(function(res){
      if (res.error) { console.error("cloud save failed", res.error); setSync('error'); }
      else setSync('saved');
    });
  }, 500);
}

function isCourses(v) { return v && typeof v === 'object' && Object.values(v).some(function(c){ return c && c.weeks; }); }

// Fold src course-map into target, deduping notes by type+text. Returns true if anything was added.
function mergeInto(target, src) {
  var changed = false;
  Object.keys(src).forEach(function(cid){
    var sc = src[cid]; if (!sc || !sc.weeks) return;
    if (!target[cid]) { target[cid] = JSON.parse(JSON.stringify(sc)); changed = true; return; }
    var tc = target[cid]; tc.weeks = tc.weeks || [];
    (sc.weeks || []).forEach(function(sw){
      var tw = tc.weeks.find(function(w){ return w.w === sw.w; });
      if (!tw) { tc.weeks.push(JSON.parse(JSON.stringify(sw))); tc.weeks.sort(function(a,b){ return a.w-b.w; }); changed = true; return; }
      var seen = {}; (tw.notes || []).forEach(function(n){ seen[n.t+'|'+n.n] = 1; });
      tw.notes = tw.notes || [];
      (sw.notes || []).forEach(function(sn){ var k = sn.t+'|'+sn.n; if (!seen[k]) { tw.notes.push({t:sn.t, n:sn.n}); seen[k] = 1; changed = true; } });
      if (sw.tags) { tw.tags = tw.tags || []; sw.tags.forEach(function(tg){ if (tw.tags.indexOf(tg) < 0) { tw.tags.push(tg); changed = true; } }); }
    });
  });
  return changed;
}

async function loadCloud() {
  if (!supa || !_session) return;
  const { data, error } = await supa.from("hub_state")
    .select("value").eq("user_id", _session.user.id).eq("key", CLOUD_KEY).maybeSingle();
  if (error) { console.error("cloud load failed", error); return; }
  const cloud = (data && isCourses(data.value)) ? data.value : null;
  courses = cloud ? cloud : JSON.parse(JSON.stringify(SEED));

  // One-time-per-device merge: fold any notes saved locally on THIS device into the shared
  // cloud copy (deduped by content) so anything added before cloud sync is never lost.
  let local = null;
  try { local = JSON.parse(localStorage.getItem('lshub_final') || 'null'); } catch(e) {}
  let didMerge = false;
  if (isCourses(local) && !localStorage.getItem('lshub_merged')) didMerge = mergeInto(courses, local);

  // Auto-merge new built-in content: when the file's SEED is updated (SEED_VERSION bumped),
  // fold any new courses/weeks/notes into the cloud copy (deduped) without touching her own additions.
  let seedMerged = false;
  if (localStorage.getItem('lshub_seedver') !== SEED_VERSION) seedMerged = mergeInto(courses, JSON.parse(JSON.stringify(SEED)));

  if (!cloud || didMerge || seedMerged) save();   // first seed, merged local notes, or merged new built-in content
  try { localStorage.setItem('lshub_merged', '1'); localStorage.setItem('lshub_seedver', SEED_VERSION); } catch(e) {}
}

function loadLocal() { // only used if the cloud library failed to load
  try {
    const d = JSON.parse(localStorage.getItem('lshub_final') || 'null');
    if (d && d.cl610 && d.cl610.weeks && d.cl610.weeks.length >= 5) courses = d;
  } catch(e) {}
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pw = document.getElementById('li-pw').value;
  const err = document.getElementById('li-err');
  if (!email || !pw) { err.textContent = 'Enter your email and password.'; return; }
  err.textContent = '';
  const btn = document.getElementById('li-btn'); btn.disabled = true; btn.textContent = 'Signing in…';

function renderHome() {
  document.getElementById('clist').innerHTML = Object.values(courses).map(c => `
    <div class="course-card" onclick="openCourse('${c.id}')">
      <span class="course-badge ${c.badge}">${c.label}</span>
      <div class="course-name">${c.name}</div>
      <div class="course-sub">Purdue Global Law School</div>
      <div class="course-meta">
        <span><strong>${c.weeks.length}</strong> week${c.weeks.length!==1?'s':''} logged</span>
        <span><strong>${c.weeks.reduce((a,w)=>a+(w.notes?w.notes.length:0),0)}</strong> notes</span>
      </div>
    </div>`).join('');
}

function openCourse(id) {
  active = id;
  const c = courses[id];
  document.getElementById('home-view').classList.remove('active');
  document.getElementById('course-view').classList.add('active');
  document.getElementById('cv-title').textContent = c.name;
  renderWeeks(c);
}

function goHome() {
  document.getElementById('home-view').classList.add('active');
  document.getElementById('course-view').classList.remove('active');
  active = null;
  renderHome();
}

function renderWeeks(c) {
  const el = document.getElementById('wlist');
  if (!c.weeks || !c.weeks.length) {
    el.innerHTML = '<div class="empty">No weeks logged yet. Click "Add week" to get started.</div>';
    return;
  }
  el.innerHTML = c.weeks.map((w, i) => {
    const gn = w.notes && w.notes.find(n => n.t === 'grade');
    const gb = gn ? `<div class="grade-banner">📋 ${gn.n.split('—')[1]?.split('.')[0]?.trim() || 'Graded assignment'}</div>` : '';
    return `
      <div class="week-card">
        <div class="week-hdr" onclick="toggleW(${i})">
          <div class="week-left">
            <span class="week-num">Week ${w.w}</span>
            <div>
              <div class="week-topic">${w.topic}</div>
              <div class="week-tags">${(w.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            </div>
          </div>
          <div class="week-right">
            <span class="week-count">${(w.notes||[]).length} note${(w.notes||[]).length!==1?'s':''}</span>
            <span class="chev" id="ch-${i}">▾</span>
          </div>
        </div>
        <div class="week-body" id="wb-${i}">
          ${gb}
          <div class="notes-label">Notes</div>
          ${(w.notes||[]).map((n,ni)=>`
            <div class="note">
              <span class="ntype nt-${n.t}">${n.t}</span>
              <span class="ntext">${n.n}</span>
              <button class="del-note" onclick="delNote(${i},${ni})">✕</button>
            </div>`).join('')}
          <div class="note-actions">
            <button class="btn" onclick="openAddNote(${i})">+ Add note</button>
            <button class="btn btn-danger" onclick="delWeek(${i})">Delete week</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleW(i) {
  document.getElementById('wb-'+i).classList.toggle('open');
  document.getElementById('ch-'+i).classList.toggle('open');
}

function delNote(wi, ni) { const c=courses[active]; c.weeks[wi].notes.splice(ni,1); save(); renderWeeks(c); }
function delWeek(wi) { const c=courses[active]; c.weeks.splice(wi,1); save(); renderWeeks(c); }

function saveWeek() {
  const c = courses[active];
  const wn = parseInt(document.getElementById('mw').value) || c.weeks.length+1;

      </select>
    </div>
    <div class="field"><label>Note</label><textarea id="nn" placeholder="Enter your note..."></textarea></div>
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveNote(${wi})">Save note</button>
    </div>`);
}

function saveNote(wi) {
  const c = courses[active];
  const t = document.getElementById('nt').value;
  const n = document.getElementById('nn').value.trim();
  if (!n) return;
  c.weeks[wi].notes.push({t, n});
  save(); closeModal(); renderWeeks(c);
}

function openAddCourse() {
  showModal(`<h3>Add course</h3>
    <div class="field"><label>Course code & name</label><input type="text" id="ncn" placeholder="e.g. CL630 — Property"></div>
    <div class="field"><label>Color</label>
      <select id="ncb">
        <option value="b-contracts">Blue (Contracts)</option>
        <option value="b-legal">Purple (Legal Analysis)</option>
        <option value="b-torts">Green (Torts)</option>
        <option value="b-amber">Amber</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveCourse()">Add course</button>
    </div>`);
}

function saveCourse() {
  const name = document.getElementById('ncn').value.trim(); if (!name) return;
  const badge = document.getElementById('ncb').value;
  const labels = {'b-contracts':'CONTRACTS','b-legal':'LEGAL ANALYSIS','b-torts':'TORTS','b-amber':'COURSE'};
  const id = 'c' + Date.now();
  courses[id] = {id, name, badge, label: labels[badge]||'COURSE', weeks:[]};
  save(); closeModal(); renderHome();
}

function openAI() {
  const c = courses[active];
  const summary = c.weeks.map(w=>`Week ${w.w} — ${w.topic}: ${w.notes.map(n=>`[${n.t}] ${n.n}`).join(' | ')}`).join('\n');
  if (typeof sendPrompt === 'function') {
    sendPrompt(`Based on my ${c.name} notes, can you quiz me or give me a study summary?\n\n${summary}`);
  } else {
    alert('Ask Claude feature works inside the Claude chat interface. Copy your notes and paste them into a new chat!');
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function afterLogin() {
  hideLogin();
  if (_session && _session.user.id === _curUid) { showApp(); return; } // already loaded this session
  _curUid = _session ? _session.user.id : null;
  await loadCloud();
  showApp();
  goHome();
  setSync('saved');
}

async function init() {
  if (!supa) { // cloud library didn't load — fall back to local-only so the app still works
    loadLocal(); hideLogin(); showApp(); renderHome(); return;
  }
  supa.auth.onAuthStateChange(function(_e, sess){
    _session = sess || null;
    if (_session) afterLogin(); else showLogin();
  });
  const s = await supa.auth.getSession();
  _session = (s && s.data) ? s.data.session : null;
  if (_session) afterLogin(); else showLogin();
}

init();
</script>
