      {t:'case', n:'Diamond Fruit Growers, Inc. v. Krack Corp., 794 F.2d 1440 (9th Cir. 1986): Metal-Matic\'s acknowledgment stated acceptance was "expressly conditional" on Krack accepting Metal-Matic\'s disclaimer. Krack objected but parties continued doing business. Held: Because acceptance was expressly conditioned on new terms, § 2-207(1) did not form a contract on documents. Contract formed by conduct under § 2-207(3) — terms limited to those on which both writings agreed; disclaimer NOT part of the contract. Key rule: expressly conditioned acceptance + offeror non-agreement → conduct analysis under § 2-207(3).'},
      {t:'case', n:'Dorton v. Collins & Aikman Corp., 453 F.2d 1161 (6th Cir. 1972): Collins\'s acknowledgment added an arbitration clause. Dorton argued it was not bound. Held: Both parties were merchants; arbitration clause was an additional term (not expressly conditioned) → § 2-207(2) applied. Remanded to determine if arbitration clause materially altered the contract. Key rule: between merchants, new terms generally become part of the contract under § 2-207(2) — unless one of the three exceptions applies.'},
      {t:'exam', n:'UCC 2-207 two-question flowchart: Q1 — Is this a definite and seasonable expression of acceptance? YES → contract formed on documents; go to Q2. Expressly conditioned on new terms → NO contract on documents → § 2-207(3) conduct analysis (terms = overlap of both writings + UCC gap-fillers). Q2 — Are both parties merchants? YES → additional terms automatically part of contract UNLESS: (a) ironclad offer, (b) material alteration, or (c) objection. NO → additional terms are proposals only; require offeror\'s express assent.'},
      {t:'exam', n:'Seminar 5 summary: (1) Rejection terminates offer — later "acceptance" is a new offer. (2) Counter-offer rejects original offer and creates a new one. (3) Common law: mirror image rule — any variance = counter-offer. (4) UCC § 2-207: acceptance valid even with new terms — the UCC does NOT follow the mirror image rule. (5) Between merchants: new terms go in automatically subject to three exceptions. (6) Expressly conditioned acceptance → no contract on documents → § 2-207(3) conduct analysis.'}
    ]},
    { w:6, topic:'Acceptance timing, consideration & pre-existing duty rule', tags:['mailbox rule','consideration','bargained-for exchange','legal detriment','pre-existing duty rule','past consideration','Cantu v. CEA','Hamer v. Sidway','Angel v. Murray'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§2.01–2.03, §§2.05–2.08; §4.06, §4.09[A], §4.09[D]. Required cases: Cantu v. Central Education Agency; Hamer v. Sidway; Kirksey v. Kirksey; Gottlieb v. Tropicana; Fiege v. Boehm; Schwartzreich v. Bauman-Basch; Angel v. Murray. (Optional: Ardente v. Horan; Beall v. Beall; Kim v. Son; Pennsy Supply v. American Ash.)'},
      {t:'exam', n:'📋 Module 6 (Consideration): Graded — Resource Quiz (19 pts); Essay Quiz (50 pts, 30 min); Seminar (2 pts).'},
      {t:'rule', n:'Mailbox Rule (Cantu v. Central Education Agency): An acceptance, by any medium reasonable under the circumstances, is effective upon dispatch — not upon receipt. Once sent by a reasonable medium, the acceptance forms the contract immediately, even if the offeror never receives it or sends a revocation that crosses in the mail.'},
      {t:'case', n:'Cantu v. Central Education Agency, 884 S.W.2d 565 (Tex. App. 1994): Cantu submitted her resignation on Aug. 17. The school mailed an acceptance of the resignation on Aug. 20. On Aug. 21 — before receiving the acceptance letter — Cantu tried to withdraw her resignation. Held: Under the mailbox rule, the school\'s acceptance was effective on Aug. 20 when it was dispatched. Cantu\'s attempted withdrawal on Aug. 21 came too late — the contract (accepting her resignation) was already formed.'},
      {t:'exam', n:'Mailbox rule exam application: Acceptance effective on DISPATCH. Revocation effective on RECEIPT. So: if offeree mails acceptance Monday and offeror mails revocation Tuesday, a contract was formed Monday — revocation is too late even though offeror sent it before knowing of the acceptance. The mailbox rule does NOT apply to revocations, rejections, or counter-offers — only acceptances.'},
      {t:'rule', n:'Consideration defined: Consideration is a bargained-for exchange where all parties incur a legal detriment. Two requirements: (1) Bargained-for — the consideration must be sought by the promisor in exchange for their promise, and given by the promisee in exchange for that promise. (2) Legal detriment — each party must give up something of legal value (a right they had) or do something they were not previously obligated to do.'},
      {t:'concept', n:'Past consideration is NOT valid consideration: If the act or promise was already performed before the new promise was made, it cannot serve as consideration for that new promise. Consideration must be given in exchange for the promise — not given before the promise was even made. Example: Fran mowed Ed\'s lawn as a favor before seeing his email offering $10. When she later reads the email, she cannot enforce it — her performance was not given in exchange for his promise (she did not even know about the promise when she mowed).'},
      {t:'concept', n:'Third-party consideration: Consideration can come from a third party rather than the promisee, as long as it was bargained for. Example: Seth promises to sell Bob a car if Paul pays Seth $10,000. Paul pays. Seth must deliver the car to Bob — Paul\'s payment to Seth is valid consideration for Seth\'s promise to Bob, even though Bob (the promisee) did not personally provide the consideration.'},
      {t:'concept', n:'Pre-existing legal duty: A promise to do something you are already legally obligated to do is NOT valid consideration. You are giving up nothing — no legal detriment. Example: a police officer cannot collect a reward for apprehending a criminal, because the officer is already legally required to do so. The officer gave up no legal right and incurred no new legal detriment in performing the act.'},
      {t:'case', n:'Hamer v. Sidway, 124 N.Y. 538 (N.Y. 1891) — Seminar 6 focus: Uncle promised nephew $5,000 if nephew refrained from drinking, smoking, swearing, and gambling until age 21. Nephew complied. Uncle\'s estate refused to pay. Held: A waiver of any legal right at the request of another party is sufficient consideration for a promise. The nephew had the legal right to drink, smoke, swear, and gamble — giving up those rights at his uncle\'s request was a legal detriment and valid consideration.'},
      {t:'rule', n:'Pre-existing Duty Rule (common law): Under common law, a promise to perform a pre-existing contractual duty is not valid consideration for a contract modification. If Party A already has a contract with Party B to do X, and Party A later demands more money to do X, Party B\'s promise to pay more is unenforceable — Party A gave up nothing new. New consideration is required to modify a contract under common law.'},
      {t:'rule', n:'Exception to the Pre-existing Duty Rule — Angel v. Murray test: A pre-existing duty CAN support a contract modification if ALL FOUR of the following are met: (1) The parties mutually agree to the modification. (2) The modification is made before the contract is fully performed. (3) The underlying circumstances prompting the modification were unanticipated by the parties at the time of original contracting. (4) The modification is fair and equitable in light of the unanticipated circumstances.'},
      {t:'case', n:'Angel v. Murray, 322 A.2d 630 (R.I. 1974): Maher had a five-year trash removal contract with the city. Mid-contract, he requested and received an additional $20,000 due to an unanticipated increase in the number of housing units he had to service. Held: The modification was enforceable — it met all four Angel v. Murray criteria. The increased housing units were genuinely unanticipated; the request was made before full performance; both parties mutually agreed; and the additional payment was fair and equitable given the changed circumstances.'},
      {t:'exam', n:'Consideration exam checklist: (1) Was there a bargained-for exchange? (gift/gratuitous promise = no consideration). (2) Did each party incur a legal detriment? (3) Is this past consideration? (performance before the promise = not valid). (4) Is this a pre-existing duty? (already obligated = no detriment = no consideration). (5) If contract modification: common law requires new consideration UNLESS the Angel v. Murray four-part exception applies. (6) Third-party consideration: valid if bargained-for, even if promisee did not personally supply it.'},
      {t:'exam', n:'Seminar 6 conclusion summary: (1) Mailbox rule — acceptance effective on dispatch by a reasonable medium. (2) Consideration = bargained-for exchange + legal detriment by all parties. (3) Common law contract modifications require new consideration. (4) Pre-existing duty = no legal detriment = no valid consideration — unless Angel v. Murray four-part test is satisfied (mutual agreement, before full performance, unanticipated circumstances, fair and equitable).'},
      {t:'grade', n:'Graded Essay — Mod 6, Question 1 (Score: 30/50). Fact pattern: Basin’s sponsored ad offered to remove, deliver, and install an in-stock bathroom sink for $500 over its ‘Basement Best’ discount price (a dozen models, each with name and price, shown below). Ana emailed asking about a Cascade model and whether installation could be guaranteed for March 9; Bob (sales manager) replied offering deluxe installation guaranteeing March 9 for an extra $250; Ana accepted; Bob confirmed. Issue: Was a contract formed between Ana and Basin? Key professor feedback / lessons: (1) Good to start with the governing source of law — but actually STATE THE RULE, and because this was a hybrid goods/services contract, apply the predominant factor test. (2) Frame why you’re analyzing offer — to form a contract you need offer, acceptance, AND consideration. (3) There were THREE potential offers; discuss each separately and decide which one was the valid offer that could be accepted. (4) Ads are generally invitations to deal, not offers — analyze the elements; here ‘purchase any of our in-stock models’ left subject matter and quantity unclear, so the ad was NOT a valid offer. (5) Ana’s email lacked a present intent to be bound (‘I’m interested in a Cascade model…,’ and conditioned on the date), so it was not an offer. (6) Bob’s email WAS the valid offer — read together with the ad and Ana’s inquiry it had definite terms (parties, price from the ad, subject matter/quantity from Ana) and was communicated to an identified offeree. (7) Points were lost for giving no rules and no full analysis of acceptance and consideration. Takeaway: separate and analyze each potential offer, always state the rule before applying it, run the predominant factor test on hybrid contracts, and complete the full offer → acceptance → consideration analysis.'}
    ,
      {t:'concept', n:'📖 Understanding Contracts Ch. 2 (Consideration) — Module 6 covers §§2.01–2.03 (enforceability, formal alternatives, bargained-for exchange) and §§2.05–2.08 (adequacy, pre-existing duty, past consideration/moral obligation, guaranty).'},
      {t:'rule', n:'§2.01 Enforceability: a contract is a legally enforceable promise, but not all promises are enforceable. The main test is the CONSIDERATION doctrine — a promise supported by consideration is presumptively (prima facie) enforceable; absent consideration or a substitute, the promise is not enforceable (Restatement §17).'},
      {t:'rule', n:'§2.02 Formal alternatives to consideration: formalities serve four functions (Lon Fuller) — CAUTIONARY (slow the parties down to reflect), EVIDENTIARY (prove a real promise was made), CHANNELING (signal a legally binding promise), and CLARIFICATION (a writing reduces ambiguity).'},
      {t:'concept', n:'§2.02[B] The SEAL (wax impressed with a stamp — later just the word \'seal,\' \'L.S.,\' or even a dash, as in Appeal of Hacker) historically made a promise enforceable via the writ of covenant, WITHOUT consideration. It has largely fallen into disuse: UCC §2-203 abolishes its effect for sales of goods, and most states have eliminated or limited it (a few keep a longer limitations period or a rebuttable presumption of consideration).'},
      {t:'concept', n:'§2.02[C] The Uniform Written Obligations Act makes a signed written promise enforceable if it contains an express statement that the signer intends to be legally bound — adopted in only two states and surviving (narrowly) only in Pennsylvania.'},
      {t:'rule', n:'§2.03 Consideration = a BARGAINED-FOR EXCHANGE (Restatement §71): each party gives the other what it seeks as a quid pro quo — \'I\'ll give you what you want if you give me what I want.\' Think of consideration as \'the promisor\'s price\' for her promise.'},
      {t:'concept', n:'§2.03[B] An older test asks whether the promisee suffered a DETRIMENT or the promisor gained a BENEFIT. Hamer v. Sidway: a nephew\'s forbearance from drinking, smoking, and gambling — giving up a LEGAL RIGHT — was a sufficient legal detriment, so the uncle\'s promise to pay $5,000 was enforceable. The Restatement disclaims benefit/detriment language; the key is that the benefit or detriment must be BARGAINED FOR.'},
      {t:'exam', n:'Exam trap (Prendergast v. Snoeberger): a detriment the promisee happened to suffer, or a benefit the promisor happened to gain, is NOT consideration unless it was bargained for — sought by the promisor in exchange for the promise. A promise made AFTER a completed gift is not part of an exchange. (Also: do not find consideration in the promisor\'s own duty to perform — that\'s backwards.)'},
      {t:'rule', n:'§2.03[C] An exchange of unperformed (executory) PROMISES is consideration: when one promise is exchanged for another, both are supported by consideration so long as actual performance of each would be consideration. Barb\'s promise to pay $18,000 is consideration for Sam\'s promise to sell his car, even before either performs.'},
      {t:'rule', n:'§2.03[D]–[E] Consideration can also be a PERFORMANCE (reward and \'prove me wrong\' offers — a unilateral contract where the requested act is both the acceptance and the consideration) or FORBEARANCE (giving up a legal right at the promisor\'s request — Hamer v. Sidway). For forbearance, what the promisor SOUGHT controls: if she bargained for a promise to forbear, actual forbearance without a promise is not consideration.'},
      {t:'rule', n:'§2.05[A] ADEQUACY: courts do NOT inquire into the adequacy (relative value) of consideration — \'a mere peppercorn\' suffices if the parties really bargained for it (the peppercorn theory). As long as there is a real exchange, parties may trade for whatever they want, regardless of economic value (a core part of freedom of contract). Batsakis v. Demotsis — a $2,000 promise for ~$25 of wartime drachmae was enforced.'},
      {t:'concept', n:'§2.05[B] BUT a gross disparity can show there was no real bargain — i.e., SHAM / nominal consideration. Schnell v. Nell: exchanging $200 for 1¢ was not a real exchange (sums of fixed value), so the 1¢ was merely nominal and the promise unenforceable. Contrast Batsakis (a genuine, if risky, loan).'},
      {t:'rule', n:'§2.05[C] Settlement of disputed claims: forbearance from suing on a DISPUTED claim is consideration for a settlement — even if the claim later proves invalid — as long as it was asserted in GOOD FAITH (Restatement §74; Fiege v. Boehm — dropping a paternity claim, later disproven by blood tests, was consideration because asserted in good faith). This balances the no-adequacy-inquiry rule against discouraging extortion.'},
      {t:'concept', n:'§2.05[D] A RECITAL that consideration was given (\'for value received\') does NOT make a gift promise enforceable if there was no real exchange (\'the parties may shout consideration to the housetops...\'). EXCEPTIONS where a recital can suffice: option contracts (Restatement §87) and guaranty contracts (Restatement §88) — though most courts still require the recited consideration to have actually been paid.'},
      {t:'rule', n:'§2.05[E] An ILLUSORY promise — one whose performance is entirely optional (\'I\'ll buy it if I want to\') — is NOT consideration, so the contract fails for lack of MUTUALITY of obligation (\'both must be bound, or neither\'). Modern law has nearly eliminated this branch by finding meaningful limits in most agreements.'},
      {t:'case', n:'Wood v. Lucy, Lady Duff-Gordon (Cardozo, 1917): an exclusive-dealing agreement to market Lucy\'s fashion endorsements was saved by an IMPLIED promise that Wood would use \'reasonable efforts,\' which supplied the consideration for her promise of exclusivity. (UCC §2-306(2) now imposes a \'best efforts\' duty in exclusive-dealing goods contracts.)'},
      {t:'concept', n:'Other limits that keep a promise from being illusory: a CONDITIONAL promise is real if the condition is genuinely uncertain (insurance) or the promisor must use good-faith/reasonable efforts toward it; a SATISFACTION clause is real because satisfaction must be genuine/good faith (Mattei v. Hopper); a UNILATERAL right to TERMINATE is fine if limited by a notice requirement or good faith (Laclede Gas v. Amoco); and OUTPUT/REQUIREMENTS contracts are enforceable because quantity is bound by GOOD FAITH (UCC §2-306).'},
      {t:'rule', n:'§2.06 PRE-EXISTING DUTY RULE: a promise to do (or the doing of) what one is ALREADY legally bound to do is not consideration — so a ONE-SIDED modification of an existing contract lacks consideration (\'past consideration is no consideration\'). Lingenfelder v. Wainwright Brewery.'},
      {t:'case', n:'Alaska Packers\' Ass\'n v. Domenico: fishermen who, mid-voyage, demanded double pay to do their EXISTING job gave no consideration for the owner\'s promise — showing how the rule blocks COERCED modifications. (Critique: the rule is over-broad — it also blocks good-faith modifications, while trivial \'sham\' consideration can satisfy it even where coercion exists.)'},
      {t:'rule', n:'Exceptions enforcing a one-sided modification WITHOUT new consideration: (1) a modification \'fair and equitable in view of circumstances not anticipated\' (Restatement §89; Angel v. Murray); (2) foreseeable RELIANCE on the modification (promissory estoppel); (3) UCC §2-209 — a GOOD-FAITH modification of a goods contract needs NO new consideration; (4) the three-step rescind-and-re-contract device; and (5) international rules (CISG Art. 29) require no consideration at all.'},
      {t:'rule', n:'§2.06[B] ACCORD AND SATISFACTION: an agreement to settle a debt (the \'accord\') plus its performance (the \'satisfaction\') discharges the original debt. Paying a LESSER sum already due is not consideration for releasing the balance UNLESS the debt is disputed/unliquidated or the debtor changes performance (pays early, adds something). UCC §3-311 governs \'payment in full\' checks (claim disputed/unliquidated + conspicuous full-satisfaction notation + good faith).'},
      {t:'concept', n:'§2.06[C] Pre-existing duty to a THIRD party: McDevitt v. Stokes held a jockey\'s bonus promise unenforceable because he already owed a duty to ride the horse to win. The Restatement (Second) disagrees and would enforce it, since the coercion concern behind the rule is absent.'},
      {t:'rule', n:'§2.07[A]–[B] PAST CONSIDERATION is no consideration: a promise made in recognition of a benefit ALREADY received is not part of an exchange. Mills v. Wyman — a father\'s promise to pay for his adult son\'s past care was unenforceable; a mere MORAL obligation (\'the tribunal of conscience\') does not make a promise binding.'},
      {t:'case', n:'§2.07[C] MATERIAL BENEFIT RULE (minority / Restatement §86): a promise made in recognition of a material benefit previously received may be enforced \'to the extent necessary to prevent injustice.\' Webb v. McGowin — an employer\'s promise to pay the worker who was gravely injured saving his life was enforced (contrast Mills v. Wyman). Not enforced where the benefit was a gift or the promise is disproportionate to the benefit.'},
      {t:'rule', n:'§2.07[D] Promises to pay obligations DISCHARGED BY OPERATION OF LAW are enforceable WITHOUT new consideration: a new promise to pay (1) a debt discharged in BANKRUPTCY (\'reaffirmation\'), (2) a debt barred by the STATUTE OF LIMITATIONS, (3) an obligation incurred while a MINOR or incompetent (ratification on regaining capacity), or (4) a duty discharged by the failure of a non-material condition (waiver).'},
      {t:'rule', n:'§2.08 GUARANTY (suretyship) contracts have three parties: the principal debtor (obligor), the creditor (obligee), and the guarantor/surety. The surety\'s promise needs consideration: if made AT THE TIME of the loan, the loan itself is the consideration (\'lend money to Junior and I\'ll pay if he defaults\'); if made AFTER the loan, the past loan is \'past consideration,\' so new consideration (e.g., the creditor\'s forbearance or an extended due date) is required. Surety promises must be in writing under the Statute of Frauds.'}
    ]},
    { w:7, topic:'Consideration — UCC contract modification & illusory promises', tags:['consideration','UCC modification','good faith','illusory promises','output contracts','requirements contracts','satisfaction clause','Roth Steel','Mezzanotte v. Freeland'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§2.04–2.05, §2.06[A], §2.07; §5.09; §10.06. Required cases: Roth Steel Products v. Sharon Steel; Wood v. Lucy, Lady Duff-Gordon; Mezzanotte v. Freeland. (Optional: Ridge Runner Forestry v. Veneman; Miami Coca-Cola v. Orange Crush; Texas Gas Utilities v. Barrett; Summits 7 v. Kelly.)'},
      {t:'exam', n:'📋 Module 7 (Modification & Mutuality of Obligation): Graded — Resource Quiz (10 pts); Module Quiz (20 pts); Seminar (2 pts).'},
      {t:'concept', n:'Module 7 agenda (CL610 Contracts — Consideration continued): (1) UCC contract modification; (2) Illusory promises.'},
      {t:'rule', n:'UCC contract modification: Unlike common law, the UCC does NOT require new consideration to modify a contract for the sale of goods. Under UCC § 2-209, a modification needs only good faith — no additional consideration is necessary.'},
      {t:'case', n:'Roth Steel Products v. Sharon Steel Corp., 705 F.2d 134 (6th Cir. 1983): Sharon agreed to sell steel to Roth at discounted prices, then tried to withdraw its price concessions. Unable to find cheaper steel, Roth agreed to a compromise price higher than the original. Held: Under the UCC, contract modification does not require new consideration — modification only requires good faith.'},
      {t:'rule', n:'Illusory promises: A promise that does not actually bind the promisor to any legal detriment is illusory (e.g., "I will buy as many as I want"). An illusory promise CANNOT serve as consideration because the promisor has not truly committed to anything.'},
      {t:'rule', n:'Output & requirements contracts are exceptions — NOT illusory. Although quantity seems open-ended, the UCC implies a good-faith obligation (output = all the seller produces; requirements = all the buyer needs), which supplies a real legal detriment and valid consideration.'},
      {t:'rule', n:'Satisfaction / conditional promises: A promise conditioned on an event within the promisor\'s control is not illusory if the promisor impliedly promises to make reasonable effort to bring the event about, or to use good faith and honest judgment in determining whether it occurred.'},
      {t:'case', n:'Mezzanotte v. Freeland, 20 N.C. App. 11, 200 S.E.2d 410 (N.C. Ct. App. 1973): The Mezzanottes agreed to buy real estate from the Freelands, contingent on securing a mortgage with terms "to their satisfaction." They obtained a mortgage from a different bank, but the Freelands refused to convey. Held: A promise conditioned on an event within the promisor\'s control is not illusory where the promisor impliedly promises reasonable effort, good faith, and honest judgment — so the agreement was supported by consideration and enforceable.'},
      {t:'exam', n:'Hypo (widget modification): Buyer contracts for 1,000 widgets at $100,000 ($100/each). After manufacture, the CEO demands an extra $1/widget; Buyer reluctantly agrees, then refuses to pay the extra $1,000. Because goods are involved, the UCC governs: modification requires no new consideration, only good faith. The key issue is whether the CEO\'s mid-performance demand was made in good faith — if not (coercion / no legitimate commercial reason), the modification is unenforceable.'},
      {t:'exam', n:'Seminar 7 conclusion: (1) Under the UCC, no new consideration is needed to modify a contract — only good faith. (2) Illusory promises do not bind the promisor to a legal detriment and cannot be consideration. (3) Output and requirements contracts are exceptions and are NOT illusory. (4) Promises implying reasonable effort, good faith, and honest judgment to bring about a condition are also not illusory.'}
    ,
      {t:'rule', n:'📖 §2.04 Promises to make a GIFT (gratuitous promises) are generally UNENFORCEABLE — they are not part of an exchange (Dougherty v. Salt — a note \'for value received\' that was really a gift; Kirksey v. Kirksey).'},
      {t:'concept', n:'§2.04[B] Conditional gift vs. bargain: when a gift promise has \'strings,\' ask whether the condition was bargained for (a request for consideration) or merely a limit on the donor\'s generosity / a step needed to receive the gift. Guidepost: does the promisor gain an advantage from the condition? (\'Come to my office to get $6 for lunch\' = conditional gift; a prize offered to induce auction attendance = bargained-for, Maughs v. Porter.)'},
      {t:'concept', n:'§2.04[C] Charitable pledges: courts strain to enforce them — finding consideration in other subscribers\' promises (\'I\'ll pledge if you will,\' Congregation B\'nai Sholom v. Martin), in naming rights, in an implied promise to use the funds as directed, or via promissory estoppel / foreseeable reliance. Restatement §90(2) would enforce a charitable pledge without proof of actual reliance, but few courts follow it (Allegheny College v. Nat\'l Chautauqua).'},
      {t:'concept', n:'Module 7 (Modification & Mutuality) also assigns §2.05 (adequacy of consideration, incl. illusory promises & Wood v. Lucy), §2.06[A] (one-sided modification & the pre-existing duty rule — Roth Steel; Angel v. Murray; UCC §2-209), and §2.07 (past consideration) — the full notes for those sections are in Week 6 (Module 6).'}
    ,
      {t:'rule', n:'§10.06 DUTY OF GOOD FAITH & FAIR DEALING — implied in EVERY contract (Rest. §205; UCC §1-304: \'every contract or duty imposes an obligation of good faith in its performance and enforcement\'). Origin: a duty not to interfere with the other party\'s performance (Patterson v. Meyerhofer — buyer bid against the seller at the foreclosure sale he needed to win to convey the land). Affirmative form: Kirke La Shelle v. Paul Armstrong — \'neither party shall do anything to destroy or injure the right of the other to receive the fruits of the contract.\''},
      {t:'rule', n:'§10.06[A] MEANING of good faith. UCC §1-201(b)(20) now defines it for everyone as \'HONESTY IN FACT and the observance of reasonable commercial standards of FAIR DEALING\' (the old merchant standard, extended to all). It is usually defined by the conduct it PREVENTS (Summers/Rest. §205 cmt.): evasion of the spirit of the deal, lack of diligence, abuse of a power to specify terms or determine compliance, \'weaseling\' interpretations, interfering with the other\'s performance, and abusing a termination right. Market Street Associates v. Frey (Posner): parties need not act altruistically or as fiduciaries — they just may not take OPPORTUNISTIC advantage of gaps/circumstances not contemplated when the contract was made.'},
      {t:'case', n:'Wood v. Lucy, Lady Duff-Gordon (N.Y. 1917, Cardozo) — §10.06[B] BEST/REASONABLE EFFORTS. A fashion designer gave Wood the exclusive right to market her endorsements; she paid nothing herself and sued him for using her name without her consent. The promise seemed ILLUSORY (Wood promised nothing express), but Cardozo implied a duty to use REASONABLE EFFORTS — his exclusive right + her pay being a % of his sales made the whole deal pointless otherwise. UCC §2-306(2) codifies a \'best efforts\' duty in exclusive-dealing contracts. Bloor v. Falstaff (express \'best efforts\' to promote Ballantine beer — can\'t let the acquired brand languish to favor its own).'},
      {t:'rule', n:'§10.06[C] Good faith cabins DISCRETION. Where a party holds discretion, it must be exercised in good faith: (1) REQUIREMENTS/OUTPUT contracts — quantity = actual good-faith requirements/output (UCC §2-306(1); Feld v. Levy — can\'t shut down output just to escape a bad price); (2) PRICE set by one party — \'a price to be fixed... means a price to fix in GOOD FAITH\' (§2-305(2); Best v. US National Bank — NSF fees must track the customer\'s reasonable expectations); (3) UNILATERAL TERMINATION — §2-309 requires reasonable NOTICE; loan-acceleration \'deems itself insecure\' clauses limited by §1-309 good faith; (4) MODIFICATIONS — enforceable without consideration if not procured by duress/bad faith (§2-209; Rest. §89).'},
      {t:'rule', n:'§10.06[C][5]-[8] Good faith in special settings: (5) EMPLOYMENT AT WILL — good faith plays a LIMITED role; an at-will employee can be fired for any/no reason, with narrow exceptions for discharge violating public policy (discrimination, whistleblowing); (6) LENDER LIABILITY — K.M.C. v. Irving Trust (bank\'s good-faith duty barred it from cutting off a credit line and demanding payment without giving the borrower a chance to refinance) — but Kham & Nate\'s Shoes (Easterbrook) reads the duty narrowly (no opportunistic exploitation, not altruism); (7) PERCENTAGE LEASES — a tenant may not divert business off the premises solely to cut percentage rent (Goldberg v. Levy); (8) INSURANCE — a bad-faith refusal to settle/pay a valid claim sounds in TORT.'}
    ]},
    { w:8, topic:'Consideration Substitutes — Moral Obligation & Promissory Estoppel', tags:['consideration substitutes','moral obligation','material benefit','promissory estoppel','Webb v. McGowin','Drennan'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §2.06, §2.07[D]; §§3.01–3.03. Required cases: Estate of Lovekamp; Sheldon v. Blackman; Anonymous v. Anonymous; Harrington v. Taylor; Webb v. McGowin; Feinberg v. Pfeiffer; Salsbury v. Northwestern Bell; Drennan v. Star Paving.'},
      {t:'concept', n:'Module 8 — consideration SUBSTITUTES: when a promise without consideration is still enforced. Moral obligation / the material-benefit rule (§2.06, 2.07[D]) and promissory estoppel (§§3.01–3.03; Feinberg v. Pfeiffer; Drennan v. Star Paving).'},
      {t:'exam', n:'📋 Module 8 (Consideration Substitutes — Moral Obligation & Promissory Estoppel): Graded — Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'concept', n:'Module 8 also assigns Ch. 2 §2.06 (pre-existing duty rule) and §2.07[D] (promises to pay obligations DISCHARGED BY OPERATION OF LAW — bankruptcy reaffirmation, statute-of-limitations debts, ratification of a minor\'s contract) as background to consideration SUBSTITUTES — full notes for those are in Week 6 (Module 6).'}
    ,
      {t:'rule', n:'§3.01 PROMISSORY ESTOPPEL (detrimental reliance) — the rule: a promise is enforceable WITHOUT consideration where the promisee has reasonably and foreseeably relied on it to his detriment, and injustice can be avoided only by enforcement. It is the alternative to a bargained-for exchange; the focus shifts from mutual inducement to the promisee\'s reliance.'},
      {t:'concept', n:'§3.01 Two distinct uses of promissory estoppel: (1) as a CONSIDERATION SUBSTITUTE — enforcing a gift-like promise (family, land, bailments, charity, pensions) where the bargain element is missing but the promisee changed position in reliance; and (2) as an almost TORT-LIKE INDEPENDENT cause of action — where a person took concrete action relying on an incomplete, indefinite, or otherwise unenforceable agreement (precontractual liability). It is also sometimes used to circumvent the Statute of Frauds (controversial, not universally accepted).'},
      {t:'rule', n:'§3.02[A] EQUITABLE ESTOPPEL (estoppel in pais) — the parent doctrine. Bars a person from asserting a fact at odds with his earlier MISREPRESENTATION OF FACT, where another reasonably relied to his detriment. Two key limits at common law: (1) it applied only to misrepresentations of PRESENT FACT, not to broken promises about the future; and (2) it could be used only as a SHIELD (to prevent a factual claim), never as a SWORD (to advance a claim).'},
      {t:'rule', n:'§3.02[A] Elements of equitable estoppel (Burdick v. Independent School Dist.): (1) a false representation or concealment of facts; (2) made with actual or constructive knowledge of the facts; (3) to a person without knowledge of, or the means of knowing, the facts; (4) with intent that it be acted upon; and (5) the person relied on it to his detriment. Missing element #1 (a misrepresentation of fact) = no relief — and most broken promises involve NO misrepresentation of fact, which is why promissory estoppel took so long to develop.'},
      {t:'concept', n:'§3.02[B] Bridges from equitable to promissory estoppel: (1) the thin line between a statement of fact (\'our policy is to accept the claim\') and a promise (\'we will accept the claim\'); (2) PROMISSORY FRAUD — misrepresenting one\'s present intent to perform IS a misrepresentation of fact (the fact being the promisor\'s current state of mind), so it supported a true equitable estoppel and was a short step to enforcing promises where the promisor merely changed his mind later (Rest. 2d Torts §530).'},
      {t:'case', n:'Kirksey v. Kirksey (Ala. 1845) — §3.02[B][3]. Brother-in-law wrote to his widowed sister-in-law offering her a place to live if she moved 60 miles to his land; she sold her land and moved with her children; two years later he evicted her. Held: NO consideration — his promise was a mere gratuity with a condition attached (she had to move to receive the gift), not a bargain. Illustrates the pre-promissory-estoppel trap: a clearly relied-upon promise went unenforced because reliance on a promise lacking consideration was deemed \'unreasonable.\''},
      {t:'case', n:'Ricketts v. Scothorn (Neb. 1898) — §3.02[B][5], the landmark. Grandfather gave Katie a $2,000 promissory note saying \'I have fixed out something that you have not got to work anymore\'; she quit her bookkeeping job in reliance. No consideration (he did not bargain for her to quit). Court enforced the note anyway via \'equitable estoppel / estoppel in pais,\' precluding the estate from asserting lack of consideration. This decision laid the groundwork for promissory estoppel as a means of enforcing relied-upon gratuitous promises.'},
      {t:'rule', n:'§3.03[A] ELEMENTS OF PROMISSORY ESTOPPEL (Restatement (Second) of Contracts §90): (1) a PROMISE; (2) which the promisor should REASONABLY EXPECT to induce action or forbearance (foreseeability); (3) ACTUAL reliance by the promisee (or a third person); and (4) injustice can be avoided only by ENFORCEMENT of the promise. Most courts add a 5th element or factor: the promisee\'s reliance must have been REASONABLE. Courts state the doctrine as having anywhere from three to five elements.'},
      {t:'rule', n:'§3.03[A][1] Element 1 — PROMISE: \'a manifestation of intention to act or refrain from acting in a specified way, so made as to justify the promisee in understanding a commitment has been made\' (Rest. 2d §2). Must be an outward manifestation of commitment, NOT a mere statement of present intent or plan (e.g., \'I plan to leave work at 5:30\'). The First Restatement required the promise to be \'clear and definite\'; the Second dropped that language, but some courts still require a clear/unequivocal promise.'},
      {t:'case', n:'Garwood Packaging v. Allen & Co. (7th Cir. 2004, Posner, J.) — §3.03[A][1]. Distinguishes a vague-but-real PROMISE (which can support promissory estoppel) from a mere expression of HOPE/OPTIMISM about a potential deal (which cannot). Incurring expenses in anticipation that one\'s hopes pan out is not enough — there must be an actual promise. Contrast Drennan, where a promise to keep an offer open was IMPLIED from the construction-bidding context.'},
      {t:'rule', n:'§3.03[A][2] Element 2 — ACTUAL RELIANCE (\'detrimental reliance\'): the promisee (or a third person) must have actually relied, by affirmative ACTION (Ricketts — quitting a job; Feinberg — retiring) or by FORBEARANCE (a creditor not suing; Wright v. Newman — mother not pursuing the biological father). Reliance by a THIRD PERSON counts: D\'Oench, Duhme & Co. v. FDIC (note issued to a bank, FDIC relied on it). Some courts require the reliance to be \'definite and substantial.\''},
      {t:'case', n:'Hayes v. Plantations Steel Co. (R.I. 1982) — §3.03[A][2]. Employee had ALREADY announced his retirement before the employer promised a pension; held NOT enforceable — his prior decision showed he did not actually rely on the promise in retiring. Contrast Feinberg v. Pfeiffer (Mo. 1959) and Katz v. Danny Dare (Mo. 1980), where employees acted (retired / chose pension over being fired) in genuine reliance. Pitts v. McGraw-Edison: forcibly retired employee took no action in reliance — unenforceable.'},
      {t:'rule', n:'§3.03[A][3]–[4] Elements 3 & 4 — REASONABLENESS & FORESEEABILITY. Reliance must be REASONABLE (many courts make this a separate element; the Rest. 2d treats it as a factor in the injustice analysis) — reliance may be UNreasonable due to no prior relationship, a stale/delayed reliance, the promisor\'s reputation for backing out, or an indefinite promise. The action/forbearance must also have been FORESEEABLE: §90 enforces only reliance the promisor \'should reasonably expect to induce\' — mirroring the foreseeability limit in contract damages (Hadley).'},
      {t:'rule', n:'§3.03[A][5] Element 5 — INJUSTICE avoidable ONLY by enforcement (the \'wild card,\' more a question of law than fact). Rest. 2d §90 cmt. b factors: (1) reasonableness of the reliance; (2) the \'definite and substantial character\' of the action taken, relative to the remedy sought; (3) the formality with which the promise was made; (4) the extent the evidentiary/cautionary/deterrent/channeling functions of form are met by the setting; and (5) other policies (enforcing bargains, preventing unjust enrichment). Courts rarely invoke this element expressly; wasted time, money, and effort usually show the injustice.'},
      {t:'rule', n:'§3.03[A][6] ADJUSTMENT OF REMEDY: \'the remedy granted for breach may be limited as justice requires\' (Rest. 2d §90). Courts may limit recovery to RELIANCE damages (out-of-pocket expenses incurred) rather than full EXPECTATION (the promised benefit). Goodman v. Dicker (D.C. Cir. 1948): franchisee got reliance expenses, NOT lost profits, on a promise a franchise \'would be\' granted. Kaufman v. Miller: improver of land got a LIEN for the value of improvements rather than specific performance. Reliance is the usual measure in PE cases (split with courts using expectation).'},
      {t:'concept', n:'§3.03[B] FAMILY GIFT PROMISES — a core PE category (Kirksey, Ricketts). Enforceable where the family member reasonably and foreseeably relied, by action OR forbearance. Wright v. Newman (Ga. 1996): promise to \'assume the obligations of fatherhood\' led the mother to forbear from seeking support from the biological father — enforceable via detrimental reliance. But a bare family promise with NO reliance fails: Dewein v. Dewein\'s Estate (brother\'s promise to care for sister, who did nothing in reliance — unenforceable).'},
      {t:'concept', n:'§3.03[C] PROMISES TO CONVEY LAND — often blend reliance with preventing UNJUST ENRICHMENT. Seavey v. Drake (N.H. 1882): son took possession, paid taxes, and built improvements on land his father promised to deed — enforceable (improvements both supplied the \'consideration\' and satisfied the Statute of Frauds). Boone v. Coe (Ky. 1913): plaintiff moved cross-country relying on a promise to lease land but made NO improvements conferring a benefit — UNenforceable (SOF barred it). Ragosta v. Wilder (Vt. 1991): buyers who incurred financing expense and showed up to buy stated a PE claim.'},
      {t:'case', n:'Siegel v. Spear & Co. (N.Y. 1923) — §3.03[D] gratuitous bailments. Lienholder volunteered to store Siegel\'s furniture and to buy insurance on it (at Siegel\'s expense); failed to insure; furniture burned. Held liable on the gratuitous bailment. The old MISFEASANCE (defective performance — liable) vs. NONFEASANCE (total non-performance — not liable) distinction was satisfied because Spear had taken possession. MODERN promissory estoppel discards that distinction — a relied-upon promise to obtain insurance is enforceable whether performed badly or not at all (Shoemaker v. Commonwealth Bank).'},
      {t:'case', n:'Allegheny College v. National Chautauqua County Bank (N.Y. 1927, Cardozo, J.) — §3.03[E] charitable subscriptions. Mrs. Johnston pledged $5,000 for a memorial ministry fund, paid $1,000, then repudiated. Cardozo enforced it — nominally finding CONSIDERATION (the college\'s implied return promise to maintain a memorial in her name) but famously declaring in dictum that New York had \'adopted the doctrine of promissory estoppel as the equivalent of consideration\' for charitable subscriptions. King v. Trustees of Boston University (Mass. 1995): Dr. King\'s promise to donate his papers, on which BU spent indexing/staffing, was enforceable.'},
      {t:'rule', n:'§3.03[E] Charitable subscriptions — a pledge to a charity normally lacks consideration (no bargain). Three approaches: (1) strain to FIND consideration (other subscribers\' promises, naming rights, implied promise to use funds as directed) — Allegheny College; (2) Rest. 2d §90(2) would enforce a charitable pledge WITHOUT proof of consideration OR reliance (Salsbury v. Northwestern Bell) — minority view; (3) require actual consideration OR reliance (Maryland Nat\'l Bank v. United Jewish Appeal). Merely budgeting the pledged gift is NOT reliance (Congregation Kadimah Toras-Moshe v. DeLeo).'},
      {t:'case', n:'Drennan v. Star Paving Co. (Cal. 1958, Traynor, C.J.) — §3.03[F] commercial/construction bidding, the leading case. A general contractor used a subcontractor\'s paving bid in computing its own bid; after the GC won the job, the sub tried to revoke (claiming a clerical error). Held: an IMPLIED promise to keep the sub-bid open arose because GCs necessarily rely on sub-bids; the GC\'s reasonable reliance (binding himself in his own bid) made the offer irrevocable under §90. Rest. 2d §87(2) codifies this. (Contrast the older James Baird v. Gimbel Bros., L. Hand, refusing PE in the bid setting.)'},
      {t:'rule', n:'§3.03[G] PROMISSORY ESTOPPEL & THE STATUTE OF FRAUDS — controversial. Rest. 2d §139 allows PE to overcome the SOF where injustice can be avoided only by enforcement. Some jurisdictions accept it; others are skeptical. Brown v. Branch (Ind. 2001): giving up a modest job, leaving school, and moving back to Indiana on a promise of a house did NOT show the \'unjust and unconscionable injury\' needed to escape the SOF. Alaska Airlines v. Stephenson: a 2-year oral employment promise WAS enforced where the employee left prior work and moved to Alaska in reliance. Skepticism is strongest in the one-year (duration) cases.'},
      {t:'case', n:'Hoffman v. Red Owl Stores (Wis. 1965) — §3.04, the landmark INDEPENDENT / PRECONTRACTUAL cause of action. Over years Red Owl induced Hoffman to sell his bakery, move, and invest, promising a grocery franchise — then backed out. No traditional contract existed (store location, lease, and terms were never settled), yet the court awarded RELIANCE damages. Holding: §90 does NOT require the promise to be as definite as an offer that could ripen into a contract — PE protects reliance on encouragement during negotiations, not just gratuitous promises.'},
      {t:'concept', n:'§3.04 PE as an independent cause of action / PRECONTRACTUAL LIABILITY: extends PE beyond a consideration substitute to enforce promises made during negotiations where no final agreement was reached (Hoffman v. Red Owl; cf. Goodman v. Dicker, decided on equitable estoppel via a false \'approved\' representation). But this branch has had \'spectacular failures\': at-will employees usually lose absent a definite commitment (Stearns v. Emery-Waterhouse); courts enforce conspicuous disclaimers in letters of intent (Empro v. Ball-Co; W.R. Grace v. Taco Tico); vague \'expressions of hope\' are not promises (Garwood).'},
      {t:'concept', n:'§3.05 PE IN INTERNATIONAL TRANSACTIONS: PE is a common-law outgrowth of the consideration doctrine and did NOT develop on the European continent (where consideration isn\'t required). But reliance is widely protected: CISG Art. 16(2)(b) makes an offer irrevocable if the offeree reasonably relied on it as irrevocable (a \'modified PE\' needing no foreseeability/detriment — Geneva Pharmaceuticals v. Barr Labs); CISG Art. 29(2) precludes a party from enforcing a no-oral-modification clause where the other relied; UNIDROIT Principles & PECL similarly protect reliance and impose a duty to negotiate in GOOD FAITH (liability for breaking off negotiations in bad faith — a Red Owl analog).'},
      {t:'rule', n:'§3.06 RESTITUTION (a separate body of law — Rest. (Third) of Restitution & Unjust Enrichment) — prevents UNJUST ENRICHMENT: \'a person who is unjustly enriched at the expense of another is subject to liability in restitution\' (§1). Restores to a party any benefit conferred on the other. \'Specific restitution\' (returning the very thing) is sometimes available (wine delivered to wrong address; funds deposited in wrong account); otherwise the benefit is valued (cost vs. price vs. market value). Four recurring situations: (1) PURE restitution (no contract); (2) restitution as an alternative remedy for TOTAL breach (rescission); (3) restitution for part performance under an UNENFORCEABLE agreement; (4) restitution FOR a breaching party who conferred a benefit (offset by the injury caused).'}
    ]},
    { w:9, topic:'Parol Evidence Rule', tags:['parol evidence','integration','interpretation','UCC 2-202','Mitchill v. Lath'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§6.01–6.06 (Parol Evidence Rule). Required cases: Mitchill v. Lath; Lee v. Joseph E. Seagram & Sons; UCC §2-202; George v. Davoli; Raffles v. Wichelhaus; Nanakuli Paving v. Shell Oil. (Optional: Pacific Gas & Electric v. G.W. Thomas Drayage; Trident Center v. Connecticut General.)'},
      {t:'concept', n:'Module 9 — the PAROL EVIDENCE RULE (§§6.01–6.06): when a final/integrated writing bars prior or contemporaneous evidence; integration, exceptions, and interpretation (Mitchill v. Lath; UCC §2-202; Raffles v. Wichelhaus; Nanakuli Paving).'},
      {t:'exam', n:'📋 Module 9 (Parol Evidence Rule): Graded — Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'rule', n:'PAROL EVIDENCE RULE (definition — Seminar 9): the rule prevents a party from introducing evidence of a separate PRIOR or CONTEMPORANEOUS agreement (usually oral) to prove that a written contract is inaccurate or incomplete — i.e., to contradict or vary a writing the parties intended as the final expression of their agreement. \'Parol\' = outside the writing (oral OR prior written).'},
      {t:'concept', n:'KEY LIMIT — the PER bars only PRIOR or CONTEMPORANEOUS agreements, NEVER a SUBSEQUENT one. Evidence of a later oral modification is always outside the rule (a subsequent agreement can\'t have been \'integrated\' into an earlier writing). Rationale: once parties reduce a deal to a final writing, that writing is the most reliable evidence of their intent, so earlier negotiations that didn\'t make it in are presumed abandoned.'},
      {t:'rule', n:'THE RULE ONLY APPLIES TO AN INTEGRATED WRITING, and how much it bars depends on the DEGREE of integration: (1) a PARTIAL integration (final as to the terms it contains, but not complete) bars evidence that CONTRADICTS the writing, but ALLOWS consistent ADDITIONAL terms; (2) a TOTAL / FULLY integrated writing (final AND complete — the whole deal) bars BOTH contradictory terms AND consistent additional terms. So step one is always: is the writing integrated, and is it partial or total?'},
      {t:'case', n:'Lee v. Joseph E. Seagram & Sons (2d Cir. 1977) — Seminar 9 required case. Lee offered to sell his liquor distributorship (Capitol City) to Seagram, conditioned on Seagram\'s oral promise to relocate Lee and his sons in a new distributorship of their own in another city. The written sale agreement did NOT include the relocation promise. Held: the parol evidence of the relocation promise was ADMISSIBLE — the writing was NOT a complete (total) integration; the relocation promise was a separate, collateral agreement that a reasonable party might naturally leave out of the sale document. Main point: the PER bars separate oral agreements that CONTRADICT the writing, but it does NOT apply where the writing was not a complete integration.'},
      {t:'case', n:'Mitchill v. Lath (N.Y. 1928) — the classic contrast case (in the reading). Buyer of a farm claimed the sellers had orally promised to remove an unsightly ice house across the road; the written land-sale contract said nothing about it. Held: evidence of the oral ice-house promise was EXCLUDED. A collateral oral agreement is admissible only if (1) it is collateral in form, (2) it does NOT contradict the writing, and (3) it is one that parties would NOT ordinarily be expected to embody in the writing. The court (four-corners approach) found such a promise would naturally have been included in a full land contract, so the writing was treated as fully integrated.'},
      {t:'rule', n:'DETERMINING INTEGRATION (Seminar 9) — is the writing fully integrated? Look for: (1) an INTEGRATION / MERGER CLAUSE (\'this writing is the complete and exclusive statement of the agreement\') — strong evidence of total integration; and if none, apply one of two judicial approaches: (2) the \'FOUR CORNERS\' RULE — the court looks only at the writing itself to decide if it appears complete (stricter, Williston/Mitchill v. Lath); or (3) the \'SURROUNDING CIRCUMSTANCES\' / \'surrounding evidence\' RULE — the court admits extrinsic evidence about the negotiations to decide whether the writing contained the parties\' full agreement (more liberal, Corbin/Lee v. Seagram, UCC).'},
      {t:'rule', n:'EXCEPTIONS — parol evidence is ALWAYS admissible (the rule doesn\'t bar it) to show: (1) NO valid contract was ever formed / a formation defect — fraud, duress, undue influence, mistake, illegality, or lack of consideration; (2) a CONDITION PRECEDENT to the contract\'s taking effect (the writing was not to be operative until some event); (3) the MEANING of an ambiguous term (interpretation); (4) a separate CONSISTENT COLLATERAL agreement supported by its own consideration; (5) a SUBSEQUENT modification; and (6) grounds for REFORMATION (a clerical/scrivener\'s error). These come in because they don\'t contradict a final writing — they attack whether/what the writing means or whether it\'s enforceable at all.'},
      {t:'rule', n:'UCC §2-202 (sale of goods) — a distinct, more liberal PER. Terms in a final writing may NOT be contradicted by prior/contemporaneous evidence, BUT they may always be EXPLAINED or SUPPLEMENTED by (a) course of dealing, usage of trade, and course of performance, AND (b) consistent additional terms UNLESS the court finds the writing was intended as a COMPLETE and EXCLUSIVE statement (i.e., totally integrated). Trade usage/course of dealing come in even against a seemingly complete writing (Nanakuli Paving v. Shell — trade usage of \'price protection\' and course of performance read into the express price term).'},
      {t:'rule', n:'INTERPRETATION vs. the PER — extrinsic evidence to INTERPRET (not contradict) is a separate inquiry. PLAIN-MEANING approach: if the writing is unambiguous on its face, extrinsic evidence of meaning is excluded. CONTEXT approach (Traynor, Pacific Gas & Electric v. G.W. Thomas Drayage): admit extrinsic evidence to show the parties\' intended meaning even of \'clear\' words, because words have no absolute meaning (cf. Trident Center v. Connecticut General, criticizing PG&E). Raffles v. Wichelhaus (the two ships \'Peerless\'): a latent ambiguity with each party reasonably meaning a different thing = mutual misunderstanding, so NO contract — extrinsic evidence admissible to show the ambiguity.'},
      {t:'exam', n:'Seminar 9 hypo 1 — Able & Baker make an oral agreement and sign a writing that incorporates ALL of its terms. Integration? YES — the writing captures the full agreement, so it is (at least) integrated; if it is complete it is a TOTAL integration and the PER bars prior/contemporaneous terms.'},
      {t:'exam', n:'Seminar 9 hypo 2 — same facts, but Able & Baker, unsatisfied, agree to have the writing REDRAFTED. Integration? NO (not yet) — a writing the parties themselves treat as tentative/subject to redrafting is not their FINAL expression, so it is not an integration and the PER does not attach until they adopt a final writing.'},
      {t:'exam', n:'Seminar 9 hypo 3 — written corn contract: Seller to sell 400 bushels at $5; later Seller can supply only 300 and Buyer ORALLY agrees to accept 300 at $5. Does the PER bar the oral agreement? NO — the oral agreement is SUBSEQUENT to the writing, and the PER only bars prior/contemporaneous agreements. A later modification is always outside the rule (its enforceability turns on modification law/UCC §2-209, not the PER).'},
      {t:'exam', n:'Seminar 9 hypo 4 — Lawyer orally agrees to sell his law library to Examinee for $1,500, but the parties agree the deal won\'t take effect \'unless Examinee passes the bar\'; the later signed writing omits that contingency. In Lawyer\'s breach suit, is evidence of the bar-exam contingency admissible? YES — it is a CONDITION PRECEDENT to the contract\'s taking effect, an established exception to the PER (the evidence shows the writing was never operative, not that its terms are different). Admissible.'},
      {t:'exam', n:'PER analysis ROADMAP (use on an essay): (1) Is there a FINAL WRITING? (2) Is the offered evidence PRIOR/CONTEMPORANEOUS (rule may bar) or SUBSEQUENT (never barred)? (3) Is the writing INTEGRATED — partial or total? (merger clause / four-corners / surrounding-circumstances). (4) Does the evidence CONTRADICT (barred if any integration) or merely ADD a consistent term (barred only if TOTAL integration)? (5) Does an EXCEPTION apply (fraud/duress/mistake/illegality, condition precedent, interpretation of ambiguity, collateral agreement, reformation)? (6) UCC? apply §2-202 (trade usage/course of dealing/performance always come in). State \'Here… Therefore…\' at each step.'}
    ]},
    { w:10, topic:'Defenses — Statute of Frauds', tags:['statute of frauds','writing','MY LEGS','exceptions','part performance'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§5.01–5.08 (Statute of Frauds). Required cases: C.R. Klewin v. Flagship Properties; Hopper v. Lennen & Mitchell; Azevedo v. Minister; Cohn v. Fisher; Potter v. Hatter Farms; Yarbro v. Neil B. McGinnis Equipment; Dienst v. Dienst; Shaughnessy v. Eidsmo. (Optional: Crabtree v. Elizabeth Arden; Costco v. World Wide Licensing; Lawrence v. Anderson.)'},
      {t:'concept', n:'Module 10 — the STATUTE OF FRAUDS (§§5.01–5.08): which contracts must be in a signed writing, the writing\'s requirements, and the exceptions (part performance, part payment, specially manufactured goods, admission, merchant\'s confirmatory memo).'},
      {t:'exam', n:'📋 Module 10 (Defenses — Statute of Frauds): Graded — Resource Quiz (10 pts); Seminar (2 pts).'}
    ,
      {t:'concept', n:'Module 10 presentation — DEFENSES TO ENFORCEMENT, overview. Once you have offer + acceptance + consideration you have a valid contract, but a defect or defense arising during (or before) negotiations can still block enforcement. Beginning with this module we study those defenses. A defense renders a contract unenforceable in one of THREE ways — void, voidable, or unenforceable — and the label matters (courts use the terms, and different consequences follow).'},
      {t:'rule', n:'VOID — the strongest form. A void contract creates NO obligations at all; whatever prevents enforcement means neither party owes anything (e.g., a contract void as against public policy). The parties are left where they are found — money invested or effort spent is simply lost, and NEITHER party has a cause of action against the other. (Narrow exceptions are beyond this course.)'},
      {t:'rule', n:'VOIDABLE — \'able to be made void.\' A valid contract exists, but the party who suffers the defect has the POWER to void it — or to enforce it. It is a CHOICE, not automatic: the protected party may avoid the contract OR affirm and enforce it. Sometimes only one party holds that power; sometimes both do. (Ex: contracts of minors, or those induced by fraud/duress/undue influence, are voidable by the protected party.)'},
      {t:'rule', n:'UNENFORCEABLE — a valid contract (offer + acceptance + consideration all present), but a legal RULE bars enforcement UNTIL its requirements are satisfied. Once the requirement is met, the contract becomes FULLY enforceable and can be breached or performed like any other. The classic example is the STATUTE OF FRAUDS: an oral contract within the statute is unenforceable until a sufficient signed writing (or an exception) satisfies it. (Contrast void [no contract ever] and voidable [a party may choose to escape].)'},
      {t:'rule', n:'STATUTE OF FRAUDS (§§5.01–5.08) — certain contracts must be evidenced by a signed writing to be enforceable. It is a defense that makes an otherwise-valid ORAL contract UNENFORCEABLE (not void or voidable). Categories that must be in writing — mnemonic \'MY LEGS\': Marriage (promises made in consideration of marriage), Year (contracts that cannot possibly be performed within one year of formation), Land (transfers of an interest in real property), Executor (a promise by an executor to pay estate debts from his OWN funds), Goods $500+ (UCC §2-201), Surety (a promise to answer for the debt/default of another).'},
      {t:'rule', n:'SOF — the WRITING requirement. The writing need not be a formal contract; it must (1) identify the parties, (2) indicate that a contract was made and its subject matter, (3) state the essential terms, and (4) be SIGNED by the \'party to be charged\' (the party against whom enforcement is sought). A \'signature\' is any mark/symbol made with intent to authenticate (initials, letterhead, an electronic signature — E-SIGN/UETA). The memorandum can be pieced together from SEVERAL documents (some signed, some not) if they clearly refer to the same transaction (Crabtree v. Elizabeth Arden).'},
      {t:'rule', n:'SOF — the ONE-YEAR provision. Only a contract that, by its terms, CANNOT POSSIBLY be performed within one year of formation is within the statute; measured from the moment of formation, if there is ANY possibility of completion within a year, it is NOT within the one-year clause (even if performance actually takes longer). A contract of indefinite or lifetime duration is therefore NOT within the one-year provision, because it could end within a year. C.R. Klewin v. Flagship Properties — an oral agreement of indefinite duration is not within the one-year clause and need not be written.'},
      {t:'rule', n:'SOF for GOODS — UCC §2-201: a contract for the sale of goods for $500 or more is unenforceable without a signed writing, but the UCC is lenient — the writing need only (1) indicate a contract was made and (2) state a QUANTITY term, and be signed by the party to be charged; it is enforceable only up to the quantity stated. Wrong/omitted terms other than quantity don\'t defeat it.'},
      {t:'rule', n:'SOF EXCEPTIONS (an oral contract within the statute is still enforceable if): (1) PART PERFORMANCE of a land contract — the buyer takes possession, pays part/all of the price, and/or makes improvements (Shaughnessy v. Eidsmo); (2) FULL PERFORMANCE (esp. of the one-year type); (3) PROMISSORY ESTOPPEL / detrimental reliance (Rest. §139); and — for GOODS under §2-201(3) — (4) SPECIALLY MANUFACTURED goods not suitable for resale, (5) a judicial ADMISSION that a contract was made, and (6) goods for which PAYMENT has been made and accepted or which have been received and accepted (part performance).'},
      {t:'rule', n:'SOF — MERCHANT\'S CONFIRMATORY MEMO (UCC §2-201(2)): between TWO MERCHANTS, if one sends a signed written confirmation of an oral agreement within a reasonable time, and the recipient has reason to know its contents, the writing satisfies the SOF against the RECIPIENT too — even though the recipient never signed — UNLESS the recipient objects in writing within 10 days. (Azevedo v. Minister.) This is an exception to the rule that only the party who signed can be bound.'},
      {t:'concept', n:'SOF — the EFFECT (ties back to the void/voidable/unenforceable framework): the statute does NOT make the contract void or voidable — it makes it UNENFORCEABLE until a sufficient signed writing (or an exception) satisfies it. Once satisfied, the contract is fully enforceable like any other. The SOF is an affirmative defense that can be waived if not raised. Also note it can work injustice by letting a party escape a real oral deal — which is why courts developed the reliance/part-performance exceptions.'},
      {t:'case', n:'Key SOF cases: C.R. Klewin v. Flagship Properties (one-year — indefinite-duration contract not within the statute); Crabtree v. Elizabeth Arden (the memorandum may be assembled from multiple signed + unsigned writings relating to the same deal); Azevedo v. Minister (merchant confirmatory memo / §2-201(2)); Cohn v. Fisher (a signed CHECK can serve as the memorandum/quantity writing for goods); Yarbro v. McGinnis Equipment (MAIN-PURPOSE exception to the suretyship provision — see note below); Shaughnessy v. Eidsmo (part performance of a land contract — possession + payment + improvements); Dienst v. Dienst (marriage-consideration provision); Hopper v. Lennen & Mitchell (one-year provision).'}
    ,
      {t:'concept', n:'Seminar 10 — the FULL list of DEFENSES TO CONTRACT FORMATION (the enforceability defenses studied across Modules 10–14): Duress, Frustration of Purpose, Lack of Capacity, Misrepresentation or Fraud, Mistake, Illegal Subject Matter, Impossibility, Impracticability, Indefiniteness, Statute of Frauds, Unconscionability, and Undue Influence. This module (10) focuses on the Statute of Frauds; the others follow.'},
      {t:'rule', n:'Seminar 10 — SOF in 3 requirements: to satisfy the Statute of Frauds you need (1) A DOCUMENT, (2) SIGNED BY THE PARTY TO BE CHARGED, (3) CONTAINING ALL ESSENTIAL TERMS — EXCEPT under the UCC, where only the QUANTITY term is required. Two big exceptions relax these: the merchant\'s confirming memo (relaxes the signature requirement) and the main-purpose rule (removes suretyship from the statute entirely).'},
      {t:'case', n:'Azevedo v. Minister (Nev. 1970) — MERCHANT\'S CONFIRMING MEMO. Azevedo orally agreed to buy hay from Minister, but the total quantity was disputed. Azevedo put $20,000 in escrow and Minister provided periodic accountings; when the escrow ran short, Minister loaded only 2 of the 4 trucks Azevedo sent, and Azevedo refused to buy more. Main point: a sale of goods over $500 must be in writing, BUT the merchant\'s confirming memorandum is an exception — between merchants, Minister\'s signed periodic accountings satisfied the SOF against Azevedo even without Azevedo\'s signature (§2-201(2): both merchants, sent in a reasonable time, recipient had reason to know the contents, no objection within 10 days, and the memo has enough terms to bind the sender).'},
      {t:'rule', n:'MAIN-PURPOSE (PRIMARY-PURPOSE) RULE — the key exception to the SURETYSHIP provision. A suretyship promise (to answer for another\'s debt) normally must be in writing. BUT when the promisor\'s MAIN PURPOSE is NOT to answer for another\'s debt but to secure a SUBSTANTIAL BENEFIT FOR HIMSELF — which he actually obtains as the consideration for his promise — the promise is (1) enforceable even though ORAL and (2) supported by good and sufficient consideration. In short: if the guarantor guarantees the debt mainly to benefit himself, no writing is required.'},
      {t:'case', n:'Yarbro v. Neil B. McGinnis Equipment Co. (Ariz. 1966) — the MAIN-PURPOSE rule. Yarbro lacked credit to buy a tractor, so he had Russell buy it; when Russell couldn\'t pay, Yarbro ORALLY agreed to make the payments and made the first one, then both defaulted. Held: Yarbro\'s oral promise was ENFORCEABLE — his main purpose was not to answer for Russell\'s debt but to secure a substantial benefit for himself (use of the tractor), so the suretyship writing requirement did not apply and the promise was supported by consideration. (This is why Yarbro is a MAIN-PURPOSE case, not a reliance case.)'}
    ]},
    { w:11, topic:'Defenses — Capacity, Duress, Undue Influence & Mistake', tags:['capacity','duress','undue influence','misrepresentation','unconscionability','mistake'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§10.01–10.05; §§11.01, 11.02 (Capacity, Duress, Undue Influence, Mistake). Required cases: Gallon v. Lloyd-Thomas; Austin Instrument v. Loral; Methodist Mission Home v. N.A.B.; Chandelor v. Lopus; Cousineau v. Walker; Wood v. Boynton; Nelson v. Rice; Raffles v. Wichelhaus; Hoffman v. Chapman. (Optional incl. Vokes v. Arthur Murray; Sherwood v. Walker; Williams v. Walker-Thomas.)'},
      {t:'concept', n:'Module 11 — formation DEFENSES (§§10.01–10.05; 11.01–11.02): capacity, duress, undue influence, misrepresentation/fraud, unconscionability, and mistake (mutual vs. unilateral).'},
      {t:'exam', n:'📋 Module 11 (Defenses — Capacity, Duress, Undue Influence, Mistake): Graded — Resource Quiz (10 pts); Module Quiz (20 pts); Essay Quiz (100 pts, 1 hr closed book); Seminar (2 pts).'}
    ,
      {t:'rule', n:'§10.01 THREE WAYS TO DEFEND a breach claim: (1) DENY an element — the plaintiff must prove a contract was made (Duty = Mutual Assent + Consideration), Breach, Causation, and Damage (same shape as a tort claim); (2) DEMUR — a Rule 12(b)(6) motion to dismiss: even if every fact is true, the law gives no relief (efficient — no discovery/trial); (3) AFFIRMATIVE DEFENSE — prove extra facts that strip the claim of legal effect (this chapter). Ch. 10 covers the affirmative defenses of illegality, incapacity, improperly obtained assent, and unconscionability.'},
      {t:'rule', n:'§10.02 PUBLIC POLICY / ILLEGALITY: a contract (or a term) is unenforceable if it violates public policy. You must identify a SPECIFIC public policy (not just \'do good, avoid evil\') — e.g., free competition, protecting families, public safety. If a statute expressly bars it, no balancing is needed (\'no court should be paymaster of the wages of crime\'). Otherwise BALANCE (Rest. §178) the interest in enforcing private agreements (parties\' expectations, forfeiture) against the strength of the offended policy, likelihood non-enforcement advances it, and the deliberateness of the misconduct.'},
      {t:'rule', n:'§10.02[A][1] ILLEGAL PURPOSE: an agreement to commit a crime or tort is void (point-shaving; hiring to injure). Even a facially-legal contract is VOID if made to circumvent a legal proscription — Trees v. Kersey (joint venture to evade a builder-licensing law) — or if it furthers an illegal purpose — Bovard v. American Horse Enterprises (contract to make drug paraphernalia void though not itself criminal; court inferred the policy from the drug statutes).'},
      {t:'rule', n:'§10.02[A][2] RESTRAINT OF TRADE: price-fixing, market-division, and bid-rigging are void (and Sherman Act felonies). But a COVENANT NOT TO COMPETE is enforceable if (a) ANCILLARY to a legitimate contract (sale of a business, employment, franchise) and (b) REASONABLE in geographic scope and duration — narrowly tailored to protect the buyer/employer\'s legitimate interest (goodwill, trade secrets, customer lists).'},
      {t:'case', n:'Fine Foods v. Dahlin (Vt. 1987) vs. Valley Medical Specialists v. Farber (Ariz. 1999) — §10.02[A][2] noncompetes. Fine Foods ENFORCED a 5-year/25-mile restaurant noncompete on the seller of a business (reasonable). Farber struck down a physician noncompete (3 years / 5 miles of any office) as UNREASONABLE — broader than needed, no emergency-care exception, not limited to his specialty, and the public\'s interest in access to medical care + the doctor-patient relationship weighed against it. Overbroad covenants: courts either void the clause, apply the \'BLUE-PENCIL\' rule to strike offending words, or reform it. Lawyers may NOT make noncompetes (Model Rule 5.6).'},
      {t:'rule', n:'§10.02[A][3] LICENSING LAWS: enforceability turns on the law\'s PURPOSE. If the license PROTECTS THE PUBLIC (regulatory — doctors, lawyers, builders), an unlicensed party\'s contract is unenforceable and she cannot collect her fee. If the license is merely REVENUE-raising, lack of a license does NOT bar enforcement. Substantial compliance (license pending then granted — McNairy v. Sugar Creek) and restitution to avoid forfeiture are sometimes allowed.'},
      {t:'case', n:'In re Baby M (N.J. 1988) — §10.02[A][4] family relationships. A surrogacy contract (surrogate paid to bear a child and surrender parental rights) VIOLATED public policy: it conflicted with the adoption statute\'s ban on paying for a child (\'baby selling\'), the policy that custody turn on the BEST INTERESTS OF THE CHILD (not a pre-birth agreement), and the presumption that children be raised by natural parents. Prenuptial agreements, by contrast, are valid only if fair/reasonable and made after FULL DISCLOSURE of assets. Cohabitation agreements: Marvin v. Marvin.'},
      {t:'rule', n:'§10.02[A][5]–[6] GAMBLING & LIABILITY WAIVERS. Gambling: an illegal wager is consideration paid for a chance to win a prize → gambling debts (and checks for them) are unenforceable. Exculpatory / liability WAIVERS (skiing, skydiving, gyms) are generally enforceable IF clear and conspicuous, the risk is appreciated, and they do NOT excuse reckless or grossly negligent conduct — but are UNENFORCEABLE for a public duty / practical necessity (Tunkl v. Regents — medical care; common carriers; employers). UCC good-faith duties cannot be disclaimed (§1-302); a limited remedy fails if unconscionable or if it \'fails of its essential purpose\' (§2-719).'},
      {t:'rule', n:'§10.02[B] EFFECT OF ILLEGALITY — void vs. voidable. A contract wholly illegal (crime, bribery) is VOID ab initio — no contract at all, enforceable by neither party. Most public-policy problems make the contract merely VOIDABLE — unenforceable at the election of the protected party, who may still AFFIRM it (a homeowner can enforce against an unlicensed contractor, but the contractor cannot enforce against the homeowner). Illegal TERMS can be SEVERED (blue-pencil), leaving the rest intact.'},
      {t:'rule', n:'§10.02[B][3] RESTITUTION for benefits under an illegal contract is often DENIED — courts \'leave the parties where they find them\' rather than promote the illegality (Hartman v. Harris — stolen-statue profit-sharing; Harry Berenter v. Berman — unlicensed builder gets nothing, owner keeps the improvements). Restitution IS allowed where the violation was unintentional/inadvertent (Pelletier v. Johnson) or where the parties are NOT in pari delicto (equally at fault).'},
      {t:'rule', n:'§10.03 INCAPACITY: contracts require capacity to consent. Contracts by minors, the mentally impaired, or the intoxicated are generally VOIDABLE at the incapacitated party\'s election (the other, capable party cannot use the incapacity to escape) and may be RATIFIED once capacity is restored.'},
      {t:'rule', n:'§10.03[A] MINORS (under 18): a minor\'s contract is voidable BY THE MINOR, not the adult — \'he who deals with a minor does so at his peril\' (Keser v. Chagnon). On disaffirmance the minor must return what remains but is generally NOT liable for use/wear/depreciation (Halbman v. Lemke; Kiefer v. Fred Howe Motors) — the seller bears that risk. RATIFICATION after majority is express OR by retaining benefits beyond a reasonable time (Bobby Floars Toyota — 10 months = ratified; Adams v. Barcomb — 2 months = not).'},
      {t:'rule', n:'§10.03[A][3]–[5] Minors, cont. MISREPRESENTATION OF AGE: some courts still let the minor disaffirm; others ESTOP him (must show reasonable reliance, not blind reliance on a fake ID a routine check would expose). NECESSARIES (food, shelter, clothing, medical care): minor is liable in RESTITUTION (quasi-contract) for their value — housing is a necessary only if the minor cannot live with a parent/guardian (Webster St. Partnership v. Sheridan). Most courts treat EMANCIPATED minors as adults. LIABILITY WAIVERS for minors\' activities are generally unenforceable — even a parent usually cannot waive a child\'s injury claim without court approval.'},
      {t:'rule', n:'§10.03[B] MENTAL INCAPACITY. Voidable, and can be ratified once capacity returns — BUT a person ADJUDICATED incompetent (under guardianship) makes VOID contracts (no ratification; even a \'lucid interval\' doesn\'t help). Two tests where there is no adjudication: (1) COGNITIVE test (Rest. §15(1)(a)) — unable to understand the nature/consequences of the transaction (Hauer v. Union State Bank); (2) VOLITIONAL test (§15(1)(b)) — unable to act reasonably in relation to the transaction AND the other party HAS REASON TO KNOW of the condition (Ortelere v. Teachers\' Retirement Bd.; used in bipolar/manic-episode cases). §10.03[B][3] INTOXICATION: relief only if incapable of understanding/acting reasonably AND the other party has reason to know of the impairment (§16) — courts are unsympathetic (often self-induced).'},
      {t:'rule', n:'§10.04[A] IMPROPER PERSUASION — the baseline. Contract law assumes ARM\'S-LENGTH dealing and caveat emptor: each party may press its own self-interest (\'contract law does not proceed on the philosophy that I am my brother\'s keeper\' — Posner). But that is not \'anything goes\'; the doctrines below (fraud, duress, undue influence, unconscionability) police the worst tactics.'},
      {t:'rule', n:'§10.04[B] MISREPRESENTATION vs. the tort of DECEIT. The tort of deceit needs 8 hard elements: (1) statement of fact, (2) material, (3) false, (4) scienter (defendant knew it was false), (5) intent to induce reliance, (6) actual reliance, (7) reasonable reliance, (8) pecuniary loss. CONTRACT rescission is far easier — you need NOT prove the maker knew it was false or intended to deceive. A misrepresentation is \'an assertion not in accord with the facts\' (§159); the contract is voidable if the misrep was FRAUDULENT or MATERIAL and JUSTIFIABLY relied on (§164).'},
      {t:'rule', n:'§10.04[B][2][a] FRAUD IN THE FACTUM vs. FRAUD IN THE INDUCEMENT. Fraud in the factum (\'execution\') — the victim is tricked about the very NATURE of what she signs (thinks it\'s a receipt, it\'s a note) — prevents formation, so the contract is VOID (and even a good-faith purchaser/holder in due course takes subject to it). Fraud in the inducement — a false statement induces assent to a known agreement — makes it merely VOIDABLE. The factum type is rare (usually loan documents).'},
      {t:'rule', n:'§10.04[B][2][b] FACT vs. OPINION. Usually there must be a misrepresentation of FACT, not opinion (\'good car\' = opinion). EXCEPTION: a false EXPERT opinion is actionable — Vokes v. Arthur Murray (dance studio\'s false praise of a student\'s \'potential\' → rescission of 2,000+ hours of lessons); Rodi v. Southern New England School of Law (school\'s misrepresented opinion on its ABA-accreditation prospects).'},
      {t:'rule', n:'§10.04[B][2][d]-[e] FRAUDULENT vs. MATERIAL misrepresentation. FRAUDULENT (§162(1)) — the maker knew it was false, believed it false, lacked the confidence he stated, or lacked the basis he implied (includes RECKLESS statements — conscious ignorance, e.g. \'the basement never floods\' when she\'s never seen it). MATERIAL (§162(2)) — likely to induce a REASONABLE person to assent, OR the maker knows it will induce THIS person. Even a wholly INNOCENT misrep supports rescission if material: Halpert v. Rosenthal (innocent \'termite-free\' statement); Cousineau v. Walker (innocent \'gravel deposit\'). Idiosyncratic materiality can count if the maker knows of the buyer\'s special interest (the John Hartford banjo).'},
      {t:'rule', n:'§10.04[B][2][f] JUSTIFIED RELIANCE: the misrep must have been ACTUALLY and JUSTIFIABLY relied on — a LESS demanding standard than the \'reasonable\' reliance required for promissory estoppel. The victim\'s mere negligence in not investigating doesn\'t defeat reliance unless it violates good faith / reasonable standards of fair dealing (§172). Hardest cases: reliance on opinions, on easily-checked questions of law, or on statements of present intent.'},
      {t:'rule', n:'§10.04[B][3] NONDISCLOSURE: silence is a misrepresentation only if there is a DUTY TO SPEAK (§161). The duty arises in 4 situations: (a) to correct a prior statement that has become false; (b) to correct the other party\'s mistake about a BASIC ASSUMPTION where non-disclosure is not in good faith (e.g. known unilateral mistake); (c) active CONCEALMENT (Kracl v. Loseke — sheetrock over termite damage = \'garden-variety fraud\'); (d) a FIDUCIARY/confidential relationship. Stambovsky v. Ackley (undisclosed \'haunted\' reputation) and Reed v. King (undisclosed murders) — material because of the \'quantifiable effect on market value.\''},
      {t:'rule', n:'§10.04[B][4] NO-RELIANCE / merger clauses: the Restatement refuses to enforce them (§196), but courts commonly ENFORCE a SPECIFIC (not general boilerplate) disclaimer of reliance if it was freely negotiated and not itself induced by fraud — LaFazia v. Howe and Danann Realty v. Harris (specific clauses barred fraud claims); Rissman v. Rissman (Posner — \'boilerplate\' language is no less binding for being reused). Some courts still let a no-reliance clause block innocent/negligent misrep but NOT intentional fraud.'},
      {t:'rule', n:'§10.04[C] DURESS: a contract is voidable when assent is induced by an IMPROPER THREAT that leaves the victim NO REASONABLE ALTERNATIVE (§175). PHYSICAL duress — the victim\'s hand is forced, or (some courts) an imminent physical-harm threat — makes the contract VOID; a threat of future harm makes it merely VOIDABLE (EverBank v. Marini — signed day after threat = voidable, so a good-faith-purchaser assignee could still enforce). Improper threats (§176): to commit a crime/tort, of criminal prosecution, a bad-faith civil suit, or a threat that harms the recipient without benefiting the threatener.'},
