<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law School Knowledge Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #1a1a2e;
    --ink-mid: #3d3d5c;
    --ink-soft: #6b6b8a;
    --rule: #e2e2ec;
    --bg: #f8f8fc;
    --bg-card: #ffffff;
    --contracts: #1e4fd8;
    --contracts-bg: #eef3ff;
    --torts: #166534;
    --torts-bg: #edfdf4;
    --legal: #5b21b6;
    --legal-bg: #f3eeff;
    --amber: #854d0e;
    --amber-bg: #fef9ec;
    --tag-bg: #f0f0f8;
    --tag-text: #4a4a6a;
    --concept-bg: #e8f0fe; --concept-text: #1a3a8f;
    --case-bg: #dcfce7; --case-text: #14532d;
    --rule-bg: #fef3c7; --rule-text: #78350f;
    --exam-bg: #fce7f3; --exam-text: #831843;
    --grade-bg: #fff7ed; --grade-text: #9a3412;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
  
  /* Layout */
  .shell { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  
  /* Header */
  .site-header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1.5px solid var(--rule); }
  .site-header h1 { font-size: 22px; font-weight: 600; color: var(--ink); letter-spacing: -.3px; }
  .site-header p { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  
  /* Course cards */
  .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 12px; margin-bottom: 1rem; }
  .course-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 1.1rem 1.2rem; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
  .course-card:hover { box-shadow: var(--shadow); border-color: #c8c8e0; }
  .course-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .06em; padding: 2px 9px; border-radius: 100px; margin-bottom: 9px; }
  .b-contracts { background: var(--contracts-bg); color: var(--contracts); }
  .b-torts { background: var(--torts-bg); color: var(--torts); }
  .b-legal { background: var(--legal-bg); color: var(--legal); }
  .b-amber { background: var(--amber-bg); color: var(--amber); }
  .course-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .course-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; }
  .course-meta { display: flex; gap: 14px; font-size: 11px; color: var(--ink-soft); }
  .course-meta strong { color: var(--ink-mid); }
  
  /* View system */
  .view { display: none; }
  .view.active { display: block; }
  
  /* Course view header */
  .view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .view-left { display: flex; align-items: center; gap: 10px; }
  .back-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg-card); color: var(--ink-soft); cursor: pointer; transition: background .12s; }
  .back-btn:hover { background: var(--bg); }
  .view-title { font-size: 16px; font-weight: 600; color: var(--ink); }
  .view-actions { display: flex; gap: 7px; }
  .btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 6px 13px; border-radius: 7px; border: 1px solid var(--rule); background: var(--bg-card); color: var(--ink-mid); cursor: pointer; transition: background .12s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn-ai { border-color: var(--contracts); color: var(--contracts); }
  .btn-ai:hover { background: var(--contracts-bg); }
  .btn-danger { color: #c0392b; border-color: #fca5a5; }
  .btn-danger:hover { background: #fff5f5; }
  
  /* Week cards */
  .weeks { display: flex; flex-direction: column; gap: 8px; }
  .week-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; }
  .week-hdr { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.1rem; cursor: pointer; }
  .week-hdr:hover { background: var(--bg); }
  .week-left { display: flex; align-items: center; gap: 12px; }
  .week-num { font-size: 11px; font-weight: 600; color: var(--ink-soft); min-width: 52px; }
  .week-topic { font-size: 14px; font-weight: 600; color: var(--ink); }
  .week-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 3px; }
  .tag { font-size: 10px; padding: 1px 7px; border-radius: 100px; background: var(--tag-bg); color: var(--tag-text); }
  .week-right { display: flex; align-items: center; gap: 8px; }
  .week-count { font-size: 11px; color: var(--ink-soft); }
  .chev { font-size: 13px; color: var(--ink-soft); transition: transform .2s; }
  .chev.open { transform: rotate(180deg); }
  .week-body { border-top: 1px solid var(--rule); padding: 1rem 1.1rem; display: none; }
  .week-body.open { display: block; }
  
  /* Notes */
  .notes-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 6px; }
  .note { display: flex; align-items: flex-start; gap: 7px; padding: 7px 0; border-bottom: 1px solid var(--rule); }
  .note:last-of-type { border-bottom: none; }
  .ntype { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 100px; flex-shrink: 0; margin-top: 1px; }
  .nt-concept { background: var(--concept-bg); color: var(--concept-text); }
  .nt-case { background: var(--case-bg); color: var(--case-text); }
  .nt-rule { background: var(--rule-bg); color: var(--rule-text); }
  .nt-exam { background: var(--exam-bg); color: var(--exam-text); }
  .nt-grade { background: var(--grade-bg); color: var(--grade-text); }
  .ntext { font-size: 13px; line-height: 1.6; color: var(--ink-mid); flex: 1; }
  .del-note { padding: 2px 5px; font-size: 10px; border-radius: 4px; border: 1px solid #fca5a5; background: transparent; color: #c0392b; cursor: pointer; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
  .note:hover .del-note { opacity: 1; }
  .note-actions { display: flex; gap: 7px; margin-top: 10px; }
  
  /* Empty */
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink-soft); font-size: 13px; background: var(--bg); border-radius: var(--radius); border: 1px dashed var(--rule); }
  
  /* Grade banner */
  .grade-banner { background: var(--grade-bg); border: 1px solid #fcd5b0; border-radius: 7px; padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: var(--grade-text); }
  
  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(10,10,30,.4); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal { background: var(--bg-card); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: var(--ink); }
  .field { margin-bottom: .9rem; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--rule); background: var(--bg); color: var(--ink); }
  .field textarea { min-height: 80px; resize: vertical; }
  .nbuilder { border: 1px solid var(--rule); border-radius: 7px; padding: 8px; margin-bottom: .8rem; }
  .nrow { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .nrow select { width: 100px; flex-shrink: 0; font-size: 12px; padding: 5px 7px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg); }
  .nrow input { flex: 1; font-size: 12px; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg); }
  .nrow .rm { padding: 4px 7px; border: 1px solid var(--rule); background: transparent; border-radius: 5px; cursor: pointer; font-size: 11px; color: var(--ink-soft); }
  .add-note-row { font-size: 12px; color: var(--contracts); background: none; border: none; cursor: pointer; padding: 3px 0; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }
  .m-cancel { padding: 7px 16px; font-size: 13px; border-radius: 7px; border: 1px solid var(--rule); background: transparent; color: var(--ink-soft); cursor: pointer; }
  .m-save { padding: 7px 16px; font-size: 13px; border-radius: 7px; border: 1px solid var(--contracts); background: var(--contracts); color: #fff; cursor: pointer; font-weight: 500; }
  
  /* Add course btn */
  .add-course-btn { margin-top: .5rem; }

  /* Header sync + sign-out */
  .site-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .hdr-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .sync-pill { font-size: 11px; color: var(--ink-soft); white-space: nowrap; }
  .signout-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--rule); background: var(--bg-card); border-radius: 6px; color: var(--ink-soft); cursor: pointer; }
  .signout-btn:hover { background: var(--bg); }

  /* Login screen */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 1rem; }
  #login-screen.hidden { display: none; }
  .shell.hidden { display: none; }
  .login-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 14px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: var(--shadow); }
  .login-card h2 { font-size: 19px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
  .login-card p { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 1.3rem; }
  .login-card input { width: 100%; font-size: 14px; padding: 10px 12px; border: 1px solid var(--rule); border-radius: 8px; background: var(--bg); color: var(--ink); margin-bottom: 10px; }
  .login-card button { width: 100%; padding: 11px; border: none; border-radius: 8px; background: var(--contracts); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-card button:disabled { opacity: .6; cursor: default; }
  .login-err { color: #c0392b; font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="login-screen" class="hidden">
  <div class="login-card">
    <h2>Law School Hub</h2>
    <p>Sign in with your Real Estate Hub login. Your notes sync automatically across your desktop and laptop.</p>
    <input type="email" id="li-email" placeholder="Email" autocomplete="username">
    <input type="password" id="li-pw" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="li-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<div class="shell hidden" id="appshell">
  <header class="site-header">
    <div class="hdr-left">
      <h1>Law School Knowledge Hub</h1>
      <p>Purdue Global Law School — track what you learn each week, organized by course.</p>
    </div>
    <div class="hdr-right">
      <span class="sync-pill" id="sync-pill">☁ Synced</span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <!-- HOME -->
  <div id="home-view" class="view active">
    <div class="course-grid" id="clist"></div>
    <button class="btn add-course-btn" onclick="openAddCourse()">+ Add course</button>
  </div>

  <!-- COURSE VIEW -->
  <div id="course-view" class="view">
    <div class="view-header">
      <div class="view-left">
        <button class="back-btn" onclick="goHome()">← Courses</button>
        <span class="view-title" id="cv-title"></span>
      </div>
      <div class="view-actions">
        <button class="btn btn-ai" onclick="openAI()">✦ Ask Claude ↗</button>
        <button class="btn" onclick="openAddWeek()">+ Add week</button>
      </div>
    </div>
    <div class="weeks" id="wlist"></div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-root"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const SEED = {
  cl600: { id:'cl600', name:'CL600 — Intro to Legal Analysis 1', badge:'b-legal', label:'LEGAL ANALYSIS', weeks:[
    { w:1, topic:'Case briefing & FIRAC framework', tags:['FIRAC','case brief','Cohen v. Petty'], notes:[
      {t:'concept', n:'📖 Reading — Writing and Analysis in the Law, Ch. 1 (pp. 1–33) & Ch. 2 (pp. 35–47). Also save the Case Briefing Format document, and read Cohen v. Petty carefully for the Seminar.'},
      {t:'exam', n:'📋 Module 1 (Welcome to the Study of Law / Case Briefing): Graded — Seminar Quiz (closed book, 10 pts); Fundamentals Assignment (10 pts); Seminar (2 pts). Course note: 7 live seminars (Modules 1, 3, 5, 7, 9, 11, 13), up to 2 pts each = 14 pts; plus up to 6 holistic participation pts graded in Module 15.'},
      {t:'rule', n:'FIRAC: Facts → Issue → Rule → Analysis → Conclusion. Required format for CL600.'},
      {t:'concept', n:'Issue: ALWAYS frame as a question — you lose points if you do not.'},
      {t:'concept', n:'Conclusion must be labeled "Conclusion" in CL600, not "Holding."'},
      {t:'concept', n:'Disposition vs. Conclusion: Disposition = procedural result (affirmed/reversed). Conclusion = substantive legal answer.'},
      {t:'case', n:'Cohen v. Petty, 65 F.2d 820 (D.C. Cir. 1933): Passenger injured when driver fainted and lost control. Trial court directed verdict for Petty; Cohen appealed. Module 1 sample FIRAC practice case.'},
      {t:'exam', n:'Academic integrity: closed-book = no books, notes, AI, or internet. Do not share curriculum or answers.'}
    ,
      {t:'concept', n:'📖 Writing and Analysis in the Law, Ch. 2 — Analyzing Legal Authority: Case Law: how to read and brief cases, analyze common-law causes of action by their elements, use a decision (reasoning by analogy + applying precedent), and synthesize multiple cases.'},
      {t:'concept', n:'Two purposes for reading cases: in DOCTRINAL classes — to understand an area\'s principles, how they evolved, the conflicts/policies, and to apply the case to hypotheticals (put the case in context). In LEGAL WRITING / PRACTICE — to predict the case\'s IMPACT on your client; read selectively within your jurisdiction, focusing only on the issues that bear on your problem.'},
      {t:'concept', n:'Structure of a reported case: the CAPTION (parties, court, date); the SYNOPSIS (a publisher\'s summary — never quote or cite it; use it only to judge relevance); the HEADNOTES (publisher summaries tagged with a topic + Key Number for digest research — also never cite); the attorneys of record; the authoring judge; then the OPINION itself.'},
      {t:'concept', n:'Most opinions follow a pattern: an introductory paragraph stating the issue(s) and the court\'s disposition; a fact statement (including the procedural history and the lower courts\' decisions); then the ANALYSIS — often each party\'s arguments, then the relevant RULE, then the court\'s RATIONALE (its application of authority plus policy).'},
      {t:'concept', n:'Four common types of POLICY arguments courts use: SOCIAL-GOAL (does the rule advance moral principles, social goals, or justice?), ECONOMIC (the efficient allocation of resources), INSTITUTIONAL-COMPETENCE (the proper role of each branch of government), and JUDICIAL-ADMINISTRATION (is the rule practical to administer?).'},
      {t:'case', n:'Sinn v. Burd (Pa. 1979) — negligent infliction of emotional distress to a BYSTANDER. Pennsylvania had already abandoned the \'impact rule\' for the \'zone of danger\' rule (Niederman v. Brodsky), but Sinn extended recovery BEYOND the zone of danger using FORESEEABILITY: a mother who saw her child struck and killed could recover. The court rejected five policy arguments against bystander recovery (proof of causation, fraud, floodgates of litigation, unlimited liability, and circumscribing liability) and adopted the Dillon factors.'},
      {t:'rule', n:'Dillon v. Legg factors for whether a bystander\'s emotional injury was reasonably FORESEEABLE: (1) the plaintiff was near the scene of the accident (vs. far away); (2) the shock came from a direct, sensory, CONTEMPORANEOUS observation of the accident (vs. learning of it later from others); and (3) the plaintiff and the victim were closely RELATED.'},
      {t:'concept', n:'A case brief (W&A version) has six parts: (1) FACTS — the parties, the basis of the suit, the relief sought, the procedural history, the facts relevant to the issue, and background; (2) ISSUE(s); (3) HOLDING(s); (4) LEGAL RULE & REASONING; (5) POLICY; and (6) REFLECTION (your own evaluation).'},
      {t:'concept', n:'Pay attention to PROCEDURAL POSTURE — it shapes what the court actually decides. For example, on appeal from a GRANTED motion to dismiss, the appellate court decides only whether the complaint STATED A CLAIM (whether the suit may continue), NOT who should ultimately win the case.'},
      {t:'rule', n:'Many common-law causes of action are defined by ELEMENTS, and the plaintiff must prove EACH one to win (failing any single element loses the case). Watch for DISJUNCTIVE (\'or\' — prove either) vs. CONJUNCTIVE (\'and\' — prove both) elements. Example — assault: the defendant (1) intentionally (2) acted to place the plaintiff in apprehension (3) of a harmful OR offensive (4) physical contact.'},
      {t:'rule', n:'Reasoning by analogy: two cases are ANALOGOUS if they are alike in ways important to the outcome and their differences don\'t destroy that likeness — analogous cases should reach the same result. ANALOGIZE (argue the precedent\'s facts are materially similar) vs. DISTINGUISH (argue they are materially different). A distinguishing fact must be LEGALLY SIGNIFICANT (it tends to prove or disprove the rule) — do not distinguish on trivial differences.'},
      {t:'rule', n:'Applying precedent — ISSUES: the precedent\'s issue should be essentially the SAME as your problem\'s. You can sometimes broaden the issue by characterizing the key facts more broadly (e.g., recast a grandmother who did not live with the victim as a \'close family member\'). A case on a similar but not identical issue can still apply if its reasoning and policies are relevant — in Last v. ___, the court used the rule from Juvelis even though Juvelis decided domicile for federal benefits rather than for diversity jurisdiction.'},
      {t:'concept', n:'Applying precedent — FACTS: the facts need not be identical, only classifiable SIMILARLY. The LEVEL OF ABSTRACTION matters: describing both parties as a \'vulnerable buyer in a weak bargaining position\' links a small gas-station owner to a consumer, but recast as \'consumer vs. commercial enterprise\' the analogy breaks; a rule about \'motor vehicles\' can reach snowmobiles or mopeds.'},
      {t:'rule', n:'Applying precedent — HOLDING breadth: you can frame a holding NARROWLY (limit it to its facts, so it controls few future cases) or BROADLY (so it reaches more cases), depending on your client\'s goal — broaden a FAVORABLE precedent to cover your facts, and narrow an UNFAVORABLE one so it does not. But you may NOT manipulate the facts to violate the sense of the case (that is unethical and faulty analysis).'},
      {t:'concept', n:'Applying precedent — REASONING & POLICY: the precedent\'s reasoning must apply equally to your facts, and if the same POLICY underlies the rule, the result should be the same. Example — a rule upholding liability releases for competitive racing (policies: the public interest in the sport; experienced participants who can calculate their risks) would NOT extend to a release signed by an inexperienced cave-tour tourist, because neither policy applies.'},
      {t:'concept', n:'SYNTHESIZING cases = relating multiple cases to one another so you can apply the law as a whole, not case-by-case. Courts often synthesize for you (a Restatement definition is many holdings combined). Judges work INDUCTIVELY — from specific cases to a general rule; synthesis is the step BETWEEN your research and your writing.'},
      {t:'rule', n:'Three types of case synthesis: (1) GROUPING cases by the rule they follow (used for a case of first impression — to argue which rule is better); (2) DEFINING the ELEMENTS of a claim or defense from evolving case law (e.g., parental immunity from a child\'s suit requires that the child is a MINOR and the suit is for NEGLIGENCE); and (3) identifying the FACTORS — the general categories of facts — that courts weigh to decide a cause of action.'},
      {t:'concept', n:'Analyze INDUCTIVELY but WRITE DEDUCTIVELY: work out the rule by analyzing the individual cases (inductive), but in your writing START with the synthesized rule as a topic sentence and then use the cases as support — do NOT just narrate the cases one-by-one in chronological order (that merely recreates your research and leaves the analysis to the reader). Note: \'factors\' can mean required elements (as in Sinn/Dillon) OR merely types of facts a court weighs without requiring a set result (as with student-domicile factors).'}
    ,
      {t:'concept', n:'📖 Writing and Analysis in the Law, Ch. 1 — Introduction to the legal system & legal writing: primary sources, court structure, the life of a civil case, precedent/stare decisis, the holding-vs-dicta skill, statutes, and citation.'},
      {t:'concept', n:'A lawyer\'s most important sources are PRIMARY sources: case law (judicial decisions) and ENACTED law (constitutions, statutes, administrative regulations). Research enacted law FIRST — constitutions and statutes take precedence over case law — but then find the cases interpreting them. Where no statute or constitution applies, the COMMON LAW (judge-made law) supplies the rule.'},
      {t:'concept', n:'Three tiers of courts: COURTS OF INFERIOR jurisdiction (limited case types, e.g., small claims; informal; decisions unpublished and not precedent); TRIAL COURTS (usually general jurisdiction; one judge; the trier of fact \'finds\' the facts and applies the law); and APPELLATE COURTS (review for reversible error — no new trial, evidence, or jury; decided by panels of 3+ judges).'},
      {t:'concept', n:'A civil case begins when the plaintiff files a COMPLAINT (and serves a summons) stating enough facts to give the defendant notice of the claim. Most jurisdictions use \'NOTICE PLEADING\' (FRCP 8 — a \'short and plain statement\'), but in FEDERAL court the complaint must now plead enough detail to make the claim PLAUSIBLE (Bell Atlantic Corp. v. Twombly; Ashcroft v. Iqbal).'},
      {t:'concept', n:'The defendant responds with an ANSWER (replying to each allegation; may raise affirmative defenses) or a MOTION TO DISMISS for failure to state a claim (a \'demurrer\' in some states) — arguing that even if all alleged facts are true, they establish no cause of action. A trial brief / memorandum of law is an ADVOCACY document submitted to the court (vs. the analytical office memo kept inside the firm).'},
      {t:'concept', n:'DISCOVERY gathers information: depositions (oral testimony under oath, transcribed by a court reporter), interrogatories (written questions), affidavits (sworn written statements), and document requests. A motion for SUMMARY JUDGMENT asks the court to decide without trial by applying the law to the discovered facts — it CANNOT be granted if any MATERIAL fact is genuinely in dispute (then there must be a trial).'},
      {t:'rule', n:'Precedent is BINDING authority only if decided by a HIGHER court in the SAME jurisdiction; otherwise it is merely PERSUASIVE (a court may consider but need not follow it). Search for binding precedent first; for a \'case of first impression\' (never litigated in the jurisdiction), look to how courts in other jurisdictions have analyzed the problem.'},
      {t:'rule', n:'A case\'s HOLDING is the court\'s decision on the issue litigated — often defined as \'the judgment plus the material facts.\' It differs from a general RULE or a DEFINITION: e.g., \'a contract requires an offer and an acceptance\' is a rule, while \'the defendant\'s letter saying he was ‘considering asking 23¢ a pound’ was not an offer because it lacked fixed, definite terms\' is a holding.'},
      {t:'concept', n:'Formulating a holding turns on which facts are MATERIAL and how broadly to state them. Stated too NARROWLY, a holding will not reach your client\'s situation; stated too BROADLY (e.g., \'household pet\' instead of \'growling bulldog\'), it sweeps in different considerations. Attorneys frame a holding broadly or narrowly to favor the client — and you should not blindly accept the court\'s own statement of its holding.'},
      {t:'concept', n:'In re Gaunt illustrates holding vs. dictum: an uncle orally promised his nephew a watch kept in a safe-deposit box but died before delivering it. HELD — no valid gift, because a completed gift requires intent, DELIVERY, and acceptance, and there was no delivery. The court\'s remark that handing over the key \'may have been a constructive delivery\' is DICTUM (the key was never given).'},
      {t:'rule', n:'DICTA are statements not necessary to the decision (not based on material facts) — not binding, though sometimes persuasive later. Use the correct verb: a court FINDS facts (\'the court found the car was going 90 mph\'), HOLDS on the legal question (\'the court held the defendant guilty of reckless driving\'), and SAYS / states / explains for dicta.'},
      {t:'rule', n:'Weight of authority when WRITING: first identify and explain the BINDING law of the problem\'s jurisdiction — start with any relevant statutes and the cases interpreting them, then the highest court\'s case law, then lower courts. Do NOT lead with other jurisdictions\' law or with encyclopedias/dictionaries when controlling law exists.'},
      {t:'concept', n:'Factors affecting a case\'s WEIGHT as authority: the level of the deciding court (a state supreme court outranks a lower court); the reputation of the court/judge (e.g., the Cardozo-era New York Court of Appeals; the Traynor-era California Supreme Court); whether the court was unanimous (majority outweighs a concurrence/dissent); the year and continuing validity of the reasoning; how fully the issue was discussed; and the factual similarity to your problem.'},
      {t:'rule', n:'Enacted-law hierarchy: U.S. Constitution → federal statutes & treaties → federal executive orders/regulations → state constitutions → state statutes → state regulations → municipal enactments. A legislature may change the common law by statute (which then supersedes it), but a court may not refuse to follow a valid statute (though it may strike it down as unconstitutional). Cases interpreting a statute are case law and precedent — but NOT common law (the rule originates with the legislature).'},
      {t:'concept', n:'CITATION supports your assertions, lets readers find the source, and avoids plagiarism (use Bluebook or ALWD form; in memos/briefs cites go in the TEXT, not footnotes). Note the special rule of legal \'common knowledge\': even a well-known proposition (e.g., \'a contract requires offer and acceptance\') still needs a citation to authority. Changing a few words in a quote makes it an ALTERED QUOTATION (use quotation marks + brackets/ellipses), NOT a paraphrase.'}
    ]},

      {t:'concept', n:'📖 American Legal Systems, Ch. 1 — \'The U.S. Legal Systems Revealed\': an overview of (A) the U.S. Constitution, (B) the federal & state judicial systems, (C) the sources of law, and (D) U.S. civil litigation.'},
      {t:'concept', n:'The U.S. Constitution is the national charter and the source of ALL federal law. Ratified in 1788, it is the longest-existing written national constitution and is notably concise/short.'},
      {t:'concept', n:'Historical path to the Constitution: colonists sought opportunity and a transparent, accountable government that respected individual rights → resented centralized British rule (no separation of powers, denied rights/freedoms) → the American Revolution → the Articles of Confederation (the first national charter).'},
      {t:'concept', n:'The Articles of Confederation created a heavily DEcentralized \'league of friendship\' with a weak national government — no power to tax or spend (so it could not raise an army or navy) and no power over interstate commerce, leading to the \'economic Balkanization\' of the states (Hughes v. Oklahoma). A meeting called to amend the Articles instead became the drafting event for the Constitution.'},
      {t:'concept', n:'Components of the Constitution: a Preamble (thematic and aspirational — it creates no rights or obligations); 7 Articles (the body); and 27 Amendments (structural changes + individual rights and liberties). Gaps and ambiguities are filled in by the courts.'},
      {t:'rule', n:'Federalism: power is shared between the national and state governments. The national/federal government has strong but LIMITED powers — only those ENUMERATED in the Constitution. The states keep residual (\'police\') power, each has its own constitution and three branches, and states may delegate power to local governments.'},
      {t:'rule', n:'Separation of powers & checks and balances: the Legislative branch makes federal law, the Executive administers it, and the Judicial branch resolves disputes and \'says what the law is\' (Marbury v. Madison, 1803). Each branch has some power to \'check\' the others.'},
      {t:'case', n:'Marbury v. Madison (1803): the judicial branch \'says what the law is\' — the foundational statement of judicial review.'},
      {t:'concept', n:'The Bill of Rights = the first ten amendments to the Constitution, guaranteeing numerous individual rights and liberties.'},
      {t:'concept', n:'The U.S. has independent, autonomous federal and state judicial systems. The federal judiciary is created by Article III (establishing the Supreme Court and empowering Congress to create \'inferior\' courts); each state\'s system is the product of that state\'s own laws.'},
      {t:'rule', n:'Federal courts are organized hierarchically and geographically: a pyramid with the Supreme Court at the apex, the U.S. courts of appeals in the middle, and the district courts at the base. Geographically — the Supreme Court (nationwide jurisdiction), 12 regional circuits (each with one court of appeals), and 94 district courts (1–4 per state, as established by Congress).'},
      {t:'rule', n:'Federal courts are courts of LIMITED jurisdiction — they may hear a case only if it (1) falls within their subject-matter jurisdiction AND (2) meets justiciability (\'case or controversy\') requirements. Most are courts of GENERAL jurisdiction in that they handle the full range of matters (they are not specialized).'},
      {t:'concept', n:'Federal judges have no constitutionally-stated qualifications; they are nominated by the President, confirmed by the Senate, and appointed by the President. Their independence is protected by life tenure (\'during good Behaviour\') and a guarantee of no diminution in salary.'},
      {t:'rule', n:'State judicial systems vary but commonly use a three-tier hierarchy: a court of last resort (apex — often, but not always, called the state Supreme Court), an intermediate appellate court, and a court of first instance (trial). Specialized courts (probate, family, juvenile, small claims, traffic, etc.) are common.'},
      {t:'rule', n:'A state\'s court of last resort is the ULTIMATE arbiter of that state\'s law — all other courts, state and federal, \'stand in the shoes\' of that court when applying that state\'s law (an important outgrowth of federalism).'},
      {t:'rule', n:'Primary sources of law = positive legal authorities that IMPOSE rights and obligations — constitutions, legislation, administrative rules/regulations, and case law (created by all three branches, at the federal and state levels). Secondary sources do NOT impose rights/obligations — law reviews, books, Restatements & treatises (highly regarded), and websites (use caution).'},
      {t:'rule', n:'Hierarchy of sources: federal law is supreme to state law (Supremacy Clause, Art. VI). WITHIN one sovereignty the order of priority is: (1) Constitution, (2) statutes & treaties, (3) regulations/administrative issuances, (4) case law (precedent). Caveat: this ranking understates judge-made law — every constitutional, statutory, or regulatory provision is applied in light of relevant precedent.'},
      {t:'rule', n:'Binding (mandatory/controlling) authority = a court is REQUIRED to apply it (applicable constitutional, statutory, and regulatory authorities; some case law is binding too). Persuasive authority = a court considers it in the ABSENCE of binding authority and is free to follow, modify, or reject it. Secondary sources are NEVER binding.'},
      {t:'concept', n:'Case law — also called precedent, common law, or decisional law — is judge-made law. Under stare decisis (\'let it stand\'), U.S. courts tend to follow principles announced in earlier opinions involving similar issues and facts; in some situations precedent is binding on later courts.'},
      {t:'concept', n:'U.S. civil litigation is ADVERSARIAL and party-driven: the parties, through their attorneys, define the issues, investigate the facts, and present arguments and evidence, while the trial judge is relatively passive. More than 90% of civil and criminal cases settle; ADR is common — arbitration (parties waive court; an arbitrator or, more often, a panel of 3 decides; awards are typically binding and not appealable) and mediation (a neutral helps the parties; if unresolved, they resume court).'},
      {t:'rule', n:'Other features of U.S. litigation: a constitutional right to a jury trial in most civil and criminal cases (shaping pre-trial discovery and the rules of evidence); punitive damages (beyond compensatory damages — to punish the wrongdoer and deter undesirable behavior, typically available where the defendant caused death or serious bodily injury through intentional or reckless conduct); and limited appeals — generally only after final judgment, on legal issues only (the trial court\'s factual findings stand), and only on issues preserved by objection below.'}
    ,
      {t:'concept', n:'📖 American Legal Systems, Ch. 2 — The U.S. Constitution: (A) introduction, (B) the seven Articles, (C) the 27 Amendments, and (D) constitutional interpretation.'},
      {t:'concept', n:'The Constitution = a Preamble + 7 Articles + 27 Amendments. The Preamble (\'We the People…\') is aspirational and thematic — it creates NO binding rights or obligations. The Articles establish, organize, and empower the national government; the Amendments add structural changes and individual rights. The U.S. is a common-law system (not civil-law).'},
      {t:'concept', n:'Article I — Legislative branch: vests \'all [federal] legislative Powers\' in a bicameral Congress (House + Senate) responsible for enacting federal law.'},
      {t:'rule', n:'House of Representatives (\'lower\' chamber, but EQUAL lawmaking power): 435 members apportioned among the states by population (census every 10 years); 2-year terms, unlimited re-election; qualifications — ≥25 years old, ≥7 years a U.S. citizen, inhabitant of the state. Special powers: spending bills must ORIGINATE in the House; sole power to impeach.'},
      {t:'rule', n:'Senate (\'higher\' chamber, EQUAL lawmaking power): 100 members (2 per state); 6-year terms, unlimited re-election; qualifications — ≥30 years old, ≥9 years a citizen, inhabitant of the state. Special powers: ratifies treaties, confirms major presidential appointments (department heads, ambassadors, judges), and tries impeachments.'},
      {t:'rule', n:'Lawmaking: identical bills must pass BOTH chambers, then either the President signs OR a 2/3 vote in each chamber overrides a veto. Congress\'s powers are LIMITED to those enumerated — especially Article I §8 (incl. interstate commerce and the Necessary & Proper Clause) plus the enforcement powers of the 13th, 14th, 15th, and 16th Amendments.'},
      {t:'concept', n:'Article II — Executive branch: a President, a Vice President, and other federal officers charged with enforcing federal law — the President must \'take care that the laws be faithfully executed.\''},
      {t:'rule', n:'Powers of the President: execute/enforce the law; sign or veto legislation; Commander-in-Chief; conduct foreign affairs; nominate & appoint judges, ambassadors, and high officers (with Senate \'advice and consent\'). Terms: 4 years, maximum two elected terms. Qualifications: natural-born citizen, ≥35 years old, ≥14 years a U.S. resident.'},
      {t:'rule', n:'The President is elected INDIRECTLY through the Electoral College: citizens vote for pledged electors; each state\'s electors = its Senators (2) + Representatives, and most states use \'winner-take-all,\' giving less-populous states greater relative power — so the popular-vote winner does not always win. Removal: impeachment by the House (simple majority) + conviction by the Senate (2/3) for treason, bribery, or other high crimes and misdemeanors.'},
      {t:'rule', n:'Article III — Judicial branch: one Supreme Court + \'inferior\' courts as Congress establishes. Federal judicial power is limited by (1) subject-matter jurisdiction and (2) justiciability — the \'case or controversy\' requirement, ensuring courts decide concrete, live disputes, not hypothetical questions. Judges are nominated by the President, confirmed by the Senate, and protected by life tenure (\'during good Behaviour\') and no diminution in salary.'},
      {t:'rule', n:'Article IV — Full Faith and Credit Clause: each state must recognize and enforce the public acts, records, and judicial proceedings of every other state (e.g., a money judgment won in State X is enforceable in State Y; a marriage valid in State X is recognized in State Y, even if their rules differ).'},
      {t:'rule', n:'Article IV — Privileges and Immunities Clause: \'the citizens of each state shall be entitled to all Privileges and Immunities of Citizens in the several States\' — protects fundamental rights against discrimination aimed at out-of-state citizens (e.g., the right to travel/reside, to sue in state courts).'},
      {t:'concept', n:'Article V — Amendment process: deliberately DIFFICULT (only 27 amendments ever) and reserves a major role for the states. Related debate — the \'living Constitution\' reads the document as evolving with modern values (more judicial flexibility, formal amendment less important), contrasted with \'originalism.\''},
      {t:'rule', n:'Article VI — Supremacy Clause: all VALID federal law is supreme to inconsistent state law. Federal law may also PREEMPT state law where Congress so intends: EXPRESS preemption (the statute says so) or IMPLIED preemption — FIELD preemption (a pervasive federal framework / dominant federal interest) or CONFLICT preemption (impossibility of complying with both, or the state law obstructs federal goals).'},
      {t:'concept', n:'Article VII — Ratification: the Constitution took effect when ratified by 9 of the original 13 states (1788). Now of historical interest only.'},
      {t:'rule', n:'Federalism (national–state power sharing): the federal government has broad but LIMITED, enumerated powers; the states keep RESIDUAL (\'police\') power and do NOT derive their authority from the Constitution. Justifications: a check on national tyranny, enhanced political participation in smaller units, and states as \'laboratories\' of experimentation (New State Ice Co. v. Liebmann, 1932, Brandeis, J., dissenting).'},
      {t:'rule', n:'Necessary and Proper (\'elastic\') Clause: gives Congress broad authority to choose the MEANS to exercise its enumerated powers. The Court reads it loosely — \'necessary and proper\' means convenient/useful/conducive; the test is whether the statute is \'rationally related to the implementation of a constitutionally enumerated power\' (McCulloch v. Maryland, 1819; United States v. Comstock, 2010).'},
      {t:'rule', n:'Principal FEDERAL (Congress) powers: tax & spend, interstate commerce, immigration/naturalization, war, treaties/foreign relations, bankruptcy, currency, patents & copyrights, and establishing federal courts. Principal STATE powers (police power): criminal, family, tort/product-liability, contract, property/zoning, employment, trusts & estates, corporate, professional licensing, education, and traffic law.'},
      {t:'rule', n:'Interstate commerce reaches (1) the channels of commerce, (2) the instrumentalities and persons/things in commerce, and (3) activities that SUBSTANTIALLY affect interstate commerce. The DORMANT (negative) Commerce Clause limits the states even without any federal statute: states may not discriminate against, or unduly burden, interstate commerce (even through facially-neutral laws).'},
      {t:'rule', n:'Separation of powers: Legislative enacts, Executive enforces, Judicial interprets & applies the law. Checks and balances give each branch oversight of the others — Congress controls the budget, confirms nominees, can override vetoes and impeach; the President vetoes and nominates judges; the courts exercise JUDICIAL REVIEW, striking down unconstitutional acts of the political branches (National Federation of Independent Business v. Sebelius, 2012, citing Marbury v. Madison, 1803).'},
      {t:'concept', n:'The 27 Amendments are of two types: structural changes and individual rights/liberties. Process: PROPOSED by a 2/3 vote of both chambers OR application by 2/3 of state legislatures; RATIFIED by 3/4 of state legislatures OR conventions in 3/4 of the states. (Individual rights were left out of the original body because the framers disagreed and prioritized establishing a working government.)'},
      {t:'concept', n:'Bill of Rights (Amendments 1–10, 1791). 1st — speech, press, assembly, and religion (free exercise + no establishment). 2nd — right to bear arms for self-defense. 3rd — no quartering of soldiers in peacetime. 4th — freedom from unreasonable searches & seizures (constitutionality balances the intrusion against legitimate government interests).'},
      {t:'concept', n:'5th — double-jeopardy bar; no compelled self-incrimination; no deprivation of life/liberty/property without due process; eminent-domain \'takings\' (private property may be taken only for public use and with just compensation). 6th — criminal-trial rights: speedy & public jury trial, notice, confrontation, compulsory process, and counsel (paid by the state if indigent). 7th — jury trial in civil cases over $20. 8th — reasonable bail, no excessive fines, no cruel and unusual punishments.'},
      {t:'concept', n:'9th — the people\'s rights are not limited to those enumerated. 10th — powers not delegated to the federal government are reserved to the states and the people (a rule of construction against extending federal power to unenumerated areas).'},
      {t:'concept', n:'Key later amendments: 13th (abolished slavery), 14th (due process + equal protection against the STATES; privileges & immunities), 15th (vote regardless of race), 16th (federal income tax), 17th (direct popular election of Senators), 19th (women\'s vote), 22nd (two-term presidential limit), 24th (no poll tax), 26th (vote at 18). The 18th (Prohibition) was repealed by the 21st.'},
      {t:'rule', n:'Doctrine of INCORPORATION: the Bill of Rights originally restrained only the FEDERAL government (\'Congress shall make no law…\'), but the Supreme Court has read the 14th Amendment\'s Due Process Clause broadly enough to \'incorporate\' MOST Bill of Rights protections against the STATES (McDonald v. City of Chicago, 2010).'},
      {t:'rule', n:'Doctrine of REVERSE INCORPORATION: the 14th Amendment\'s Equal Protection Clause applies only to the states, but the Court read the 5th Amendment\'s Due Process Clause to \'incorporate\' an equal-protection guarantee against the FEDERAL government (Bolling v. Sharpe, 1954) — a result hard to ground in the text, illustrating judicial power to advance the Constitution\'s spirit.'},
      {t:'rule', n:'Procedural due process (5th & 14th Amendments): a deprivation of a protected life/liberty/property interest must be accompanied by adequate procedures. Test: (1) Is a protected interest threatened? and (2) if so, what safeguards are due — BALANCING the private interest, the risk of erroneous deprivation, and the government\'s interest/burden. Typical safeguards: an unbiased tribunal, notice, a chance to respond, the right to present/cross-examine evidence, counsel, and a reasoned written decision on the record.'},
      {t:'concept', n:'Substantive due process: less textually grounded (and more controversial), based on the \'liberty\' interest — it protects fundamental rights against arbitrary government deprivation, especially privacy and personal autonomy (family, marriage, consensual relations, child-rearing, contraception). Many such rights are in question after Dobbs v. Jackson Women\'s Health Organization (2022), which found no constitutional right to abortion.'},
      {t:'concept', n:'Constitutional interpretation: both camps agree clear text controls; they diverge on ambiguous terms (\'due process,\' \'equal protection,\' \'commerce among the several states,\' \'necessary and proper,\' \'cruel and unusual\'). ORIGINALISM relies on text/structure and English & early-American law at the framing (to limit judicial discretion; favored by more conservative jurists). LIVING CONSTITUTIONALISM treats meaning as evolving with society (a dynamic process; favored by more progressive jurists).'}
    ,
      {t:'concept', n:'📖 American Legal Systems, Ch. 5 — U.S. Judicial Systems: the federal court system (Article III), the limits on federal jurisdiction, a glossary of judicial determinations, and how a civil case proceeds through the district courts, courts of appeals, and Supreme Court.'},
      {t:'concept', n:'Federalism produces multiple court systems: one integrated FEDERAL system (Article III + federal statutes and rules) plus a separate system in each state and territory (state law governs structure, jurisdiction, evidence/procedure rules, and judge selection, which vary).'},
      {t:'rule', n:'Federal and state jurisdiction OVERLAP in three ways: (1) EXCLUSIVE federal (a federal statute makes federal court the only forum); (2) EXCLUSIVE state (no basis for federal jurisdiction); and (3) CONCURRENT (the case may be brought in either federal or state court).'},
      {t:'concept', n:'Article III establishes the Supreme Court and lets Congress create \'inferior\' courts. Federal judges are nominated by the President, confirmed by the Senate, and appointed by the President; their independence is protected by life tenure (\'during good Behaviour\') and a guarantee of no diminution in salary (the appointment process has become highly politicized).'},
      {t:'rule', n:'Federal courts are courts of LIMITED jurisdiction, restricted in two ways — both from Article III, both NON-waivable, and both raisable by the court sua sponte (on its own motion): SUBJECT-MATTER JURISDICTION and JUSTICIABILITY. A case lacking either must be dismissed.'},
      {t:'rule', n:'Federal SUBJECT-MATTER JURISDICTION exists where: (1) the UNITED STATES is a party; (2) FEDERAL QUESTION — the claim \'arises under\' federal law; or (3) DIVERSITY — the parties are citizens of different states (or a state and a foreign country) AND the amount in controversy exceeds $75,000.'},
      {t:'rule', n:'Two derivative forms of federal subject-matter jurisdiction: SUPPLEMENTAL jurisdiction (a court\'s discretion to hear state-law claims arising from the same \'nucleus of common facts\' as a federal claim already before it) and REMOVAL jurisdiction (a defendant may move a case from state to federal court if it could originally have been filed in federal court).'},
      {t:'rule', n:'JUSTICIABILITY (\'case or controversy,\' Art. III) ensures courts hear only real, live disputes between interested parties. Elements: STANDING (a genuine, particularized interest — there is NO \'taxpayer standing\'); RIPENESS (not too soon — the harm must be current or imminent, not hypothetical, and pending legislation is not reviewable); and MOOTNESS (not too late — the controversy is no longer live; exception for harms \'capable of repetition yet evading review\').'},
      {t:'concept', n:'Political question doctrine: courts will not decide a narrow set of issues the Constitution commits to the political branches\' discretion (judicial intervention would violate separation of powers) — e.g., what counts as a \'Republican Form of Government,\' challenges to the President\'s military/foreign-affairs powers, and how Congress conducts impeachment. The doctrine has very limited reach.'},
      {t:'rule', n:'Federal courts are organized by HIERARCHY and GEOGRAPHY. Hierarchy (three tiers): the Supreme Court (apex), 12 U.S. Courts of Appeals (intermediate — the \'[Nth] Circuit\' or the D.C. Circuit), and 94 U.S. District Courts (trial level / courts of first instance, 1–4 per state as set by Congress). Geography: the nation is divided into circuits, each with one court of appeals and several district courts.'},
      {t:'concept', n:'Most federal courts are courts of GENERAL jurisdiction, but some are specialized. ARTICLE III specialized courts (judges have life tenure): the Court of International Trade, the Court of Federal Claims, and the Federal Circuit Court of Appeals (patents, international trade, money claims against the U.S.). NON-Article III / Article I courts (judges do NOT have life tenure): bankruptcy courts, the Tax Court, the Court of Appeals for the Armed Forces, and the Court of Appeals for Veterans Claims.'},
      {t:'rule', n:'Judicial review: federal courts have authority to declare actions of the legislative and executive branches unconstitutional — the key check the judiciary holds over the political branches.'},
      {t:'concept', n:'State courts (vary by state) usually use a three-tier structure like the federal system (court of last resort / intermediate appellate / trial court) but typically have MORE specialized courts (criminal, probate, family, juvenile, small-claims, traffic). State judges are appointed OR elected — judicial elections raise concerns about judicial independence.'},
      {t:'concept', n:'Glossary — general dispositions: an ORDER resolves a motion (grant/deny, in whole or part); an OPINION is the written decision explaining the court\'s reasoning (facts, procedural history, issue, controlling authority, application, and reasoning); a MEMORANDUM opinion is a brief one for simple matters; the JUDGMENT is the court\'s final disposition; the HOLDING is the part of the opinion answering the legal question.'},
      {t:'concept', n:'Glossary — trial dispositions: SUSTAIN (court agrees with an objection — the evidence is excluded) vs. OVERRULE (disagrees — the evidence is admitted); a CURATIVE/LIMITING INSTRUCTION tells the jury to disregard or limit tainted evidence to avoid prejudice.'},
      {t:'rule', n:'INJUNCTIONS: a PERMANENT injunction is a final judgment after full merits review; a TEMPORARY injunction preserves the status quo until final disposition. A preliminary injunction requires notice and usually a hearing; a TRO (temporary restraining order) can issue WITHOUT notice for a short time. The moving party must show likely IRREPARABLE HARM without the injunction AND a LIKELIHOOD OF SUCCESS on the merits.'},
      {t:'concept', n:'Glossary — appellate dispositions: AFFIRM (uphold the decision below), REVERSE (overturn it), REMAND (send it back for further proceedings), VACATUR (annul/void the decision so it has no effect), MODIFY (affirm with changes), and the MANDATE (the official order giving the decision the force of law). A CONCURRENCE agrees with the result but on different/added reasoning; a DISSENT disagrees — both LACK binding precedential force.'},
      {t:'concept', n:'Supreme Court dispositions: a MAJORITY opinion (5+ when all nine sit) is controlling; a PLURALITY opinion (no single opinion gets a majority) — its precedent is the NARROWEST grounds essential to the result; a PER CURIAM (\'by the court\') is usually a brief, unsigned disposition; an EQUALLY DIVIDED Court upholds the decision below but sets NO precedent. Granting CERTIORARI is discretionary review; DENYING cert is not a decision on the merits and carries no precedential effect.'},
      {t:'rule', n:'Choosing a federal court involves three issues: SUBJECT-MATTER JURISDICTION (competence over the type of case), PERSONAL JURISDICTION (authority over the defendant — grounded in fairness/due process and the defendant\'s minimum purposeful contacts with the forum state; waived if not raised at the defendant\'s first appearance), and VENUE (the particular court/place, based on convenience, fairness, and efficiency).'},
      {t:'rule', n:'Choice of law: PROCEDURAL choice of law — the FORUM\'s procedural rules always apply. SUBSTANTIVE choice of law — follow the cause of action: a STATE claim applies state law (the state where it arose, the state with the most significant contacts, or the parties\' reasonable choice), and a FEDERAL claim applies federal law. Statutory deadlines are jurisdictional and cannot be waived.'},
      {t:'concept', n:'District-court players: a single JUDGE (assigned at random — rules on questions of law, instructs the jury; a MAGISTRATE judge can handle non-dispositive matters like discovery; a \'bench trial\' = the judge is fact-finder when a jury is waived); the JURY (decides questions of fact); and the PARTIES — plaintiff, defendant, counter-claimant, cross-claimant, third-party plaintiff/defendant, and intervenor.'},
      {t:'rule', n:'Pleadings: the COMPLAINT commences the action — under \'NOTICE PLEADING\' (FRCP 8), the plaintiff need only give enough to put the defendant on notice of the claim. The SUMMONS (issued by the clerk) requires a response; SERVICE delivers the complaint and summons. The ANSWER responds paragraph-by-paragraph and MUST raise affirmative defenses (e.g., statute of limitations, statute of frauds, waiver, lack of personal jurisdiction).'},
      {t:'rule', n:'Counterclaims & cross-claims: a COUNTERCLAIM is the defendant\'s claim against the plaintiff — COMPULSORY (arises from the same transaction/occurrence; waived if not raised in the answer) or PERMISSIVE (different transaction; may be raised later). A CROSS-CLAIM is a claim against a co-party (e.g., one defendant against another) arising from the same transaction as the original action.'},
      {t:'rule', n:'Motion to dismiss (FRCP 12(b)): seeks early dismissal for, e.g., lack of subject-matter or personal jurisdiction, improper venue, insufficient process/service, or FAILURE TO STATE A CLAIM — i.e., even if all pleaded facts are true, there is no legal basis to recover (a decision on the merits). FRCP 11 requires counsel to certify that a filing is not for an improper purpose and is warranted by existing law and the facts, on pain of sanctions.'},
      {t:'rule', n:'Class action (FRCP 23): one or more representatives sue on behalf of a group, binding all members (who may OPT OUT to preserve their own suit). Required findings: NUMEROSITY (too many members to join), COMMONALITY (common questions of law or fact), TYPICALITY (the representatives\' claims are typical of the class), and ADEQUACY (the representatives will protect the class) — plus that common questions predominate and a class action is superior.'},
      {t:'rule', n:'Discovery (FRCP 26–37): pre-trial, party-driven fact-gathering with a BROAD scope — any non-privileged matter relevant to a claim or defense (it need not be admissible if reasonably calculated to lead to admissible evidence). Forms: interrogatories, requests for production of documents, physical/mental exams, requests to admit, and depositions. Protected from discovery: ATTORNEY WORK PRODUCT (material prepared in anticipation of litigation; mental-impression work product is nearly absolute) and ATTORNEY–CLIENT communications. Tools: motion to compel; motion for a protective order.'},
      {t:'rule', n:'Summary judgment (FRCP 56): granted where there is no genuine dispute of material fact and no reasonable jury could find for the non-movant — if granted, the case (or part of it) ends in the movant\'s favor. VOIR DIRE is jury selection: challenges FOR CAUSE (unlimited, for demonstrated bias) and PEREMPTORY (a statutory number, no reason required — but NOT based on race, gender, or national origin).'},
      {t:'rule', n:'Judgment as a matter of law (FRCP 50, the \'directed verdict\'): granted — rarely — when a reasonable jury would have no legally sufficient evidentiary basis to find for the non-movant (evidence viewed in the light most favorable to the non-movant). The JURY CHARGE instructs the jury on the law; the VERDICT may be GENERAL (who wins + any damages) or SPECIAL (answers to specific factual questions).'},
      {t:'rule', n:'Appeals: an aggrieved party has a right to appeal a FINAL decision — the final-judgment rule; interlocutory (mid-case) appeals are generally NOT allowed in federal court. Only LEGAL issues are appealable (the trial court\'s fact-findings stand), issues must have been PRESERVED below, and no new facts may be introduced. STANDARDS OF REVIEW: \'clear error\' for findings of fact (deferential), \'de novo\' for questions of law (no deference), and \'abuse of discretion\' for discretionary rulings.'},
      {t:'case', n:'Loper Bright Enterprises v. Raimondo (2024) overruled the longstanding Chevron doctrine (which had deferred to reasonable agency interpretations of ambiguous statutes). Courts must now use their own INDEPENDENT JUDGMENT on whether an agency acted within its statutory authority (still giving weight to longstanding, consistent agency views) — making it easier to challenge agency action.'},
      {t:'rule', n:'Supreme Court jurisdiction: a small ORIGINAL jurisdiction (cases between states, or involving ambassadors/ministers/consuls — decided as a court of first instance), a tiny MANDATORY appellate docket, and mostly DISCRETIONARY review by writ of CERTIORARI. Under the \'RULE OF FOUR,\' 4 of 9 Justices must agree to hear a case; of ~8,000 petitions a year, the Court grants fewer than 100 (more likely on a circuit split or invalidation of federal law). A cert denial is NOT a decision on the merits.'},
      {t:'concept', n:'Supreme Court practice: 9 Justices (the Chief Justice is \'first among equals\' — administrative/ceremonial duties, but no extra vote). After cert is granted (via the \'discuss list\' and a private conference), the parties file merits briefs, the U.S. Solicitor General and amici curiae may participate, oral argument runs ~1 hour, and the senior Justice in the majority assigns the majority opinion. The \'SHADOW DOCKET\' = emergency orders decided without full briefing or argument and without detailed explanation (criticized for opacity and unclear precedential value).'}
    ,
      {t:'concept', n:'📖 American Legal Systems, Ch. 6 — Working with Case Law: the anatomy of a judicial opinion, how to read and brief cases, case reporters, the courts\' lawmaking power, synthesizing case law, and the doctrine of stare decisis.'},
      {t:'concept', n:'Anatomy of a case: the citation (where it is published), the court, the parties (with their litigation positions), the docket number, the date, the attorneys, the author of the opinion, the syllabus/headnotes, the opinion of the court, and any concurring or dissenting opinions.'},
      {t:'rule', n:'Syllabus and HEADNOTES (brief summaries of legal points, useful for case-finding through the digest system) are usually written by the PUBLISHER, not the court — so they are NOT part of the opinion and must never be cited, quoted, or relied upon.'},
      {t:'concept', n:'When reading a case, identify: the parties and the court (note its jurisdiction and place in the hierarchy), the date, the PROCEDURAL HISTORY (what happened from filing to now), the FACTS (focus on MATERIAL facts — those that affected the outcome), the ISSUE(s), the HOLDING (the court\'s answer), the RATIONALE (the reasoning — the heart of the opinion), and any separate opinions.'},
      {t:'concept', n:'A CASE BRIEF is a structured summary of an opinion plus your reactions. Components: preliminary info (parties, court, date), procedural history, material facts, issue(s), holding(s), rationale, separate opinions, and your thoughts. Tips: use your OWN words (do not cut-and-paste), use bullets/abbreviations/phrases, and keep it concise.'},
      {t:'concept', n:'Case reporters are book series reproducing published opinions: federal, state, regional (a group of nearby states), and subject reporters. Always cite the OFFICIAL reporter when one is available — the opinion text is identical to the unofficial reporter; only publisher enhancements like headnotes differ.'},
      {t:'concept', n:'Key FEDERAL reporters: the Supreme Court — United States Reports (U.S., the official reporter), the Supreme Court Reporter (S. Ct.), and Lawyers\' Edition (L. Ed.); the courts of appeals — the Federal Reporter (F., F.2d, F.3d, F.4th); the district courts — the Federal Supplement (F. Supp., 2d, 3d) and Federal Rules Decisions (F.R.D.).'},
      {t:'concept', n:'West publishes 7 REGIONAL reporters (Atlantic, North Eastern, North Western, Pacific, Southern, South Eastern, South Western) grouping nearby states\' cases. DIGESTS — chiefly West\'s American Digest System (400+ topics, ~100,000 Key Numbers) — are case-finding tools. \'Unpublished\' (better called \'non-precedential\') opinions often may not be cited under court rules.'},
      {t:'concept', n:'Courts\' lawmaking power: where there is no governing constitutional or statutory law, or where it is vague/ambiguous, courts fill the gaps (constrained by precedent). To SYNTHESIZE case law is to integrate several authorities into ONE simply-stated, easily-applied rule that predicts outcomes in similar cases — by reading each case, extracting its rule, and organizing the principles into a coherent whole.'},
      {t:'concept', n:'Stare decisis (\'let it stand\') = courts tend to follow principles announced in earlier cases (precedent), so similar cases are decided similarly. It is a TENDENCY, not an absolute — courts may overrule. Rationale: fairness (a check on arbitrary or biased decisions), judicial economy (no need to \'reinvent the wheel\'), predictability, and better-reasoned decisions.'},
      {t:'rule', n:'Whether precedent is BINDING (must be followed unless distinguishable) or merely PERSUASIVE turns on two things: (1) the SCOPE of the prior holding — the legal issue, the facts, and whether the statement is holding/rationale vs. dictum; and (2) the RELATIONSHIP between the prior court and the current court (both hierarchy and geography).'},
      {t:'rule', n:'The HOLDING (the court\'s answer to the issue) plus the RATIONALE have binding precedential effect; DICTUM does not. Dictum = statements going beyond the facts or issues presented (\'stray observations\'). A later court decides whether an earlier statement was holding or dictum; non-binding dictum may still be persuasive.'},
      {t:'rule', n:'Stare decisis applies only where the legal ISSUES and the FACTS are fundamentally similar. Two advocacy tools: ANALOGIZE (the party wanting the precedent applied argues the earlier facts are materially similar) and DISTINGUISH (the party opposing it argues the facts are materially different).'},
      {t:'rule', n:'Stare decisis — FEDERAL law: U.S. Supreme Court decisions bind ALL federal and state courts. A U.S. Court of Appeals decision binds the district courts in its circuit and that court itself, but is only PERSUASIVE in other circuits (it is overruled by a contrary Supreme Court decision or by the circuit sitting en banc). A district court decision binds only the parties (subject to appeal) and is persuasive elsewhere.'},
      {t:'rule', n:'Stare decisis — STATE law: a STATE COURT OF LAST RESORT\'s interpretation of its own state\'s law binds ALL courts — state or federal — applying that state\'s law (every court \'stands in the shoes\' of that court); its decisions are merely persuasive outside the state. On matters of FEDERAL law, state courts are bound only by the U.S. Supreme Court, and lower federal courts\' rulings are only persuasive.'},
      {t:'concept', n:'📖 Writing and Analysis in the Law, Ch. 1 — Introduction to the legal system & legal writing: primary sources, court structure, the life of a civil case, precedent/stare decisis, the holding-vs-dicta skill, statutes, and citation.'},
      {t:'concept', n:'A lawyer\'s most important sources are PRIMARY sources: case law (judicial decisions) and ENACTED law (constitutions, statutes, administrative regulations). Research enacted law FIRST — constitutions and statutes take precedence over case law — but then find the cases interpreting them. Where no statute or constitution applies, the COMMON LAW (judge-made law) supplies the rule.'},
      {t:'concept', n:'Three tiers of courts: COURTS OF INFERIOR jurisdiction (limited case types, e.g., small claims; informal; decisions unpublished and not precedent); TRIAL COURTS (usually general jurisdiction; one judge; the trier of fact \'finds\' the facts and applies the law); and APPELLATE COURTS (review for reversible error — no new trial, evidence, or jury; decided by panels of 3+ judges).'},
      {t:'concept', n:'A civil case begins when the plaintiff files a COMPLAINT (and serves a summons) stating enough facts to give the defendant notice of the claim. Most jurisdictions use \'NOTICE PLEADING\' (FRCP 8 — a \'short and plain statement\'), but in FEDERAL court the complaint must now plead enough detail to make the claim PLAUSIBLE (Bell Atlantic Corp. v. Twombly; Ashcroft v. Iqbal).'},
      {t:'concept', n:'The defendant responds with an ANSWER (replying to each allegation; may raise affirmative defenses) or a MOTION TO DISMISS for failure to state a claim (a \'demurrer\' in some states) — arguing that even if all alleged facts are true, they establish no cause of action. A trial brief / memorandum of law is an ADVOCACY document submitted to the court (vs. the analytical office memo kept inside the firm).'},
      {t:'concept', n:'DISCOVERY gathers information: depositions (oral testimony under oath, transcribed by a court reporter), interrogatories (written questions), affidavits (sworn written statements), and document requests. A motion for SUMMARY JUDGMENT asks the court to decide without trial by applying the law to the discovered facts — it CANNOT be granted if any MATERIAL fact is genuinely in dispute (then there must be a trial).'},
      {t:'rule', n:'Precedent is BINDING authority only if decided by a HIGHER court in the SAME jurisdiction; otherwise it is merely PERSUASIVE (a court may consider but need not follow it). Search for binding precedent first; for a \'case of first impression\' (never litigated in the jurisdiction), look to how courts in other jurisdictions have analyzed the problem.'},
      {t:'rule', n:'A case\'s HOLDING is the court\'s decision on the issue litigated — often defined as \'the judgment plus the material facts.\' It differs from a general RULE or a DEFINITION: e.g., \'a contract requires an offer and an acceptance\' is a rule, while \'the defendant\'s letter saying he was ‘considering asking 23¢ a pound’ was not an offer because it lacked fixed, definite terms\' is a holding.'},
      {t:'concept', n:'Formulating a holding turns on which facts are MATERIAL and how broadly to state them. Stated too NARROWLY, a holding will not reach your client\'s situation; stated too BROADLY (e.g., \'household pet\' instead of \'growling bulldog\'), it sweeps in different considerations. Attorneys frame a holding broadly or narrowly to favor the client — and you should not blindly accept the court\'s own statement of its holding.'},
      {t:'concept', n:'In re Gaunt illustrates holding vs. dictum: an uncle orally promised his nephew a watch kept in a safe-deposit box but died before delivering it. HELD — no valid gift, because a completed gift requires intent, DELIVERY, and acceptance, and there was no delivery. The court\'s remark that handing over the key \'may have been a constructive delivery\' is DICTUM (the key was never given).'},
      {t:'rule', n:'DICTA are statements not necessary to the decision (not based on material facts) — not binding, though sometimes persuasive later. Use the correct verb: a court FINDS facts (\'the court found the car was going 90 mph\'), HOLDS on the legal question (\'the court held the defendant guilty of reckless driving\'), and SAYS / states / explains for dicta.'},
      {t:'rule', n:'Weight of authority when WRITING: first identify and explain the BINDING law of the problem\'s jurisdiction — start with any relevant statutes and the cases interpreting them, then the highest court\'s case law, then lower courts. Do NOT lead with other jurisdictions\' law or with encyclopedias/dictionaries when controlling law exists.'},
      {t:'concept', n:'Factors affecting a case\'s WEIGHT as authority: the level of the deciding court (a state supreme court outranks a lower court); the reputation of the court/judge (e.g., the Cardozo-era New York Court of Appeals; the Traynor-era California Supreme Court); whether the court was unanimous (majority outweighs a concurrence/dissent); the year and continuing validity of the reasoning; how fully the issue was discussed; and the factual similarity to your problem.'},
      {t:'rule', n:'Enacted-law hierarchy: U.S. Constitution → federal statutes & treaties → federal executive orders/regulations → state constitutions → state statutes → state regulations → municipal enactments. A legislature may change the common law by statute (which then supersedes it), but a court may not refuse to follow a valid statute (though it may strike it down as unconstitutional). Cases interpreting a statute are case law and precedent — but NOT common law (the rule originates with the legislature).'},
      {t:'concept', n:'CITATION supports your assertions, lets readers find the source, and avoids plagiarism (use Bluebook or ALWD form; in memos/briefs cites go in the TEXT, not footnotes). Note the special rule of legal \'common knowledge\': even a well-known proposition (e.g., \'a contract requires offer and acceptance\') still needs a citation to authority. Changing a few words in a quote makes it an ALTERED QUOTATION (use quotation marks + brackets/ellipses), NOT a paraphrase.'}
    ]},
    { w:3, topic:'Synthesizing, rule statements, outlining & Hamer v. Sidway', tags:['synthesis','rule statements','outlining','Hamer v. Sidway','consideration','graded assignment'], notes:[
      {t:'concept', n:'📖 Reading — No textbook reading assigned (other materials may be posted in the module).'},
      {t:'exam', n:'📋 Module 3 (Case Briefing): Graded — Academic Integrity Assignment (10 pts); Case Brief Assignment (75 pts); Seminar (2 pts).'},
      {t:'concept', n:'Synthesis: Combining cases, statutes, and principles into a unified understanding of the law. See how individual rules fit together into coherent doctrine.'},
      {t:'case', n:'Cohen v. Petty completed FIRAC — Issue: "Is Petty liable for Cohen\'s injury because an unforeseeable fainting spell caused him to lose control of his car?" Rule: "One is not liable for negligence when he loses control of his automobile because he is stricken by illness that he had no reason to anticipate." Conclusion: "Petty is not liable."'},
      {t:'rule', n:'Rule statements: single complete sentence, clear/concise/precise/thorough, all elements. Example: "Battery is an intentional harmful or offensive contact with the person of another."'},
      {t:'concept', n:'Outline structure: big picture → drill down. I. Torts → A. Intentional Torts → 1. Battery → elements → 2. Assault → B. Negligence. Memorize your outline. Take practice exams.'},
      {t:'case', n:'Hamer v. Sidway (N.Y. 1891): Uncle promised $5,000 if nephew refrained from drinking, tobacco, swearing, gambling until age 21. Nephew complied. Uncle held funds; died. Executor refused payment. Rights assigned to wife then to Hamer. Rule: Forbearance of any legal right at another\'s request = sufficient consideration.'},
      {t:'grade', n:'Hamer v. Sidway — Grade: 62/75. Feedback: Facts thorough but missing one key fact (the assignment chain). Rule correct but not focused on consideration. Issue and conclusion needed to center on consideration.'},
      {t:'exam', n:'Hamer lessons: (1) Rule must zero in on the specific legal issue — here, forbearance as consideration. (2) Issue, rule, and conclusion must all align on the same legal question. (3) Missing fact = the assignment chain (nephew → wife → Hamer).'}
    ]},

      {t:'concept', n:'Synthesizing cases (Writing & Analysis Ch. 2 §V, pp. 69–74 — the core of Module 4): combine a body of related cases into one simply-stated, usable rule, then organize the principles into a coherent structure (the foundation for the graded Intentional Torts Outline).'},
      {t:'concept', n:'SYNTHESIZING cases = relating multiple cases to one another so you can apply the law as a whole, not case-by-case. Courts often synthesize for you (a Restatement definition is many holdings combined). Judges work INDUCTIVELY — from specific cases to a general rule; synthesis is the step BETWEEN your research and your writing.'},
      {t:'rule', n:'Three types of case synthesis: (1) GROUPING cases by the rule they follow (used for a case of first impression — to argue which rule is better); (2) DEFINING the ELEMENTS of a claim or defense from evolving case law (e.g., parental immunity from a child\'s suit requires that the child is a MINOR and the suit is for NEGLIGENCE); and (3) identifying the FACTORS — the general categories of facts — that courts weigh to decide a cause of action.'},
      {t:'concept', n:'Analyze INDUCTIVELY but WRITE DEDUCTIVELY: work out the rule by analyzing the individual cases (inductive), but in your writing START with the synthesized rule as a topic sentence and then use the cases as support — do NOT just narrate the cases one-by-one in chronological order (that merely recreates your research and leaves the analysis to the reader). Note: \'factors\' can mean required elements (as in Sinn/Dillon) OR merely types of facts a court weighs without requiring a set result (as with student-domicile factors).'}
    ]},
    { w:5, topic:'Taking law school exams — IRAC, mini-IRACs & essay strategy', tags:['IRAC','mini-IRAC','essay exam','battery','exam strategy'], notes:[
      {t:'concept', n:'📖 Reading — No textbook reading assigned (other materials may be posted in the module).'},
      {t:'exam', n:'📋 Module 5 (Applying the Law: Torts): Graded — Mini Essay Fact Pattern (closed book, 100 pts); Seminar (2 pts).'},
      {t:'concept', n:'9-step essay exam process: (1) Read call of question. (2) Read facts. (3) Mark up paper. (4) Identify issues. (5) Draft outline. (6) Re-read facts. (7) IRAC + mini-IRACs. (8) Proofread. (9) Answer the call.'},
      {t:'rule', n:'IRAC for essay exams: Issue → Rule (all elements as complete sentence) → Application (mini-IRACs per element) → Conclusion. Do NOT deviate.'},
      {t:'concept', n:'Mini-IRAC: [R] State rule for that element. [A] Apply to specific facts. [C] Conclude whether element proven. Every fact must be "doing something."'},
      {t:'rule', n:'Battery (exam-ready): Battery is an intentional act by the defendant which causes the plaintiff to suffer a harmful or offensive contact.'},
      {t:'rule', n:'Intent: satisfied if defendant desires consequences OR knows to a substantial certainty they will occur.'},
      {t:'rule', n:'Contact: includes anything connected to or touching the body — direct touch not required.'},
      {t:'rule', n:'Harmful contact: causes pain, impairment (alters body\'s structure), or change.'},
      {t:'rule', n:'Offensive contact: offends a reasonable (ordinary) person\'s sense of personal dignity.'},
      {t:'case', n:'Kathy v. Linda hypo: Kathy yelled "I will knock you flying!" and yanked Linda\'s purse. Purse stayed; Linda lost balance but did not fall. Intent met. Contact met (purse connected to body). Harmful contact NOT met (no fall). Offensive contact met (purse yank offends reasonable person). Kathy liable for battery.'},
      {t:'exam', n:'Abbreviation rule: Define on first use — intentional infliction of emotional distress ("IIED") — then abbreviate freely throughout.'},
      {t:'exam', n:'Call of question trap: "Discuss all intentional torts" means analyze every tort suggested by the facts. Always check for defenses at the end.'}
    ]},
