    { w:7, topic:'Essays, IRAC, mini-IRAC structure & the analysis section', tags:['IRAC','mini-IRAC','analysis','application','essay exam','issue statement','whether','outline','self-assessment','answer every element','Able and Baker','offer'], notes:[
      {t:'concept', n:'📖 Reading — No textbook reading assigned (other materials may be posted in the module).'},
      {t:'exam', n:'📋 Module 7 (Applying the Law: Contracts): Graded — CALI Lesson (10 pts); Seminar (2 pts).'},
      {t:'concept', n:'Module 7 focus: The analysis/application section is the heart of a law school essay exam and where you earn the most points. The goal is not to repeat facts but to connect each fact to a specific legal element and show that the element is satisfied.'},
      {t:'concept', n:'Essay exam steps (refined from Module 7): (1) Read the call of the question — what is the exam drafter asking you to do? (2) Read the fact pattern. (3) Identify the issue(s). (4) Draft an outline — take the time to do this. (5) Read the fact pattern again. (6) Follow your outline and use IRAC for each issue (include mini-IRACs where necessary). (7) Answer the call of the question. (8) If time allows, re-read the facts and proofread.'},
      {t:'concept', n:'Analysis/Application — the key principle: Match up each element you have identified in the rule with a specific fact from the hypothetical and SHOW or DEMONSTRATE that the element has been satisfied. It is not enough to repeat the facts. Each fact has to be doing or showing something — it must be connected to a legal element with explicit reasoning.'},
      {t:'rule', n:'Power words for the analysis section: "Because" is the most useful word — it forces you to connect the element to the fact. Structure: "[Element] is satisfied BECAUSE [fact]." Other connective words: "as," "since," and "therefore." If you can write a sentence that drops the connecting word and still makes sense, you have probably just repeated a fact without applying it.'},
      {t:'concept', n:'Exam outline — take the time: Before writing your answer, draft a quick outline identifying (1) the issue, (2) the governing law, (3) the rule and its elements, and (4) which facts map to which elements. A structured outline prevents you from missing elements and gives your essay a logical flow. Do not skip the outline step even under time pressure.'},
      {t:'case', n:'Able and Baker hypo (Module 7 practice): Able owns a mirror shop. Baker sees what appears to be an antique mirror and asks "Oh, is that beautiful mirror an antique?" Able replies "It certainly is. I hate to let that mirror go, but business has been very slow, so I will let you have the mirror for $100." Call of the question: Has Able made an offer to Baker?'},
      {t:'concept', n:'Able and Baker — governing law: The fact pattern involves the sale of goods (a mirror = tangible, moveable personal property), so UCC Article 2 governs.'},
      {t:'rule', n:'Able and Baker — rule statement: An offer is a manifestation of present intent to be bound, demonstrated by a promise with required terms that are sufficiently definite, communicated to an identifiable offeree. Elements: (1) Intent to be bound, (2) Required terms, (3) Sufficient definiteness, (4) Communication to an identified offeree.'},
      {t:'concept', n:'Able and Baker — how to write the analysis: For each element, identify the relevant fact and connect it using "because." Do not just say "Able stated a price" — say "The intent element is satisfied BECAUSE Able made a specific statement to Baker expressing willingness to sell the mirror at a set price, which a reasonable person in Baker\'s position would understand as a commitment to be bound upon acceptance." Every element needs its own mini-IRAC.'},
      {t:'rule', n:'Able and Baker — conclusion model: "Because all of the elements of an offer are present — Able manifested intent to be bound, stated sufficiently definite terms (the mirror at $100), and communicated directly to an identified offeree (Baker) — Able has made a valid offer to Baker."'},
      {t:'exam', n:'Analysis section self-check: After writing each sentence in your analysis, ask: (1) Did I state which element this fact is addressing? (2) Did I use "because," "as," "since," or "therefore" to connect the fact to the element? (3) Am I showing the element is met, or just repeating what happened? If you removed the legal element name from the sentence and it still reads like a story summary, rewrite it as a legal application.'},
      {t:'exam', n:'ARC practice tool: The ARC (Academic Resource Center) has practice exam resources. Use it to practice essay writing before exams. Study groups are also recommended. The best way to improve analysis writing is repeated practice with real fact patterns — outline first, then write, then check whether each sentence connects a fact to an element with explicit reasoning.'},
      {t:'exam', n:'Mini-IRAC is mandatory structure (DeShayla Strachan, ILA): "When we say mini-IRAC, we mean it." Every element gets a FULL mini-IRAC — its own issue statement, rule, application, and conclusion. Structure is graded in the rubric, so you can identify all the elements correctly and STILL lose points if each one is not written as a complete mini-IRAC. Do not mix the IRAC components together.'},
      {t:'exam', n:'Analyze every element — even one that fails: To answer the call you must show your work on ALL the elements, including the one that is not met. If a battery fact pattern has no contact, you still mini-IRAC the act, intent, and contact, concluding that contact is absent and therefore there is no battery — do not just assert it. The point of the essay is to prove you understand every element. (Caveats: do not chase issues the facts never trigger; and where a doctrinal professor\'s instructions differ for their own class, follow that class.)'},
      {t:'exam', n:'Drop "whether" — modern issue statements: Move away from "The issue is whether…" (old-school, and an incomplete sentence when used as a heading). Use a direct question ("Was there a battery?" / "Is Abel liable?") or a one-word heading ("Offer," "Battery"). Avoid DOUBLE issue statements (a heading PLUS "the issue is whether…") — pick one. Usually not points off, but the class wants clean, concise writing. If ARC or older materials still use "whether," follow the class samples and rubric.'},
      {t:'concept', n:'Define before you apply — "show your work": You cannot apply a rule you have not stated, so each element\'s rule/definition goes in that element\'s R, before the application. State the rule once, in R only — never restate it inside the application (that mixes the IRAC and loses points). Treat it like a math problem: even when the answer feels obvious, the grader must see the reasoning, not be expected to assume you know it.'},
      {t:'exam', n:'Application = "marrying the facts to the rule": The application is the heart of the essay and where the points are. Never just repeat a fact — every fact must DO something by showing how an element is met. Each sentence should weave a piece of the rule together with a piece of fact (because / since / therefore). Strachan\'s image: overlay your rule statement onto the facts.'},
      {t:'exam', n:'Outline discipline + what to submit: Keep the exam outline short — roughly 3 to 10 minutes, never 15 (that eats into a 45–60 minute exam). The outline is for YOU. In real doctrinal exams (Contracts, Torts) do NOT submit the outline — professors skip past it (no points either way), so keep it on scratch paper or delete it before submitting. In THIS ILA practice class, the outline AND an end-of-essay self-assessment are REQUIRED deliverables — follow the rubric, formatting, and file-naming instructions (you lose points for those).'},
      {t:'exam', n:'Contracts essays — governing law comes first: Before the offer rule, state the governing source of law: issue → governing law (UCC vs. common law) → then a mini-IRAC for each element. A mirror is movable, tangible property, so the UCC governs (and under the UCC price is not a required term — quantity is).'},
      {t:'case', n:'Able and Baker — per-element mini-IRAC walkthrough (ILA live work): Each offer element mapped to a fact: (1) Intent to be bound — Abel manifested willingness to sell the mirror; (2) Required terms — under the UCC the minimum terms are parties (Abel and Baker), subject matter (the mirror), and quantity (one mirror); price is NOT required; (3) Sufficient definiteness — "$100" is clear, with no ambiguity; (4) Communication to an identified offeree — Abel communicated the offer directly to Baker. Final conclusion: because all four elements are present, Abel made an offer to Baker. Each element still needs its own issue, rule, application, and a "therefore" conclusion.'},
      {t:'exam', n:'Samples are the ground truth; no counterarguments yet: Before writing, study the provided samples — the Mod 5 battery sample and the color-coded sample answer attached to each graded essay\'s feedback are exactly what is expected (no hidden ball). When ARC or outside resources seem inconsistent, follow the class instructions, rubric, and samples. Write at least one full timed practice essay 2 days to a week before each final so the format is fresh. Do NOT add counterarguments yet — that comes in a later legal-writing course; for now, focus on clean IRAC + mini-IRAC.'}
    ]},
    { w:8, topic:'Applying the Law: Torts (mini essay)', tags:['torts','mini essay','IRAC','closed book'], notes:[
      {t:'concept', n:'📖 Reading — No textbook reading assigned (other materials may be posted in the module).'},
      {t:'concept', n:'Module 8 — closed-book Torts mini-essay practice applying the full IRAC structure to a fact pattern.'},
      {t:'exam', n:'📋 Module 8 (Applying the Law: Torts): Graded — Mini Essay Fact Pattern (closed book, 100 pts).'}
    ,
      {t:'rule', n:'⭐ HOW TO WRITE EVERY IRAC ESSAY — Prof. Strachan\'s Module 8 feedback (applies to ALL courses/essays). Score on this assignment: 69/100. The structural rules below are exactly what cost points and MUST be followed on every future mini-essay and full essay.'},
      {t:'rule', n:'⭐ RULE 1 — ONE issue statement per IRAC. Each tort/claim gets exactly ONE issue statement. It can be EITHER a question ("Is Pat liable to Duncan for battery?") OR a heading ("Battery") — but NOT both. Do not open with a heading and then also write a separate issue question for the same claim. (Professor comment: "Remember that only one issue statement is needed.")'},
      {t:'rule', n:'⭐ RULE 2 — EVERY element gets its own COMPLETE mini-IRAC. For each element you discuss, write the Rule, then the Analysis, then a SEPARATE Conclusion (R → A → C). The Analysis and the Conclusion must NOT be combined into one sentence — they must be visibly separate. (Professor comment: "If you are going to include this element, it needs to [be] fully in IRAC form. The analysis and conclusion are combine[d] for this element. Make sure they are separate.")'},
      {t:'rule', n:'⭐ RULE 3 — CLEAR conclusion for EACH element. "Therefore, it is met" is NOT enough — state WHICH element is met and conclude it clearly and specifically (e.g., "Therefore, an offensive contact occurred"). Complete each mini-IRAC by clearly concluding that element before moving on. (Professor comments: "Is met? Which one is met? Clear conclusions for each element are required." / "Review the Harmful and Offensive Contact conclusion. It was not clear for both elements." / summary: "Remember to complete each mini IRAC by clearly concluding each element.")'},
      {t:'rule', n:'⭐ RULE 4 — Element ORDER matters; follow the sample. For FALSE IMPRISONMENT discuss the elements in this order: (1) Intent (to confine), (2) CAUSATION (the confinement was caused by the defendant — physical force/barriers/threats/failure to release/assertion of authority), (3) Confinement to a bounded area (no reasonable means of escape), (4) Awareness or harm. Discuss CAUSATION BEFORE confinement. (Professor comment: "Caused by the defendant? Be sure to discuss Causation before confinement. See sample answer below.")'},
      {t:'rule', n:'⭐ RULE 5 — Substantial certainty is NOT an element. "Substantial certainty" is one prong of the INTENT rule (intent = desire OR substantial certainty), so keep it INSIDE the Intent mini-IRAC. Do not give it its own element heading — if you do, you end up with just an Issue + Analysis and no complete IRAC. (Professor comment: "Substantial Certainty is not an element but a part of the Intent rule. If it were an element, there is not a full IRAC, just I and A.") Same idea applies to transferred intent — handle it within the Intent discussion.'},
      {t:'rule', n:'⭐ RULE 6 — Rules must be in STATEMENT FORM and every required element included; memorize them cold. Your rule statements don\'t have to match the sample word-for-word, but they MUST (a) be phrased as a rule/statement and (b) contain ALL the required elements. Points are gathered in the ANALYSIS, so you cannot burn time figuring out how to phrase a rule — commit all rules to memory for quick, accurate recall. (Professor: "you must commit all of your rules to memory… that is foundational to your ability to apply the law." Study tip he gave: make FLASHCARDS from your outline; print your answer and LABEL the IRAC parts.)'},
      {t:'rule', n:'⭐ RULE 7 — PROOFREAD (typos cost points). Leave time at the end to proofread. This assignment lost credit for typos: "Dealy" for "Deadly," "Par" for "Pat," "looked" for "locked," "Duncans." (Professor comments: "Deadly? Make sure to proofread." / "There were a couple of typos. Be sure to proofread.")'},
      {t:'concept', n:'⭐ IRAC COLOR KEY used in the professor\'s sample answer (a good self-check when you print & label your own answer): ISSUE = yellow, RULE = green, ANALYSIS = turquoise, CONCLUSION = red. In a proper answer every element visibly cycles Rule → Analysis → Conclusion, and each claim has exactly one issue marker at the top.'},
      {t:'concept', n:'Sample-answer SUBSTANTIVE points to learn from (Mod 8 Torts, Pat/Duncan bar fact pattern): (1) BATTERY — the sample split Harmful Contact and Offensive Contact into TWO mini-IRACs and concluded NO harmful contact (no facts of pain/impairment/change) but YES offensive contact (being grabbed and dragged offends personal dignity) → still liable for battery. (2) FALSE IMPRISONMENT — elements ordered Intent → Causation → Confinement; defense of others FAILS (verbal abuse of the bartender is not an imminent physical attack). (3) ASSAULT (Pat v. Duncan) — the cleaner analysis notes Duncan may have intended only a BATTERY (to strike Pat), so use TRANSFERRED INTENT (intent to batter transfers to assault) rather than just asserting assault intent; self-defense fails (Pat merely looked in — no imminent threat; can\'t retaliate for the earlier confinement). The professor\'s note: the CONCLUSION reached matters less than the quality of the discussion (e.g., whether Duncan was reasonably in fear).'},
      {t:'exam', n:'Prof. Strachan\'s overall feedback (verbatim gist): "Nice work overall. You generally did a good job identifying pertinent issues and the applicable rules, and you mostly followed the IRAC format. Elements could be stronger and more thorough. Remember to complete each mini IRAC by clearly concluding each element. There should only be one issue statement for each IRAC. See the sample answer for ideas… Leave time to proofread. You are almost there, but this work could use some tweaking." → 69/100. Pre-essay checklist to hit 100: one issue statement per claim ✓ · every element a full R-A-C with separate conclusions ✓ · correct element order (causation before confinement) ✓ · substantial certainty kept inside Intent ✓ · rules stated with all elements ✓ · proofread ✓.'}
    ]},

      {t:'grade', n:'Graded Mod 9 mini-essay (Score: 62/100). Fact pattern: Norse offers Odin his motorcycle for $3,000, open until Jan 1; Odin replies \'How about $2,500?\'; Norse says that won\'t work, offer stands; Odin then accepts. Professor feedback / lessons: (1) The \'How about $2,500?\' line is a MERE INQUIRY, NOT a counteroffer — the words \'how about\' signal an inquiry about whether the offeror would consider a lower price, which does NOT reject or terminate the offer. Give it its OWN clean \'Counteroffer\' mini-IRAC that CONCLUDES it was an inquiry (my submitted version muddled it by calling it \'merely a counteroffer,\' which contradicted the surrounding analysis and cost points). (2) CHOICE OF LAW (UCC vs. common law) should be explained FIRST, before contract formation. (3) PROOFREAD — typos hurt (I wrote \'a mere injury\' instead of \'inquiry,\' \'mad a valid offer,\' \'each part incurs,\' \'refusal to see the motorcycle\'). Correct conclusion (enforceable contract) was reached. Takeaway for all essays: when the fact pattern uses tentative words like \'How about…?\' / \'Would you consider…?\', treat it as an INQUIRY (offer survives); a COUNTEROFFER needs a definite new proposal on different terms. Structure: Choice of Law → formation (offer → counteroffer/inquiry → acceptance → consideration) → defenses (none) → conclusion.'}
    ]},

      {t:'exam', n:'STEPS FOR ALL ESSAY EXAMS (Module 11 — memorize this workflow): (1) READ THE CALL of the question first (what are you asked to discuss?); (2) READ THE FACT PATTERN; (3) IDENTIFY the issues; (4) DRAFT AN OUTLINE of your answer, then READ THE FACTS AGAIN; (5) use IRAC and MINI-IRACs to answer; (6) ANSWER THE CALL of the question; (7) CHECK your answer — if time allows, re-read the facts and PROOFREAD. The overall claim gets one IRAC; each ELEMENT gets its own mini-IRAC (Issue → Rule → Analysis → Conclusion), written in complete sentences (no bullet points).'},
      {t:'concept', n:'Module 11 practice fact pattern (Pete & Patricia): Twelve-year-old Pete got a new bicycle, rode it around the block to show off, was on the sidewalk but went so fast he lost control and spun into the street. Patricia was crossing; she saw Pete speeding toward her but had no time to move, screamed in terror, and Pete\'s bike hit her, breaking her leg. CALL: Discuss Pete\'s liability to Patricia for NEGLIGENCE. (A worked model answer follows in the notes below.)'},
      {t:'rule', n:'Negligence — the overall (general) rule to state first: to establish negligence the plaintiff must show (1) a DUTY of care owed by the defendant to the plaintiff, and the standard of that care; (2) that the defendant BREACHED that duty; (3) that the breach was the actual and proximate CAUSE of the plaintiff\'s injury; and (4) that the plaintiff suffered DAMAGES. Then do a mini-IRAC for each element.'},
      {t:'rule', n:'Model rule statements per element (Prof. Strachan\'s phrasings — commit to memory): DUTY — \'A defendant owes a duty of reasonable care to foreseeable plaintiffs.\' STANDARD OF CARE (child) — \'A child owes the same degree of care that a reasonable child of like age, education, intelligence, and experience would exercise under the circumstances.\' BREACH — \'A duty of care is breached if the defendant acts unreasonably. Conduct is unreasonable if the gravity and likelihood of harm created by the defendant\'s conduct outweighs the social utility of that conduct and the burden on the defendant to have acted more reasonably.\' (a risk-utility statement).'},
      {t:'rule', n:'Model rule statements, cont. CAUSATION (umbrella) — \'To be liable for negligence, the defendant\'s actions must be both the cause in fact AND the proximate (legal) cause of the plaintiff\'s injuries\' (analyze each in its own sub-IRAC). CAUSE IN FACT — \'A party\'s actions are the cause in fact of an injury if, but for the party\'s actions, the injury would not have occurred.\' PROXIMATE CAUSE — \'Absent facts suggesting that the manner or type of injury was unforeseeable, a defendant\'s conduct that is the cause in fact of the injury will also be its proximate cause.\' DAMAGES — \'A successful negligence suit must also demonstrate damages, which can include physical injury.\''},
      {t:'exam', n:'Pete & Patricia — MODEL ANSWER (mini-IRAC per element). DUTY: Rule — a defendant owes reasonable care to foreseeable plaintiffs. Analysis — Patricia is a foreseeable plaintiff because Pete rode on a sidewalk pedestrians commonly use; though she was in the street, it is foreseeable she would be injured by his out-of-control bike. Conclusion — Pete owed Patricia a duty to act reasonably. STANDARD OF CARE: Rule — a child is held to the care of a reasonable child of like age/education/intelligence/experience. Analysis — a reasonable 12-year-old understands riding carefully avoids injuring himself or others. Conclusion — Pete owed a duty to ride carefully. BREACH: Rule — breach = acting unreasonably (risk-utility). Analysis — riding so fast he lost control and entered the street risks serious injury, which far outweighs the minimal social utility of \'showing off,\' and he could easily have slowed down. Conclusion — Pete breached by showing off and losing control.'},
      {t:'exam', n:'Pete & Patricia — MODEL ANSWER, cont. CAUSE IN FACT: Rule — but-for test. Analysis — but for Pete\'s actions, Patricia would not have been injured. Conclusion — Pete was the cause in fact. PROXIMATE CAUSE: Rule — cause in fact is also proximate cause absent an unforeseeable manner/type of harm. Analysis — no intervening acts; it is foreseeable that riding too fast on a bike could cause a loss of control injuring a pedestrian. Conclusion — Pete was the proximate cause. DAMAGES: Rule — negligence requires damages, including physical injury. Analysis — Patricia suffered a broken leg. Conclusion — the damages element is met. ANSWER THE CALL: Because Pete owed Patricia a duty, breached it, and directly and proximately caused her broken leg, he is liable to Patricia for negligence.'},
      {t:'concept', n:'Module 11 technique reminders: state the OVERALL rule (all four elements) before breaking it down; give EACH element its own mini-IRAC with a clear \'Therefore…\' conclusion; when a rule has sub-parts (causation = cause in fact + proximate cause), analyze each sub-part separately; keep everything in complete sentences; and always finish by ANSWERING THE CALL of the question in one wrap-up sentence.'}
    ]},

  cl610: { id:'cl610', name:'CL610 — Contracts', badge:'b-contracts', label:'CONTRACTS', weeks:[
    { w:1, topic:'Introduction to contract law & sources', tags:['common law','UCC','Restatement','case briefs','study skills'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell, Understanding Contracts §§1.01–1.04, §§4.01–4.03, §4.07. Required cases: Balfour v. Balfour; Texaco v. Pennzoil; Lucy v. Zehmer; Hawkins v. McGee.'},
      {t:'concept', n:'⭐ BAR-PREP REFERENCE (saved): Valeria Braden "Bar Exam Prep — CONTRACTS" guide covers every contracts doctrine in MBE+essay format (Attack Statement, Elements, Memory line, MCQ recognition words, Common MBE Traps, Compare tables). Files: ~/Library/CloudStorage/OneDrive-Personal/Bar Prep Guides/BarPrep_Contracts_Braden.pdf. Topics: formation/objective theory, offer & termination, acceptance & mailbox rule, consideration, promissory estoppel, modification, warranties, defenses (capacity, duress, misrep/fraud, mistake, illegality, unconscionability), Statute of Frauds, parol evidence, conditions & performance, material breach, UCC perfect tender, anticipatory repudiation, risk of loss, impossibility/impracticability/frustration, damages (expectation/consequential/liquidated/reliance), specific performance, third-party beneficiaries, assignment/delegation/novation.'},
      {t:'exam', n:'📋 Module 1 (Contract Formation — Overview & Offer): Graded — Resource Quiz (10 pts); Seminar (ungraded). Course note: 15 live seminars (Modules 1–15), up to 2 pts each = 26 pts (Modules 1 & 15 ungraded); plus up to 14 holistic participation pts graded in Module 15.'},
      {t:'concept', n:'A contract is a legally enforceable promise. Core elements: offer, acceptance, consideration, and mutual assent (meeting of the minds).'},
      {t:'concept', n:'Sources: common law (services/real property), UCC Article 2 (goods), Restatement Second (persuasive authority).'},
      {t:'concept', n:'Bilateral: exchange of promises. Unilateral: promise for an act — accepted only by completing performance.'},
      {t:'rule', n:'Offer: objectively manifested intent to be bound, containing definite terms, communicated to an identified offeree. Components: (1) Intent; (2) Content; (3) Communication.'},
      {t:'concept', n:'Case brief format (FNHRC): Facts → Issue → Holding & Rule → Rationale → Comments.'},
      {t:'exam', n:'Always identify governing law first — common law vs. UCC. Mixed contracts: predominant purpose test determines which governs.'},
      {t:'exam', n:'Grading scale: A = 83+, A- = 80–82, B+ = 78–79, B = 73–77, B- = 70–72, C = 63–67. Min passing = 50.'},
      {t:'case', n:'Seminar 1 assigned: Lucy v. Zehmer, Hawkins v. McGee, Fairmont Glass Works v. Grunden-Martin Woodenware Co.'}
    ,
      {t:'concept', n:'📖 Contracts Ch. 1 (§§1.01–1.04) — foundational reading covering the meaning of contract, the types of contracts, the history of contract law, and the sources of contract law.'},
      {t:'rule', n:'Definition of a contract: a promise the law will enforce. Restatement (Second) of Contracts §1 — a contract is a promise (or set of promises) for the breach of which the law gives a remedy, or the performance of which the law recognizes as a duty. A promise the law will NOT enforce is not a contract.'},
      {t:'concept', n:'Freedom of contract = the freedom to enter binding agreements AND to avoid obligations unless we consent. Sir Henry Maine (1861): the movement of progressive societies has been \'from Status to Contract.\' Much of contract law balances freedom of contract against societal restraints, usually for fairness.'},
      {t:'concept', n:'Key features of contract law: (1) remedies are central — Holmes: \'The duty to keep a contract at common law means a prediction that you must pay damages if you do not keep it — and nothing else.\' (2) it distinguishes enforceable from unenforceable promises; (3) it sharply separates promises made as part of an exchange (enforceable) from promises to make a gift; (4) reliance matters; (5) liability rests on the parties\' VOLUNTARY assumption of duty (unlike tort, where duty is imposed by society); (6) assent is judged objectively by outward words and acts, not secret subjective intent.'},
      {t:'concept', n:'Express vs. implied-in-fact: an express contract is made in spoken/written terms; an implied-in-fact contract is inferred from conduct. Both are REAL contracts with the same elements — the only difference is how intent is expressed. Elements of an implied-in-fact contract (Ramsey v. Ellis): (1) defendant requested the plaintiff to perform work; (2) plaintiff expected compensation; (3) defendant knew or should have known compensation was expected.'},
      {t:'concept', n:'Contract \'implied in law\' (quasi-contract) is NOT a real contract — it rests on the law of restitution to prevent unjust enrichment and does not depend on consent. Remedy: measured by the value of the benefit conferred on the defendant (vs. quantum meruit, measured by the reasonable value of the plaintiff\'s services).'},
      {t:'case', n:'Cotnam v. Wisdom (104 S.W. 164, Ark. 1907) — physicians performed emergency surgery on an unconscious accident victim who never regained consciousness. His estate was liable in quasi-contract (implied in law) for the value of the services even though there was no agreement and no real contract. Classic unjust-enrichment illustration.'},
      {t:'concept', n:'Quantum meruit (\'as much as he deserved\') = recovery for services when the parties never fixed a price; the recipient must pay reasonable value. (Quantum valebant traditionally covered the value of goods delivered.) Courts often use \'quantum meruit\' loosely for both implied-in-fact and implied-in-law claims.'},
      {t:'concept', n:'Formal vs. informal contracts: traditionally a \'formal\' contract depended on a ritual formality such as a wax seal (also negotiable instruments, documents of title, and letters of credit under the UCC). Today \'formal\' usually just means a carefully negotiated, memorialized writing, and \'informal\' a casual or unwritten agreement. The degree of formality usually does not affect enforceability.'},
      {t:'rule', n:'Bilateral contract = an exchange of two promises (formed when the promises are exchanged). Unilateral contract = one promise seeking an act (\'If you find and return my lost cat, I\'ll pay $100\'); it is accepted ONLY by completing performance, and no contract exists until performance is complete. The Restatement (Second) dropped the labels, but courts still use them; the modern focus is on the manner of acceptance the offer requires.'},
      {t:'rule', n:'Unilateral offers & revocation: once an offeree begins the requested performance in reliance on an offer for a unilateral contract, the offeror may be barred from revoking until a reasonable time for completion has passed (Restatement (Second) §45).'},
      {t:'concept', n:'Executory vs. executed: an executory contract has not yet been substantially performed; an executed contract has been substantially or fully performed. A contract can be fully executory (both sides still owe) or partly performed. Whether a contract is executory matters for modification without consideration, avoidance for intoxication or mental incapacity, rescission, and anticipatory repudiation.'},
      {t:'concept', n:'Adhesion contract = a standardized, take-it-or-leave-it contract where one party cannot really bargain (insurance policies, most employment and consumer contracts). Generally fully enforceable because they cut transaction costs, BUT scrutinized more closely: ambiguities are construed against the drafter (contra proferentem), onerous terms (e.g., forum-selection clauses) may require adequate notice, and oppressive terms may be unconscionable.'},
      {t:'case', n:'Henningsen v. Bloomfield Motors, Inc. (161 A.2d 69, N.J. 1960) — a standard, industry-wide clause limiting an auto seller\'s liability for a defective car was unenforceable given its oppressive nature and the gross inequality of bargaining power. Landmark adhesion/unconscionability case.'},
      {t:'rule', n:'Void vs. voidable vs. unenforceable: VOID = no contract at all (e.g., an agreement to commit a crime); neither party can enforce it and it cannot be ratified. VOIDABLE = valid until the party with the power to disaffirm (e.g., a minor or one lacking capacity) acts; that party may instead ratify. UNENFORCEABLE = a real contract but with no remedy for breach, though it may still be recognized for other purposes.'},
      {t:'rule', n:'UCC §2-104 defines a \'merchant\' as one who deals in goods of the kind, or who by occupation holds himself out as having knowledge or skill peculiar to the goods or practices involved (or who employs an agent who does). A person can qualify as a merchant based on general business expertise, not just expertise in the specific goods.'},
      {t:'rule', n:'Special UCC merchant rules: statute-of-frauds confirmatory memo between merchants (§2-201), firm/irrevocable offers (§2-205), the battle of the forms (§2-207), and modifications (§2-209). The implied warranty of merchantability (§2-314) applies only if the seller is a \'merchant with respect to goods of that kind.\' Merchants also bear an elevated good-faith duty.'},
      {t:'concept', n:'Consumer protection comes mostly from statutes OUTSIDE general contract law: the federal Consumer Credit Protection Act (Truth in Lending, Fair Credit Reporting, Fair Debt Collection, Electronic Funds Transfer), the Magnuson-Moss Warranty Act, and FTC rules (e.g., a 3-day right to cancel a sale made at the consumer\'s home). Most apply to agreements for personal, family, or household purposes — the PURPOSE, not the nature of the goods, controls.'},
      {t:'rule', n:'Domestic sales of goods are governed by UCC Article 2. \'Goods\' (§2-105) = all things movable at the time of identification to the contract (including specially manufactured goods, the unborn young of animals, and growing crops); it excludes money, investment securities, and things in action. Article 2 applies to ALL sales of goods — merchant or consumer.'},
      {t:'case', n:'Propulsion Technologies, Inc. v. Attwood Corp. (369 F.3d 896, 5th Cir. 2004) — a contract to fabricate and manufacture propeller castings is governed by Article 2, because §2-105 expressly includes \'specially manufactured goods.\' Article 2 applies whether the seller resells goods or makes them itself.'},
      {t:'rule', n:'Hybrid transactions (goods + services): most courts use the \'predominant factor\'/\'predominant purpose\' test — if goods predominate, Article 2 governs the whole deal; if services predominate, the common law governs. Bonebrake v. Cox (499 F.2d 951, 8th Cir. 1974) weighs: (1) the language of the contract, (2) the nature of the supplier\'s business, and (3) the relative value of goods vs. the rest (usually services). Construction contracts are almost always common-law/services.'},
      {t:'concept', n:'Alternative to the predominant-factor test: the \'gravamen of the action\' test applies Article 2 or common law depending on whether the dispute concerns the goods or the services (J.O. Hooker & Sons v. Roberts Cabinet Co.). A 2022 revision of §2-102 adopts a \'bifurcation\' approach. Software trend: prepackaged software treated as goods, custom software as services.'},
      {t:'rule', n:'CISG (UN Convention on the International Sale of Goods) governs sales of goods between businesses with places of business in different countries when both are Contracting States (Art. 1(1)(a)), or when private-international-law rules point to a Contracting State\'s law (Art. 1(1)(b)). The US took an Art. 95 reservation rejecting 1(1)(b). The CISG never applies between two US businesses and excludes consumer goods, auction sales, ships/aircraft, securities, and electricity. Parties may opt out under Art. 6 (BP Oil Int\'l v. Empresa Estatal Petroleos de Ecuador).'},
      {t:'concept', n:'History — Roman & early English: Rome had no general contract theory but enforced specific types: stipulatio (a formal question-and-answer unilateral promise) and \'real\' contracts (mutuum, commodatum, depositum, pignus) based on delivery of a thing. Early English writs were narrow — covenant (only sealed writings), debt (only a fixed/liquidated sum already earned), and detinue (return of bailed goods); none reached an unperformed exchange of promises, and a defendant could escape liability through \'wager of law.\''},
      {t:'case', n:'The writ of assumpsit grew out of tort (trespass on the case). \'Special assumpsit\' allowed recovery for badly performed promises (misfeasance), later extended to nonperformance (nonfeasance) on a reliance theory. By Slade\'s Case (76 Eng. Rep. 1074, 1602), \'general/indebitatus assumpsit\' permitted recovery of a debt with a jury trial — the foundation of the modern action for breach of an executory contract. (The first word of Hawkins v. McGee is \'Assumpsit.\')'},
      {t:'concept', n:'Source #1 — Common law: judge-made law, the most important source of contract law, built on stare decisis (\'stare decisis et non quieta movere\' — stand by what is decided). It serves fairness, stability, predictability, and efficiency. Not all precedent binds (another state\'s or a lower court\'s rulings may be only persuasive); courts adapt by distinguishing, \'doubting,\' or (rarely) overruling.'},
      {t:'rule', n:'Source #2 — UCC: the most successful uniform law, a joint product of the ALI and the Uniform Law Commission (NCCUSL), adopted in all 50 states. 11 Articles (Art. 1 General Provisions; 2 Sales; 2A Leases; 3 Negotiable Instruments; 4/4A Bank Deposits & Funds Transfers; 5 Letters of Credit; 6 Bulk Sales; 7 Documents of Title; 8 Investment Securities; 9 Secured Transactions); a 2022 revision added Article 12 for \'controllable electronic records\' (crypto, NFTs). §1-103 pulls in common law and equity to fill gaps.'},
      {t:'concept', n:'Other sources: (3) the CISG, UNIDROIT Principles, and Principles of European Contract Law (PECL) for international deals; (4) electronic-contracting statutes — the state UETA and the federal E-Sign Act — which make electronic records and signatures count as writings/signatures (E-Sign prevails on conflict but defers to UETA, and adds consumer-consent protections).'},
      {t:'concept', n:'Source — the Restatement of Contracts: First (1932, Williston reporter) and Second (1981, Farnsworth reporter), by the American Law Institute. Not binding law, but highly persuasive and frequently adopted by courts. Its black-letter rules sometimes state an aspirational or trend position rather than the majority rule — so it is \'not as definitive as its title suggests.\''},
      {t:'concept', n:'Sources — treatises & theory: the great treatises of Williston and Corbin (rivals who disagreed), plus Farnsworth, Calamari & Perillo, and Murray. Theory schools: classical formalism (Langdell, Williston) → legal realism / neoclassical (Corbin, Llewellyn) → post-modern Law & Economics (incl. \'efficient breach\'), Relational Contract Theory (Macneil), and Critical Legal Studies, plus neoformalism, will theory, and Critical Race / Feminist perspectives.'},
      {t:'concept', n:'Efficient breach (Law & Economics): expectation damages are justified because they let a party breach when a third party values the performance more. Example: a car is under contract for $8,000; a third party offers $10,000 (market value $8,500). The seller sells to the third party, pays the original buyer $500 in expectation damages, and everyone ends up at least as well off — so expectation damages (not specific performance or punitive damages) promote efficient allocation.'}
    ,
      {t:'concept', n:'§4.07 Offer & acceptance in auctions: an auction seeks the highest price through competitive bidding. The auctioneer is the SELLER\'S AGENT (not the seller herself). There are two types — \'with reserve\' and \'without reserve\' (UCC §2-328) — and which type it is determines who is the offeror and who is the offeree.'},
      {t:'rule', n:'Auction WITH reserve (the DEFAULT unless announced otherwise — UCC §2-328(3)): the auctioneer/seller may WITHDRAW the goods at any time before the sale is complete. Putting the goods up is only an INVITATION for bidders to make offers; each bid is an OFFER, and no contract forms until the auctioneer announces completion (\'lets the hammer fall\') — UCC §2-328(2).'},
      {t:'rule', n:'Auction WITHOUT reserve: once the auctioneer puts the property up / calls for bids, it CANNOT be withdrawn unless no qualified bid is made within a reasonable time. Putting it up = an IRREVOCABLE OFFER to sell to the highest bidder; each bid is an ACCEPTANCE (subject to being topped by a higher bid), and if no higher bid follows the auctioneer must sell to the highest bidder. (Merely advertising the auction is not a binding commitment — the seller may cancel before the item is \'put up.\')'},
      {t:'rule', n:'Withdrawal of bids (applies to BOTH types — UCC §2-328(3)): a bidder may RETRACT a bid any time before the auctioneer concludes the sale, and retracting the highest bid does NOT revive the prior bid — someone must bid again or the auction fails. Once the auctioneer announces the sale complete, the high bidder can no longer retract and has a binding contract. Example: Ben bids $16,000 then retracts before the hammer falls — no contract, and Dave\'s earlier $15,000 bid is not revived.'}
    ,
      {t:'concept', n:'📖 Module 1 reading (cont.): Contracts Ch. 4 §§4.01–4.03 — mutual assent, the objective theory of contract formation, and how to determine whether an offer (vs. a mere invitation to negotiate) has been made.'},
      {t:'concept', n:'§4.01 Mutual assent: one of the two key elements of contract formation (the other is consideration or a substitute). Mutual assent = the parties expressed a willingness to be bound to the SAME terms; it is normally — but not necessarily — shown through offer + acceptance. Courts loosely list \'offer, acceptance, and consideration\' as the elements, but offer/acceptance is really just the MECHANISM for finding mutual assent. A contract can form even when you cannot pinpoint the exact moment of formation, and even when some terms are uncertain (UCC §2-204(2)).'},
      {t:'rule', n:'§4.02 Objective theory of contract formation: what matters is the parties\' OUTWARD manifestations of intent (words, acts, and surrounding circumstances) and how a reasonable person would understand them — NOT secret subjective intent. The old \'meeting of the minds\' phrase is misleading and disfavored (though courts still use it). Learned Hand: a contract has \'nothing to do with the [subjective] intent of the parties.\' Corbin: parties are bound by the reasonable meaning of what they said, not by what they thought.'},
      {t:'concept', n:'Consequences of the objective theory: (1) parties are bound whether or not they subjectively believed they were \'legally\' bound — unless they manifested intent NOT to be bound; (2) the \'duty to read\' — you are bound by an agreement you sign even if you did not read or understand it (Ray v. William G. Eurice & Bros.; Upton v. Tribilcock — \'it will not do for a man to... say that he did not read it when he signed it\').'},
      {t:'concept', n:'Subjective intent still matters at the edges: if BOTH parties actually understand there is no contract (a sham or a joke), none is formed (Keller v. Holderman — $300 for a $15 watch, both knew it was a joke). And if the parties manifest an intent NOT to be legally bound, that is honored — e.g., disclaimers in employee handbooks, \'gentlemen\'s agreements,\' and casual social or family arrangements.'},
      {t:'case', n:'Embry v. Hargadine-McKittrick Dry Goods Co. (Mo. Ct. App. 1907) — leading objective-theory case. The trial court wrongly instructed that a contract required that BOTH parties intended to contract. Reversed: a contract exists if a reasonable person would have taken McKittrick\'s words as an agreement to employ Embry for another year AND Embry actually so understood them — even if McKittrick did not subjectively intend to hire him. The law looks to (1) words, (2) actions, and (3) surrounding circumstances.'},
      {t:'case', n:'Lucy v. Zehmer (Va. 1954) — a farm \'sold\' on the back of a restaurant check; Zehmer claimed it was a joke. Enforced: the outward circumstances (written terms, both spouses signed, a \'title satisfactory to buyer\' clause, a reasonable price, lengthy discussion) made it reasonable for Lucy to believe Zehmer was serious. Contrast Leonard v. Pepsico (S.D.N.Y. 1999) — no reasonable person would think a TV ad seriously offered a $23M Harrier Jet for Pepsi Points, so no contract.'},
      {t:'rule', n:'§4.03 Offer — DEFINITION (memorize and learn to apply it): a communication manifesting a willingness to enter a bargain, so made as to justify another person in believing that his assent is invited and, if given, will conclude the bargain (Restatement §24). In short: if a reasonable person would understand that the only thing left to form the deal is to say \'yes,\' it is an offer. The maker is the OFFEROR; the recipient is the OFFEREE, who then holds a \'power of acceptance.\''},
      {t:'rule', n:'§4.03[B][1] Offers require UNEQUIVOCAL language of commitment. Equivocal statements (\'I might be willing to sell,\' \'make me an offer and I\'ll decide,\' \'I want at least $20,000 for my car\') are merely INVITATIONS TO NEGOTIATE with no legal effect. Owen v. Tunison — \'it would not be possible for me to sell unless I received $16,000 cash\' was not an offer, just an invitation to open negotiations. (Harvey v. Facey — quoting a \'lowest price\' is not an offer.)'},
      {t:'concept', n:'§4.03[B][2]–[3] Reasonable understanding & no additional steps required: whether language is an offer is judged against the surrounding circumstances and the parties\' prior dealings. A statement is NOT an offer if the recipient should know that something beyond his assent is needed to close (\'make me an offer at that price and I\'ll consider it\'). Distinguish additional STEPS to form a contract from CONDITIONS on a duty — \'I\'ll buy your house if I qualify for a mortgage\' IS an offer; the financing is a condition of the duty, not a barrier to formation.'},
      {t:'concept', n:'§4.03[B][4]–[5] Words of commitment vs. statements of intent: words like \'offer,\' \'bid,\' \'propose,\' or \'promise\' suggest an offer but are not conclusive (Moulton v. Kershaw — a salt circular \'authorized to offer,\' with no quantity term and the look of an ad, was just an invitation). Conversely, the absence of the word \'offer\' does not prevent one. A mere statement of PRESENT INTENT or a plan is not a promise (Searles v. Trustees of St. Joseph\'s College — a coach saying the school \'intended\' to pay medical bills was not an offer); predictions and opinions are neither offers nor warranties.'},
      {t:'rule', n:'§4.03[B][6] Indefinite terms: an offer must be definite enough to identify the offeree, the subject matter, and usually the price and key performance terms, so a court can detect a breach and fashion a remedy (Restatement §33). UCC §2-204(3) is flexible for goods (no failure for open terms if the parties intended to contract and there is a reasonably certain basis for a remedy; price can be gap-filled under §2-305). The common law is stricter — especially on price for real estate and services.'},
      {t:'rule', n:'§4.03[C][1] Price quotations are usually NOT offers — they are invitations to make an offer (the word \'quote\' typically just invites an offer), even when sent in response to a buyer\'s inquiry. Nebraska Seed Co. v. Harsh and Lonergan v. Scolnick — price statements were mere invitations. EXCEPTION: Fairmount Glass Works v. Crunden-Martin — a quote \'for immediate acceptance\' with specific terms WAS an offer, because that language showed a present willingness to be bound. Specific language can override the customary meaning of \'quote.\''},
      {t:'rule', n:'§4.03[C][2] Advertisements are generally NOT offers (just invitations to negotiate) — otherwise a seller with one item could be bound to everyone who responds (unlimited liability). Newspaper ads, catalogs, and price lists are invitations. EXCEPTIONS: (1) an ad that is \'clear, definite, and explicit and leaves nothing open for negotiation\' AND limits who can accept — Lefkowitz v. Great Minneapolis Surplus Store (\'first come, first served,\' one fur stole for $1); (2) reward / \'prove me wrong\' ads where the advertiser knowingly assumes broad liability — Carlill v. Carbolic Smoke Ball Co. Some modern courts (Izadi v. Machado Ford; Chang v. First Colonial Savings Bank) treat definite ads as offers. Under the CISG (Art. 14) ads are invitations; PECL treats a professional\'s ad as an offer up to the stock on hand.'},
      {t:'concept', n:'§4.03[D] Jokes & hoaxes: the test is whether the joke was REASONABLY understood as a serious commitment. Lucy v. Zehmer — the outward signs made the \'joke\' farm sale enforceable. Leonard v. Pepsico — the Harrier-jet ad could not reasonably be taken seriously, so no contract. Lesson: be careful what you say if someone else could reasonably take it to heart.'}
    ]},
    { w:2, topic:'Offer — intent to be bound, predictions vs. terms, price quotations', tags:['offer','intent','objective theory','prediction','price quotation','Lucy v. Zehmer','Hawkins v. McGee','Fairmont Glass Works'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§1.02[F], 1.02[H]; §§4.04[B], 4.05[A]&[B], 4.11[A][1][a]. Required cases: Haines v. City of New York; Sylvan Crest Sand & Gravel v. United States; Strong v. Sheffield; Leonard v. Pepsico; Fairmount Glass Works v. Crunden-Martin; Gadsden Times v. Doe. (Optional: Hoffman v. Horton; Lonergan v. Scolnick.)'},
      {t:'exam', n:'📋 Module 2 (Intent to Memorialize & Indefiniteness): Graded — Resource Quiz (10 pts); Module Quiz (20 pts); Seminar (2 pts).'},
      {t:'exam', n:'First two issues on EVERY contracts essay: (1) What is the governing source of law? (2) Was a contract validly formed?'},
      {t:'rule', n:'Elements of valid contract formation: Offer + Acceptance + Consideration + Mutual Assent. Valid offer: (1) Intent — objective only. (2) Content — definite terms. (3) Communication — to identified offeree.'},
      {t:'rule', n:'Intent measured by objective manifestations — not subjective or hidden intent.'},
      {t:'case', n:'Lucy v. Zehmer, 196 Va. 493 (1954): Farm sale written on restaurant check held enforceable. Zehmer\'s claimed joking intent was irrelevant — outward conduct objectively showed intent to be bound.'},
      {t:'rule', n:'Prediction vs. term: whether a statement is a prediction or contractual term is determined by what a reasonable person would believe under the circumstances.'},
      {t:'case', n:'Hawkins v. McGee, 146 A. 641 (N.H. 1929): Surgeon\'s guarantee to restore hand to "100%" = contractual term, not prediction — a reasonable patient would believe it was a promise.'},
      {t:'rule', n:'Price quotation generally not an offer. Exception: directed to specific party, with all material terms, and language indicating readiness to be bound (e.g., "for immediate acceptance") = valid offer.'},
      {t:'case', n:'Fairmont Glass Works v. Crunden-Martin, 51 S.W. 196 (Ky. 1899): Quote "for immediate acceptance" with specific terms = valid offer; buyer\'s acceptance concluded a contract.'},
      {t:'exam', n:'Offer checklist: (1) Governing law. (2) Valid formation. (3) Intent — objective only. (4) Content — prediction vs. term (reasonable person standard). (5) Price quote — apply 3-element offer test.'}
    ,
      {t:'concept', n:'📖 Module 2 reading: Ch. 1 §1.02[F] (void/voidable/unenforceable) & §1.02[H] (sale of goods), plus Ch. 4 §§4.04[B], 4.05[A]–[B], 4.11[A] — who can accept, the manner of acceptance, unilateral contracts, and indefinite terms / agreements to agree.'},
      {t:'rule', n:'§1.02[F] Void / voidable / unenforceable: VOID = no contract at all (e.g., an agreement to commit a crime or tort); neither party can enforce it and it cannot be ratified. VOIDABLE = a real, valid contract until the party with the power to disaffirm acts — that power arises from illegality, lack of capacity (age or mental condition), or improper means of consent (fraud, duress, undue influence, unconscionability); that party may instead RATIFY (the other party stays bound). UNENFORCEABLE = a real contract with no remedy for breach, though still recognized for other purposes (e.g., as the basis for a tort claim for interference with contract). \'Void ab initio\' = void from the outset; performance may also be excused by mistake, impossibility, or frustration of purpose.'},
      {t:'rule', n:'§1.02[H] Sale of goods: UCC Article 2 governs domestic sales of goods — \'goods\' (§2-105) are things movable at identification (incl. specially manufactured goods, unborn animals, growing crops). Hybrid goods+services deals use the \'predominant factor\' test (Bonebrake v. Cox: language of the contract, nature of the supplier\'s business, relative value of goods vs. services); construction contracts are common-law. International business-to-business sales between Contracting States are governed by the CISG (US took an Art. 95 reservation; CISG excludes consumer goods). [Fuller detail in Week 1 / Ch. 1.]'},
      {t:'rule', n:'§4.04[B] Who can accept: only the person to whom the offer is directed can accept — the offeror is \'master of the offer\' and may dictate who may accept (Restatement (Second) §52). A bystander who merely overhears the offer cannot accept, and the offeree cannot assign her power of acceptance to someone else. Boston Ice Co. v. Potter — a party has the right to choose with whom he contracts.'},
      {t:'rule', n:'§4.04[B][2] Offers are NOT assignable: the offeree cannot transfer her power of acceptance to a third party (she may accept, then assign the resulting contract). BUT option contracts ARE generally assignable, because an option is already a concluded contract to keep the offer open (Restatement §320).'},
      {t:'concept', n:'Option contract = a contract to keep an offer open (an irrevocable offer), supported by its own consideration (e.g., paying $500 to hold an offer open for a week). Because it is already a concluded contract, it is assignable like any other contract.'},
      {t:'concept', n:'§4.04[B][4] Offers to multiple persons & rewards: an offer can be made to many people at once — a group, a class, or the public. A reward offer creates a power of acceptance in anyone who performs the requested act WITH KNOWLEDGE of the offer; you cannot accept a reward you never knew about. Reward offers are accepted by the ACT (performance), not by a promise, and usually the power of acceptance ends once someone performs.'},
      {t:'case', n:'Cobaugh v. Klick-Lewis, Inc. (561 A.2d 1248, Pa. Super. 1989) and Simmons v. United States — MOTIVE is irrelevant to accepting a reward/prize offer: a golfer who scored a hole-in-one and a fisherman who caught a tagged prize fish each earned the posted prize even though their main motive was just to golf or fish. Knowing of the offer is enough, and mixed motives don\'t defeat acceptance — but a person who expressly DISCLAIMS intent to accept does not accept.'},
      {t:'concept', n:'§4.04[B][5] Crossed offers: if two parties simultaneously send each other identical offers, neither aware of the other\'s, there is NO contract — you cannot accept an offer you don\'t know about (and there is no bargained exchange). Either party may back out until a later communication ratifies the deal.'},
      {t:'rule', n:'§4.05[A] Manner of acceptance — offeror is master of the offer: the offeror controls the time, place, and manner of acceptance. If the offer makes a particular manner the EXCLUSIVE/required means, the offeree must comply or the purported acceptance is ineffective (Restatement §§58, 60). Great Western Sugar Co. v. Lone Star Donut Co. — where the offer required a written acceptance, an oral acceptance was insufficient.'},
      {t:'rule', n:'Suggested vs. required manner (UCC §2-206(1)(a) / Restatement §30(2)): unless the offer UNAMBIGUOUSLY makes a manner of acceptance exclusive, the offeree may accept \'in any reasonable manner and by any reasonable medium in the circumstances.\' A merely suggested method is not the only permissible way to accept.'},
      {t:'concept', n:'Condition of formation vs. contract term: an offeror who requires something (e.g., loan-approval documentation) must make clear whether it is part of the MANNER OF ACCEPTANCE (no contract forms until provided) or merely a contractual DUTY (contract forms on assent; failure to provide is a breach). International Filter Co. v. Conroe Gin, Ice & Light Co. — \'becomes a contract when accepted by the purchaser and approved by an executive at the home office\' made home-office approval a condition of formation (so the proposal was not itself an offer).'},
      {t:'case', n:'Allied Steel & Conveyors, Inc. v. Ford Motor Co. (277 F.2d 907, 6th Cir. 1960) — even where the offer specified an exclusive manner of acceptance (sign and return an acknowledgment copy), the offeror was estopped from denying a contract after it let the offeree begin performance. Once performance begins it is hard to claim no contract formed — actions speak louder than words. (Note: the offer said acceptance \'should\' be returned, not \'must.\')'},
      {t:'rule', n:'§4.05[B][1] Acceptance by return promise: the most common formation — an exchange of promises creates a BILATERAL contract. The mutual promises supply consideration, and the contract forms even though neither side has yet performed.'},
      {t:'rule', n:'§4.05[B][2] Beginning performance as acceptance: where the offer permits acceptance by promise OR performance, acceptance may be made by (1) a promise, (2) actually beginning performance, or (3) tendering the beginning of performance. Beginning performance operates as a promise to render COMPLETE performance (Restatement §62(2)) — so the offeree is then bound to finish or be liable for breach.'},
      {t:'rule', n:'Prompt shipment of goods (UCC §2-206(1)(b)): a buyer\'s order for prompt/current shipment can be accepted EITHER by the seller\'s promise to ship OR by prompt shipment. Shipping NONCONFORMING (wrong or defective) goods is BOTH an acceptance AND a simultaneous breach — UNLESS the seller seasonably notifies the buyer the goods are sent \'as an accommodation\' (a counteroffer). Corinthian Pharmaceutical Systems v. Lederle Labs.'},
      {t:'concept', n:'Mere preparation is NOT acceptance (§4.05[B]): preparing to perform (e.g., buying nails and shingles for a roofing job) is not the same as beginning performance and does not cut off the offeror\'s power to revoke. White v. Corlies & Tifft — a builder who bought materials and worked in his own shop had only prepared; the test is whether the conduct is clearly REFERABLE to the specific offer.'},
      {t:'rule', n:'§4.05[B][3] Acceptance by performance alone — unilateral contracts: some offers permit acceptance ONLY by completed performance (rewards, exercising an option, certain bonus/pension offers, letters of credit, and \'prove me wrong\' offers). The offeree makes no promise and owes no duty — only FULL performance accepts; part performance is not acceptance. Carlill v. Carbolic Smoke Ball Co. and Dahl v. HEM Pharmaceuticals Corp. (participants were free to quit the drug trial, but only completing it earned the year\'s free supply).'},
      {t:'rule', n:'§4.05[C] Notice of acceptance & the \'mailbox rule\': acceptance generally must be communicated, but a mailed acceptance is effective when SENT, not when received (Restatement §63) — so a properly dispatched acceptance binds even if it is delayed or lost. An offeror can opt out by requiring that acceptance actually be RECEIVED to be effective; instantaneous electronic communication usually avoids the issue.'},
      {t:'rule', n:'§4.11 Definiteness: a contract\'s terms must be reasonably definite — if they are so indefinite that a court cannot detect a breach or fashion a remedy, no contract is formed (Restatement §33). But both UCC §2-204(3) and the Restatement use a FLEXIBLE standard: a deal does not fail for open terms if (1) the parties intended to make a contract and (2) there is a reasonably certain basis for giving a remedy.'},
      {t:'case', n:'Indefiniteness examples: T.O. Stanley Boot Co. v. Bank of El Paso (no enforceable $500,000 line of credit — due date, interest rate, and repayment terms were unsettled); Academy Chicago Publishers v. Cheever (publishing agreement too indefinite — no agreement on the number of pages or stories, or how stories would be selected); Suffield Development Associates v. Society for Savings (loan amount unsettled).'},
      {t:'rule', n:'§4.11[A][1][a] Agreements to agree: traditionally, leaving a material term \'to be agreed upon\' later makes the agreement unenforceable. Joseph Martin, Jr. Delicatessen v. Schumacher — a lease renewal \'at rentals to be agreed upon\' was unenforceable; deferring agreement on rent deferred any commitment, and the court would not impair the parties\' freedom NOT to contract. Modern courts are more willing to fill the gap (e.g., using market value), especially for lease renewals where the tenant relied heavily on its right to renew.'}
    ]},
    { w:3, topic:'Governing law & definite terms — UCC vs. common law, predominant factor test, agreement to agree', tags:['UCC','common law','predominant factor test','definite terms','agreement to agree','BMC Industries','Martin v. Schumacher'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§1.02[B], 1.02[G], 1.02[H]; §4.03[B][6], §4.11; §10.06. Required cases: Joseph Martin Jr. Delicatessen v. Schumacher; BMC Industries v. Barth Industries; Southwest Engineering v. Martin Tractor; Copeland v. Baskin Robbins; Oglebay Norton v. Armco; Wood v. Lucy, Lady Duff-Gordon.'},
      {t:'exam', n:'📋 Module 3 (Intent to Memorialize & Indefiniteness, cont.): Graded — Resource Quiz (10 pts); Module Quiz (20 pts).'},
      {t:'rule', n:'UCC governs transactions in goods (tangible, moveable personal property); common law governs everything else (services, real property, employment).'},
      {t:'rule', n:'Predominant Factor Test (mixed goods/services): predominant purpose = goods, services incidental → UCC. Predominant purpose = services, goods incidental → common law. Factors: (1) language of contract, (2) nature of supplier\'s business, (3) intrinsic worth of goods vs. services.'},
      {t:'case', n:'BMC Industries, Inc. v. Barth Industries, Inc., 160 F.3d 1322 (11th Cir. 1998): Contract to design, fabricate, install automation equipment. UCC governed — goods made up more than half the cost and payment was due on delivery.'},
      {t:'concept', n:'Governing law IRAC template: "The UCC governs transactions in goods while common law governs everything else. Here, [goods/services analysis]. Therefore, [UCC/common law] governs."'},
      {t:'rule', n:'Definite and sufficient terms: An offer must be definite enough for a court to (1) determine whether a breach occurred, and (2) fashion a remedy.'},
      {t:'rule', n:'Agreement to agree: A material term left for future negotiation = unenforceable. Courts will not supply missing material terms. Signal phrase: "to be agreed upon" or "to be negotiated."'},
      {t:'case', n:'Joseph Martin, Jr., Delicatessen v. Schumacher, 52 N.Y.2d 105 (N.Y. 1981): Lease renewal clause left rent "to be agreed upon." Held: unenforceable agreement to agree — rent is a material term.'},
      {t:'exam', n:'Content/definiteness: UCC — quantity is the essential term; price/delivery/payment can be gap-filled. Common law — all material terms must be definite (parties, subject matter, price, time). Watch for "to be agreed upon" language.'},
      {t:'exam', n:'Full offer IRAC: (1) Governing law. (2) Valid formation. (3) Offer → Intent; Content (sufficient/definite terms); Communication. Apply each with "Here, … Therefore, …" structure.'}
    ,
      {t:'rule', n:'§10.06 DUTY OF GOOD FAITH & FAIR DEALING (Module 3 reading) — implied in EVERY contract (Rest. §205; UCC §1-304). Origin: a duty not to interfere with the other party\'s performance (Patterson v. Meyerhofer). Affirmative form (Kirke La Shelle v. Paul Armstrong): \'neither party shall do anything to destroy or injure the right of the other to receive the fruits of the contract.\' It relates to definite-terms/gap-filling because good faith is how courts police the discretion left by open terms.'},
      {t:'rule', n:'§10.06[A] MEANING: UCC §1-201(b)(20) — \'HONESTY IN FACT and the observance of reasonable commercial standards of FAIR DEALING.\' Defined by the conduct it PREVENTS (evasion of the deal\'s spirit, abuse of a power to specify terms, weaseling interpretations, interference). Market Street Associates v. Frey (Posner): no altruism or fiduciary duty required — only no OPPORTUNISTIC exploitation of gaps or uncontemplated circumstances.'},
      {t:'case', n:'Wood v. Lucy, Lady Duff-Gordon (N.Y. 1917, Cardozo) — §10.06[B] REASONABLE/BEST EFFORTS (a Module 3 required case). An exclusive marketing agreement looked ILLUSORY because Wood made no express promise, but Cardozo implied a duty to use REASONABLE EFFORTS (her pay was a % of his sales), saving the contract — the classic cure for an indefinite/illusory promise. UCC §2-306(2) codifies a \'best efforts\' duty in exclusive-dealing deals; Bloor v. Falstaff (express best-efforts to promote Ballantine).'},
      {t:'rule', n:'§10.06[C] Good faith cabins DISCRETION left by open terms: requirements/output quantity must be in good faith (UCC §2-306(1)); a price left to one party = a price to fix \'in good faith\' (§2-305(2)); unilateral termination needs reasonable notice (§2-309) and insecurity-acceleration is limited by good faith (§1-309); modifications need no consideration but must be free of duress/bad faith (§2-209). This is why an \'agreement to agree\' can sometimes be saved when a good-faith standard or external benchmark supplies the missing term (contrast Joseph Martin v. Schumacher, where rent was left wholly open).'}
    ]},
    { w:4, topic:'Advertisements as offers, acceptance of unilateral offers & revocation', tags:['advertisement','unilateral contract','bilateral contract','acceptance','revocation','Carlill','Leonard v. Pepsico','Petterson v. Pattberg'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§4.04, 4.05, 4.08[A]. Required cases (read in groups): Group 1 — Broadnax v. Ledbetter; MCC-Marble Ceramic v. Ceramica Nuova d\'Agostino; Carlill v. Carbolic Smoke Ball; Leonard v. Pepsico. Group 2 — Day v. Caton; Wilhoite v. Beck; Miller v. NBD Bank. Group 3 — 39 U.S.C. §3009; Hobbs v. Massasoit Whip; Petterson v. Pattberg; Brackenbury v. Hodgkin; Motel Services v. Central Maine Power.'},
      {t:'exam', n:'📋 Module 4 (Acceptance): Graded — Resource Quiz (11 pts); Seminar (2 pts).'},
      {t:'concept', n:'Bilateral: exchange of promises. Unilateral: promise for an act — acceptance occurs only upon completion of performance, not by promising to perform.'},
      {t:'rule', n:'Advertisements are generally invitations to deal, not offers. Exception: reward-style ads that are specific, definite, and leave nothing open for negotiation = unilateral offers to anyone who performs the stated conditions.'},
      {t:'case', n:'Carlill v. Carbolic Smoke Ball Co., 1 Q.B. 256 (1893): Ad promising £100 to anyone who used product as directed and caught flu = unilateral offer. Carlill accepted by performing the stated conditions (using product, catching flu).'},
      {t:'rule', n:'When offeror specifies the manner of acceptance, offeree must comply with that specified manner. Attempting to accept differently = not a valid acceptance.'},
      {t:'case', n:'Leonard v. Pepsico, 88 F.Supp.2d 116 (S.D.N.Y. 1999): Harrier Jet TV ad was not a valid offer — humorous commercial. Catalog was the specified acceptance mechanism and did not list the jet.'},
      {t:'rule', n:'Revocation: offer can be revoked any time before acceptance. Exception (majority): once unilateral performance begins, offer becomes irrevocable for reasonable time. Exception (minority): bilateral contract formed on beginning performance.'},
      {t:'case', n:'Petterson v. Pattberg, 248 N.Y. 86 (1928): Mortgage discount offer validly revoked before May payment was tendered — revocation came before acceptance.'},
      {t:'exam', n:'Ad analysis: general ad = invitation to deal. Reward/specific ad = unilateral offer; accepted by performing conditions. Humor/absurdity = signal no reasonable person would treat as serious offer.'}
    ,
      {t:'concept', n:'📖 Module 4 reading: Contracts Ch. 4 §§4.04–4.05 (Acceptance & Manner of Acceptance) and §4.08[A] (Termination of offers — lapse). [Note: §4.04[B] who-can-accept and §4.05[A]–[B] manner-of-acceptance basics are also part of this reading but their full notes are in Week 2 / Module 2.]'},
      {t:'concept', n:'§4.04 Acceptance: an offer creates a \'power of acceptance\' in the offeree (Hohfeld\'s term). A contract forms when the offeree manifests assent within the time and manner the offer requires. Acceptance is judged by the OBJECTIVE theory — outward manifestations, not secret intent. (Sam offers his car for $16,000 and Barb says \'I\'ll take it\' as a joke — if Sam reasonably thought she was serious, there\'s a contract. \'I don\'t want that hunk of junk\' is a rejection even if she secretly meant to buy.)'},
      {t:'rule', n:'§4.04[A] Acceptance must be UNEQUIVOCAL: an offeree who expresses doubt (\'I might agree to that\') has not accepted. A clear yes (\'that\'s a fair price, I want you to build it\') is acceptance; manifested reluctance (\'I want it, but $60,000 is too high\') is not.'},
      {t:'rule', n:'§4.04[A][1] Grumbling acceptance is EFFECTIVE: an acceptance that complains but still agrees (\'I really thought I could get a better price, but all right, build it\') forms a contract. A grumble is still a yes.'},
      {t:'rule', n:'§4.04[A][2] Conditional acceptance is INEFFECTIVE: a reply that makes assent depend on new or added terms (\'I accept, but only if you finish within three months\') is NOT an acceptance — it is a counteroffer. BUT if the added term only makes explicit what was already IMPLIED (\'only if you finish within a reasonable time\'), it is still an acceptance. A mere request or inquiry about changing terms does not destroy an otherwise unequivocal acceptance.'},
      {t:'concept', n:'Mirror-image rule (common law): a purported acceptance that adds or changes terms is not a \'mirror image\' of the offer, so it is a counteroffer, not an acceptance. UCC Article 2 (§2-207) makes major inroads on this for sales of goods. (Under the CISG, additional/limiting/modifying terms = rejection + counteroffer; immaterial differences can still form a contract unless the offeror promptly objects — and the CISG treats price, payment, quality, quantity, delivery, liability, and dispute-settlement terms as MATERIAL.)'},
      {t:'rule', n:'§4.05[C] Notice of acceptance: acceptance generally must be communicated, but the offeror need not actually RECEIVE it — a reasonable effort to notify usually suffices, and a mailed acceptance is effective when sent (mailbox rule). Where acceptance is by beginning performance in the offeror\'s plain view, the performance itself gives notice; but separate notice IS required if the offeror asked for it or the offeree has reason to know the offeror won\'t otherwise learn of performance (Restatement §54). Some offers (reward offers like Carlill; guaranty offers) dispense with notice by their nature.'},
      {t:'rule', n:'§4.05[D] Silence as acceptance: silence is normally NOT acceptance, and an offeror cannot declare \'your silence = acceptance\' to trap an offeree. Exceptions: (1) accepting the benefit of services with a chance to refuse and reason to know payment is expected (Day v. Caton — party wall); (2) a prior course of dealing gives silence meaning (Hobbs v. Massasoit Whip — silent retention of eel skins after repeated past dealings was acceptance); (3) negative-option plans the offeree expressly agreed to (book/wine/coffee clubs).'},
      {t:'concept', n:'Unsolicited merchandise & silence: silently keeping unordered goods can look like acceptance, but federal law (39 U.S.C. §3009) lets a consumer treat unsolicited merchandise sent by mail as a GIFT — keep it and owe nothing. Silence CAN accept a modification of an existing contract (Raasch v. NCR — continued work under a new handbook containing an arbitration clause).'},
      {t:'concept', n:'§4.05[E] Means of communicating acceptance: assent may be given by any reasonable method (letter, phone, email, text) unless the offer expressly limits it. The medium used to send the offer is presumptively a reasonable medium for acceptance, but the offeree is not limited to it (reasonableness turns on speed, reliability, trade custom, and course of dealing). Automated acceptances by \'electronic agents\' are valid under UETA and the federal E-Sign Act; EDI master agreements govern recurring electronic orders.'},
      {t:'rule', n:'§4.05[F] Final written contract & \'letters of intent\': when parties orally agree intending to sign a formal writing later, the question is whether signing the writing was a CONDITION of formation (no deal yet) or just a convenient memorialization (already bound). Factors (Restatement §27): (1) is this type of deal usually put in writing? (2) how many details remain open? (3) the size of the transaction; (4) did performance begin before signing? (5) did the parties say they wouldn\'t be bound until a writing? (International Castings Group v. Premium Standard Farms — emails showed a binding deal; the writing was a mere memorial.)'},
      {t:'rule', n:'§4.05[G] Assent to standardized/adhesion form contracts: terms in a signed (or \'I agree\'-clicked) standardized form are generally enforceable where the party assents and has reason to know like writings carry such terms (Restatement §211(1)) — EXCEPT a term the drafter has reason to know the party wouldn\'t have agreed to if she knew of it (§211(3)). Courts scrutinize adhesion terms three ways: (1) reasonable opportunity to read/understand; (2) reasonable expectations; (3) unconscionability.'},
      {t:'concept', n:'§4.05[G][1] Opportunity to read (online contracts): the traditional rule is you\'re bound by what you sign whether or not you read it. Online, the question is whether the party had REASONABLE NOTICE and a chance to review before assenting — conspicuousness and context are key. Unenforceable: Specht v. Netscape (arbitration term below the visible screen, no notice); Cullinane v. Uber and Nicosia v. Amazon (terms not conspicuous). Enforceable: clear clickwraps (Forrest v. Verizon; Caspi v. Microsoft). \'Money now, terms later\' with a right to return can be valid.'},
      {t:'case', n:'§4.05[G][2] Reasonable-expectations doctrine (originated in insurance): the agreement is read to match the customer\'s reasonable expectations even if the fine print conflicts. C&J Fertilizer v. Allied Mutual — a \'burglary\' definition requiring visible marks of forced entry went beyond the insured\'s reasonable expectations and was not enforced. Broemmer v. Abortion Services of Phoenix — an arbitration clause fell outside a stressed, unsophisticated patient\'s reasonable expectations and was unenforceable.'},
      {t:'concept', n:'§4.05[G][3] Unconscionability (the third screen): denies enforcement where there was an absence of meaningful choice PLUS terms unreasonably favorable to the other party (Williams v. Walker-Thomas Furniture) — generally requires BOTH procedural and substantive unfairness. It goes further than reasonable expectations because it can strike down even an expected term that is grossly unfair.'},
      {t:'rule', n:'§4.05[H] Rolling (\'money now, terms later\') contracts: terms delivered AFTER purchase (inside the box, or at install) can still bind if the buyer had notice and a right to return for a refund after reviewing them. ProCD v. Zeidenberg (Easterbrook) — shrinkwrap \'noncommercial use\' license enforced; acceptance occurred by USING the software after a chance to read the license. Hill v. Gateway — an arbitration term in the computer box bound the phone buyer. Contra: Klocek v. Gateway and Specht — applied §2-207 or found no reasonable notice, so the late terms were mere proposals. The 2022 Restatement of Consumer Contracts §2 would bind late terms only with advance notice, a chance to review, and a chance to cancel without unreasonable cost.'},
      {t:'concept', n:'§4.08 Termination of the power of acceptance: a contract forms only if acceptance happens BEFORE the offer terminates. An offer can end by (1) lapse, (2) revocation, (3) rejection, (4) counteroffer, or (5) death or incapacity of the offeror.'},
      {t:'rule', n:'§4.08[A] Lapse (expiration of time to accept): as master of the offer, the offeror sets how long it lasts, and a stated time controls. If none is stated, the offer lasts a REASONABLE time (depends on prior dealings, trade custom, and market volatility — a volatile market means a short window). In face-to-face or phone talks the power of acceptance usually ends when the conversation ends, unless extended (\'think about it and get back to me\'). A mailed acceptance is timely if sent by midnight of the day the offer is received (a safe harbor, not a hard deadline). A lapsed offer can be revived by repeating it — but a mere rebroadcast does not revive it (Newman v. Schiff — a tax protester\'s $100,000 offer made on a live TV show was not revived by a later taped rerun).'}
    ]},
    { w:5, topic:'Acceptance — rejection, counter-offers & UCC 2-207 Battle of the Forms', tags:['acceptance','rejection','counter-offer','UCC 2-207','battle of the forms','mirror image rule','merchants','Diamond Fruit Growers','Dorton v. Collins'], notes:[
      {t:'concept', n:'📖 Reading — Ferriell §§4.08[B–E], 4.09, 4.10. Required cases & statutes: Dorton v. Collins & Aikman; UCC §2-207; Diamond Fruit Growers v. Krack; Fujimoto v. Rio Grande Pickle; ProCD v. Zeidenberg. (Optional: Swift & Co. v. Smigel; Hill v. Gateway 2000; Klocek v. Gateway.)'},
      {t:'exam', n:'📋 Module 5 (Revocation of the Offer): Graded — Discussion (10 pts); Resource Quiz (10 pts); Seminar (2 pts).'},
      {t:'concept', n:'Module 5 focus: Mutual Assent — specifically acceptance. Full Contracts flowchart: Formation → Mutual Assent (Offer + Acceptance) → Consideration → Bargained-for Exchange → Defenses to Formation → Promissory Estoppel → Restitution/Quasi-Contract.'},
      {t:'rule', n:'Rejection: A rejection terminates the offer — the offeree loses the power of acceptance. A later attempt to "accept" is NOT acceptance; it is a new offer from the original offeree. Hypo: Ann offers Betty a watch at 50% discount. Betty says no (rejection → offer terminated). Betty then says "I changed my mind, yes." Betty has NOT accepted — she has made a new offer to Ann.'},
      {t:'rule', n:'Counter-offer: A response proposing different or additional terms. Under common law mirror image rule: (1) operates as a rejection of the original offer, and (2) creates a new offer from the original offeree. The original offeror now has the power of acceptance.'},
      {t:'rule', n:'Mirror Image Rule (common law): Acceptance must be the precise mirror of the offer — identical terms, nothing added, nothing changed. Any variance = counter-offer and rejection of the original offer. The original offer cannot be revived.'},
      {t:'rule', n:'UCC § 2-207 (Battle of the Forms) — Overview: The UCC rejects the mirror image rule. A definite and seasonable expression of acceptance operates as acceptance even if it states additional or different terms — UNLESS acceptance is expressly made conditional on assent to the new terms. If expressly conditioned → no contract on documents → look to parties\' conduct under § 2-207(3).'},
      {t:'rule', n:'UCC § 2-207(2) — Additional terms between merchants: When both parties are merchants, additional terms in the acceptance automatically become part of the contract UNLESS one of three exceptions: (1) Ironclad offer — original offer expressly limits acceptance to its own terms. (2) Material alteration — the additional terms materially alter the contract (significantly change risk or burden). (3) Objection — offeror has already objected or objects within a reasonable time.'},
      {t:'rule', n:'UCC § 2-207(2) — Non-merchants: When at least one party is NOT a merchant, additional terms in the acceptance do NOT automatically become part of the contract. They are mere proposals requiring the offeror\'s express assent.'},
      {t:'rule', n:'UCC § 2-207(3) — Contract by conduct: If no contract is formed on the documents (acceptance expressly conditioned on new terms AND offeror did not agree), a contract may still exist from the parties\' conduct. Terms = (1) terms on which both writings agree + (2) UCC gap-filler provisions.'},
