      {t:'case', n:'§10.04[C][2]-[3] EXTORTION vs. lawful threats. Extortion/blackmail — threatening to expose a crime or embarrassing info, or to report someone to a prosecutor/IRS, is DURESS even if the victim is guilty (Tallmadge v. Robinson — false-testimony threat; Berger v. Berger — IRS-report threat; Germantown Mfg. v. Rawlinson — threat to have husband arrested = \'the epitome of duress\'). A GOOD-FAITH threat to bring a CIVIL suit (\'pay or I\'ll sue\') is NOT duress; a bad-faith / abuse-of-process threat is. Hard bargaining (\'I\'ll take my business elsewhere\') is not duress.'},
      {t:'case', n:'Austin Instrument v. Loral Corp. (N.Y. 1971) — §10.04[C][4] ECONOMIC DURESS, the leading case. A subcontractor threatened to STOP DELIVERY of precision gear parts (needed for Loral\'s Navy radar contract) unless Loral paid more; Loral could not COVER from approved vendors in time. Held: the threat to breach deprived Loral of its free will and left \'no reasonable alternative\' → the price modification was voidable. Contrast Alaska Packers v. Domenico (fishermen\'s mid-voyage raise demand — classic economic duress, though decided on lack of consideration). Totem Marine v. Alyeska (debt settlement under financial distress).'},
      {t:'rule', n:'§10.04[C][4][a] HARD BARGAINING vs. duress. Economic pressure alone is fine — a take-it-or-leave-it term (Quigley v. KPMG — arbitration clause), a refusal to sell, or the mere \'stress of business conditions\' is NOT duress unless the OTHER party caused the distress. Split: Selmer v. Blakeslee-Midwest (Posner — mere business stress not caused by defendant ≠ duress) vs. Centric Corp. v. Morrison-Knudsen (wrongful exploitation of business exigencies CAN be duress). The linchpin is whether COVER / a legal remedy was a reasonable alternative — if a substitute was available, no duress.'},
      {t:'case', n:'Odorizzi v. Bloomfield School District (Cal. 1966) — §10.04[D] UNDUE INFLUENCE. A teacher, just home after 40 sleepless hours of arrest/interrogation, was pressured by supervisors into resigning. Two elements (§177): (1) the victim is under DOMINATION of, or in a confidential/trusting relationship with, the other; and (2) UNFAIR PERSUASION. Odorizzi\'s 7 marks of OVERPERSUASION: (a) unusual time, (b) unusual place, (c) insistence the deal be finished at once, (d) emphasis on consequences of delay, (e) multiple persuaders, (f) no third-party advisers, (g) statements there\'s no time to consult an adviser. Fiduciary relationships (trustee, attorney) make an unfair contract voidable even without wrongdoing (Turner v. Leathers).'},
      {t:'case', n:'Williams v. Walker-Thomas Furniture Co. (D.C. Cir. 1965) — §10.05 UNCONSCIONABILITY, the landmark. A furniture store\'s CROSS-COLLATERALIZATION clause let it repossess EVERY item ever bought if any single balance went unpaid. Held unconscionable: \'an absence of meaningful choice on the part of one party TOGETHER WITH contract terms unreasonably favorable to the other.\' Two prongs: PROCEDURAL (no meaningful choice — adhesion, fine print, unfair surprise, unequal bargaining power) + SUBSTANTIVE (oppressively one-sided terms). Codified in UCC §2-302 (prevention of \'oppression and unfair surprise\') and Rest. §208.'},
      {t:'rule', n:'§10.05 Unconscionability — how it works. SLIDING SCALE (Armendariz v. Foundation Health — mandatory-arbitration clause): the more substantively oppressive the term, the less procedural unfairness is needed, and vice versa. Adhesion alone usually satisfies procedure only weakly — courts want MORE (fine print, complex language, disparity in sophistication/bargaining power). Occasionally SUBSTANTIVE unfairness ALONE suffices — a grossly excessive price (Maxwell v. Fidelity Financial; the 1960s-70s \'bad freezer\' cases). Merchants are held to a higher standard (A&M Produce is a rare merchant success, based on a serious procedural flaw). Arbitration: AT&T Mobility v. Concepcion — the FAA preempts state rules conditioning arbitration clauses on class-action availability.'}
    ]},
    { w:12, topic:'Performance — Express Conditions', tags:['express conditions','conditions','satisfaction','strict compliance'], notes:[

  cl623: { id:'cl623', name:'CL623 — Torts I', badge:'b-torts', label:'TORTS', weeks:[
    { w:1, topic:'Introduction to tort law & intentional torts overview', tags:['tort','intent','intentional torts','transferred intent'], notes:[
      {t:'concept', n:'📖 Reading — Module 1 (Introduction to Torts): no assigned reading.'},
      {t:'concept', n:'⭐ BAR-PREP REFERENCE (saved): Valeria Braden "Bar Exam Prep — TORTS" guide covers every torts doctrine in MBE+essay format (Attack Statement, Elements, Memory line, MCQ recognition words, Common MBE Traps, Compare tables, Torts Essay Order). Files: ~/Library/CloudStorage/OneDrive-Personal/Bar Prep Guides/BarPrep_Torts_Braden.pdf. Topics: intent (desire/substantial certainty), transferred intent, the intentional torts (battery, assault, false imprisonment, IIED, trespass to land/chattels, conversion), economic torts, all the defenses/privileges (consent, self-defense, defense of others/property, recapture, shopkeeper\'s, necessity), negligence (duty/Andrews, reasonable person, professional, landowner, breach, negligence per se, res ipsa, actual & proximate cause, Summers/market-share, joint tortfeasors, damages, contributory/comparative negligence, assumption of risk, immunities), NIED, strict liability (animals/abnormally dangerous), products liability, nuisance, defamation, and invasion of privacy.'},
      {t:'exam', n:'📋 Syllabus — Module 1 (Introduction to Torts): No assigned reading. Graded: Resource Quiz (10 pts, untimed); ungraded Seminar. Course note: 15 live seminars (Modules 1–15), up to 2 pts each = 26 pts, plus up to 24 holistic participation pts graded in Module 15.'},
      {t:'concept', n:'A tort is a civil wrong causing harm or loss resulting in legal liability. Distinguished from crime (public wrong) and contract (private agreement breach).'},
      {t:'concept', n:'Three categories: intentional torts, negligence, strict liability.'},
      {t:'concept', n:'Intent (Restatement Second § 8A): a person acts with intent if (1) they have the purpose to produce the consequence, or (2) they know to a substantial certainty the consequence will result.'},
      {t:'concept', n:'Transferred intent: applies to battery, assault, false imprisonment, trespass to land, trespass to chattels. Person-to-person AND tort-to-tort.'},
      {t:'exam', n:'Identify the specific tort first, then test each element. Intent is the threshold question — if no intent, move to negligence.'}
    ,
      {t:'rule', n:'Intent is a term of art: under the Restatement (Second) definition followed by most courts, the defendant acts with intent if she either (1) desires the result that constitutes the tort, or (2) knows to a substantial certainty that the result will occur. The test is subjective and stated in the alternative.'},
      {t:'concept', n:'Substantial-certainty intent is distinct from recklessness. A reckless defendant takes a substantial, unreasonable risk that the tortious result will occur (e.g., driving at excessive speed); an intentional defendant actually knows in her own mind that the result is substantially certain (e.g., blowing up a stagecoach knowing a passenger is aboard).'},
      {t:'rule', n:'Transferred intent historically applies to five intentional torts: battery, assault, false imprisonment, trespass to chattel, and trespass to land. If the defendant intends any one of the five but instead (or also) commits another of the five, the intent transfers; intent also transfers from the intended victim to any actual victim.'},
      {t:'concept', n:'The Restatement does not adopt transferred intent generally. It accepts transfer only between battery and assault (and between victims within those torts), by defining the requisite intent for both to include the intent to commit either.'},
      {t:'concept', n:'Courts are divided over single vs. dual intent for battery. A majority and the Restatement (Third) require only intent to cause the contact (single intent); a minority require dual intent, that the defendant both intend the contact and intend it to be harmful or offensive (e.g., White v. Muniz).'},
      {t:'rule', n:'Under the mistake doctrine, if the defendant intends acts that constitute a tort, it is no defense that she reasonably mistook the identity of the person or property or wrongly believed she had a privilege. Example: shooting B\'s dog reasonably believing it a wolf, or entering B\'s land believing it one\'s own, is still tortious.'},
      {t:'rule', n:'Neither insanity nor infancy is a defense to intentional torts (unlike in criminal law). However, because intent is subjective, an extremely young or severely impaired defendant may in fact lack the requisite desire or substantial certainty and thus not be liable.'},
      {t:'concept', n:'A child or insane person need not appreciate the wrongfulness of the act to be liable. If a child knows an adult will fall when he pulls a chair away, he intends wrongful contact and commits battery, without any need to prove he intended serious harm.'},
      {t:'case', n:'McGuire v. Almy, 8 N.E.2d 760 (Mass. 1937): an insane person who intended harmful contact can be held liable for battery, illustrating that insanity is not a defense to an intentional tort.'},
      {t:'exam', n:'Exam trap: the substantial-certainty test is subjective, so the fact that a reasonable person would have been substantially certain is not dispositive—it is only evidentiary of whether the defendant actually held that mental state. Watch for fact patterns that try to substitute an objective standard.'},
      {t:'exam', n:'Exam trap: transferred intent is limited to the historic five torts. It does NOT apply to conversion or to intentional infliction of emotional distress, even though conversion closely resembles trespass to chattel.'}
    ]},
    { w:2, topic:'Intent, battery & the waterfall method', tags:['intent','battery','substantial certainty','desire','waterfall method','Garratt v. Dailey','Cohen v. Smith','Snyder v. Turk','Ranson v. Kitner'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine §§1.01–1.02 (Battery).'},
      {t:'exam', n:'📋 Syllabus — Module 2 (Battery): Reading: Diamond & Levine §§1.01–1.02. Required cases: Snyder v. Turk (627 N.E.2d 1053, Ohio Ct. App. 1993); Cohen v. Smith (648 N.E.2d 329, Ill. App. Ct. 1995); Garratt v. Dailey (279 P.2d 1091, Wash. 1955) (Garratt I); Baska v. Scherzer (156 P.3d 617, Kan. 2007). Graded: Resource Quiz (10 pts); Seminar (2 pts).'},
      {t:'rule', n:'Intent (Restatement Second § 8A): (1) desire the consequences (purpose), OR (2) know to a substantial certainty they will occur. Subjective test — what was actually in this defendant\'s mind.'},
      {t:'rule', n:'Battery: volitional act by defendant which intentionally causes plaintiff to suffer harmful or offensive contact. Volitional act = voluntary movement; reflexes/unconscious movement do not qualify.'},
      {t:'concept', n:'Intent is NOT: hostility/malice, benign motive (does not negate intent), reasonable mistake (Ranson v. Kitner — shot plaintiff\'s dog thinking it was a wolf; still liable). Majority: single intent = intent to make the contact is enough.'},
      {t:'case', n:'Garratt v. Dailey, 46 Wn.2d 197 (Wash. 1955): 5-year-old Brian Dailey pulled chair from where Ruth Garratt was about to sit; she fell and fractured her hip. Held: Remanded — infancy is NOT a categorical bar to liability. Court must find whether Brian actually knew to a substantial certainty the contact would result.'},
      {t:'case', n:'Snyder v. Turk, 90 Ohio App. 3d 18 (1993): Frustrated surgeon pulled scrub nurse\'s face toward surgical opening. Held: Contact offensive to a reasonable person\'s sense of dignity = battery even without physical injury.'},
      {t:'case', n:'Cohen v. Smith, 269 Ill. App. 3d 1087 (1995): Patient gave advance notice of religious objection to being seen/touched by males; male nurse observed and touched her during C-section. Held: Where defendant has advance notice of particular sensitivity, otherwise non-offensive contact can be battery — known special sensitivity exception.'},
      {t:'rule', n:'Waterfall method: (1) State broad rule for the tort. (2) Define ambiguous terms (intent, harmful/offensive, consent). (3) Add nuanced rules from precedent. (4) Apply facts to every layer. (5) Raise affirmative privileges. (6) Conclude on ultimate liability.'},
      {t:'exam', n:'Battery exam tips: (1) Intent = intent to make the contact (majority/single intent rule) — no need to intend harm. (2) Contact includes objects closely connected to plaintiff\'s body. (3) Two paths to offensive contact: (a) objective reasonable person standard (Snyder v. Turk); (b) known special sensitivity exception (Cohen v. Smith). (4) Always check volitional act first — reflex/unconscious = no battery.'}
    ,
      {t:'rule', n:'Battery occurs when the defendant\'s act intentionally causes harmful or offensive contact with the victim\'s person. In tort law (unlike criminal law) battery is exclusively intentional; accidental contact must be analyzed under negligence or strict liability.'},
      {t:'rule', n:'Battery requires intent to cause harmful or offensive contact. Under the Restatement (Third) and the majority of courts, the defendant need only intend to cause contact that society defines as harmful or offensive—she need not intend to harm or offend (single intent).'},
      {t:'concept', n:'Offensive contact need not touch the body itself; touching clothing or an object connected to the person suffices. The victim also need not be conscious of the contact at the time—e.g., kissing a sleeping person without consent can be battery—so the tort protects personal autonomy, not just physical safety.'},
      {t:'case', n:'Fisher v. Carrousel Motor Hotel, Inc., 424 S.W.2d 627 (Tex. 1967): aggressively snatching a plate from the plaintiff\'s hand was an offensive contact with his person, holding that grabbing an object from one\'s hand is as offensive an invasion as touching the body itself.'},
      {t:'case', n:'Cole v. Turner, 90 Eng. Rep. 958 (1704): \'the least touching of another in anger is battery,\' establishing that even trivial physical contact, if offensive, is actionable.'},
      {t:'case', n:'Garratt v. Dailey, 279 P.2d 1091 (Wash. 1955): a five-year-old who pulled a chair away could be liable for battery if he knew with substantial certainty the plaintiff would fall and hit the ground. The case was remanded to determine that mental state, illustrating substantial-certainty intent.'},
      {t:'case', n:'Vosburg v. Putney, 50 N.W. 403 (Wis. 1891): a schoolboy who lightly but unlawfully kicked a classmate during class was liable for the unexpected serious leg injury that resulted. The touching was actionable because it occurred in class, not in the context of athletic play where contact is impliedly permitted.'},
      {t:'rule', n:'Eggshell-skull (thin-skull) rule: once a defendant commits even a technical battery, she bears the risk of all resulting harm and is liable for far greater injury than she intended or could foresee. The unforeseeable extent of harm from the contact falls on the wrongdoer.'},
      {t:'case', n:'Mohr v. Williams, 104 N.W. 12 (Minn. 1905): a physician who operated on the patient\'s left ear when consent was given only for the right ear committed battery, and is liable for all consequential harm regardless of good intentions or competent performance.'},
      {t:'concept', n:'Battery extends to unforeseen victims through transferred intent. If A throws ink intending to deface B\'s book (trespass to chattel) but misses and strikes B or bystander C in the eye, A is liable for the unintended battery.'},
      {t:'concept', n:'The Restatement (Third) defines contact as offensive when it offends \'a reasonable sense of personal dignity.\' If the defendant is unaware of a victim\'s special sensitivity, contact an ordinary person would not find offensive is not battery; if the defendant has advance knowledge of the sensitivity, the Restatement (Third) imposes liability only when causing highly offensive contact was the defendant\'s \'principal\' purpose.'}
    ]},
    { w:3, topic:'Transferred intent, false imprisonment, trespass to land, trespass to chattels & conversion', tags:['transferred intent','assault','false imprisonment','trespass to land','trespass to chattels','conversion','Cullison v. Medley','McCann v. Wal-Mart','Mitchell','Bradley v. ASARCO','Kuprewicz','waterfall method'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine §§1.03, 1.04, 1.06, 18.02 (Assault, False Imprisonment & Torts to Property).'},
      {t:'exam', n:'📋 Syllabus — Module 3 (Assault, False Imprisonment, Torts to Property): Reading: D&L §§1.03, 1.04, 1.06, 18.02. Required cases: Cullison v. Medley (570 N.E.2d 27, Ind. 1991); McCann v. Wal-Mart Stores (210 F.3d 51, 1st Cir. 2000); Wal-Mart Stores v. Mitchell (877 S.W.2d 616, Ky. Ct. App. 1994); Bradley v. American Smelting Co. (709 P.2d 782, Wash. 1985). Optional (recommended): School of Visual Arts v. Kuprewicz (771 N.Y.S.2d 804, Sup. Ct. 2003). Graded: Resource Quiz (10 pts); Seminar (2 pts).'},
      {t:'rule', n:'Assault (waterfall): volitional act by defendant which intentionally causes plaintiff to suffer apprehension of immediate harmful/offensive contact. "An assault is a touching of the mind, not the body." (Cullison v. Medley)'},
      {t:'rule', n:'Transferred intent — two types: (1) Person-to-person: intent against A, harm to B — intent transfers to actual victim (Talmage v. Smith). (2) Tort-to-tort: intent to commit one trespassory tort, different one results — intent transfers. Majority: all five trespassory torts. Exam rule: apply majority unless told otherwise.'},
      {t:'rule', n:'False imprisonment (Restatement Second § 35): (1) Intent to confine within fixed boundaries. (2) Actual confinement results. (3) Means: physical force, barriers, threats, failure to release, false assertion of legal authority — physical force NOT required. (4) Plaintiff aware of confinement OR harmed. Known reasonable escape route = no confinement.'},
      {t:'case', n:'McCann v. Wal-Mart, 210 F.3d 51 (1st Cir. 2000): Employees blocked McCanns\' path, threatened police, detained ~1 hour based on mistaken shoplifting belief. Held: Threats + false claim of legal authority = confinement. Physical restraint NOT required.'},
      {t:'case', n:'Cullison v. Medley, 570 N.E.2d 27 (Ind. 1991): Five Medley family members confronted Cullison; father wore holstered revolver and repeatedly grabbed at it; threats and berating. Held: Assault — no need to draw weapon. A reasonable person would have apprehended imminent contact.'},
      {t:'rule', n:'Trespass to land: intentional entry onto land in possession of another. No damage required — tort complete on entry. Mistake NOT a defense. Plaintiff need only have lawful possession, not ownership. For intangible entry (Bradley v. ASARCO): actual and substantial damages required.'},
      {t:'rule', n:'Trespass to chattels vs. conversion — sliding scale: Same kind of tort, different severity. Trespass to chattels: lesser interference, actual harm required, remedy = diminution in value/rental. Conversion: substantial interference, mistake NOT a defense, remedy = full market value (forced sale).'},
      {t:'case', n:'School of Visual Arts v. Kuprewicz, 771 N.Y.S.2d 804 (N.Y. 2003): Flood of emails depleted computer resources. Held: Trespass to chattels extends to digital/computer systems — must show material harm to physical condition, quality, or value of the system.'},
      {t:'exam', n:'Professor Brown\'s method: Walk every element. Define each element. Apply facts to each element. Then check defenses. Order never changes. For transferred intent: (1) Identify intended tort. (2) Identify actual tort. (3) Identify who was harmed. (4) Apply majority rule.'}
    ,
      {t:'rule', n:'Assault occurs when the defendant\'s act intentionally causes the victim\'s reasonable apprehension of imminent harmful or offensive contact. The tort definition differs from criminal assault (an attempted battery): an actual attempt is not tortious assault unless the victim apprehended imminent contact, and apprehension can exist without any attempt at contact.'},
      {t:'case', n:'Cucinotti v. Ortmann (Pa.): words alone are generally insufficient for assault. A mere verbal threat to strike the plaintiff with blackjacks, with no overt act, did not establish the imminence required. The Restatement, however, argues some verbal statements can supply sufficient imminence.'},
      {t:'rule', n:'Apprehension requires the victim to perceive imminent contact in advance. An attack from behind or on a sleeping victim is no assault for lack of apprehension. The defendant must also have the apparent (if not actual) ability to cause imminent contact—as in Western Union Telegraph Co. v. Hill.'},
      {t:'rule', n:'A conditional threat can still be assault. If A brandishes a club but offers not to strike if B hands over his wallet, A has assaulted B even though B could avoid contact by complying with the unlawful demand. But if A assures B no contact will occur regardless of B\'s actions (e.g., \'but for that police officer I\'d hit you\'), there is no assault.'},
      {t:'concept', n:'Apprehension is not the same as fear. The victim need only be aware that imminent contact will occur absent evasive action; a confident or stronger victim who could avoid the blow still suffers an assault. Apprehension of merely offensive (non-harmful) imminent contact also qualifies.'},
      {t:'rule', n:'False imprisonment is the intentional, unlawful confinement or restraint of the victim within a bounded area. The area must be bounded in all directions with no reasonable means of escape; an escape is unreasonable if it requires heroism, excessive embarrassment or discomfort, or if the victim is unaware of it.'},
      {t:'rule', n:'Confinement can be accomplished by (1) physical barriers; (2) force or threat of immediate force against the victim, her family, companions, or property; (3) omission where the defendant has a legal duty to act; or (4) improper assertion of legal authority (false arrest). Threats of future force or economic/job retaliation do not suffice.'},
      {t:'rule', n:'Consciousness rule: false imprisonment generally requires the victim be aware of the confinement at the time. The Restatement (Second) modifies this to allow liability where the unaware victim is actually harmed by the confinement (e.g., an infant locked in a car trunk and injured). There is no minimum time of detention.'},
      {t:'rule', n:'Trespass to chattel is the intentional interference with another\'s right to possess personal property, but—unlike trespass to land—requires actual damage to the chattel, substantial deprivation of use, or dispossession. Trivial intermeddling without harm is not actionable.'},
      {t:'case', n:'Ranson v. Kitner, 31 Ill. App. 241 (1889): a defendant who killed the plaintiff\'s dog believing it a wolf was liable; good faith and reasonable mistake of identity are no defense. So long as he intended to act on that particular animal, intent is satisfied, illustrating the mistake doctrine\'s near strict-liability effect for chattel torts.'},
      {t:'rule', n:'Conversion is an intentional exercise of dominion and control over a chattel so serious that the actor may justly be required to pay its full market value (a forced sale). It requires more serious interference than trespass to chattel; the Restatement weighs six factors including extent/duration of control, the actor\'s good faith, and harm done. Even a good-faith purchaser of stolen goods converts.'},
      {t:'rule', n:'Trespass to land is an intentional invasion of another\'s interest in exclusive possession—entering the land, causing a thing or person to enter, remaining, or failing to remove a thing one has a duty to remove (Restatement (Second) §158). No actual harm to the land need be shown, and the plaintiff need only intend the act causing entry, not desire to trespass; mistake is no defense.'}
    ,
      {t:'exam', n:'🔒 FALSE IMPRISONMENT SPOTTING DRILL (built after the Module 7 essay miss). ATTACK STATEMENT: the defendant is liable for false imprisonment if he INTENTIONALLY confined the plaintiff to a bounded area with NO REASONABLE MEANS OF ESCAPE, where the plaintiff was AWARE of the confinement or harmed by it. 5 elements: (1) INTENT to confine; (2) CONFINEMENT by physical barriers, force, threats, OMISSION (failure to release), or asserted legal authority; (3) BOUNDED area (confined in all directions); (4) NO REASONABLE ESCAPE (an unsafe, hidden, humiliating, or unreasonable exit doesn\'t count); (5) AWARENESS or HARM. Memory line: "no reasonable way out is the core issue."'},
      {t:'exam', n:'🔒 FI SPOTTING TRIGGERS — the instant you see any of these, run FI as its OWN claim (don\'t bury it in assault): locked room, blocked exit, a broken/held lock, "you can\'t leave until…," a security/back office, held keys or bags, REFUSING TO UNLOCK/RELEASE, a guarded doorway, false arrest / asserted authority, or refusing to stop a car/boat. ⭐ The Module 7 essay trap: Paul was trapped over an hour behind a lock David broke — a screaming FI fact (confinement + no reasonable escape + awareness) that had to be its OWN claim.'},
      {t:'exam', n:'🔒 FI — the 4 traps (Braden): (1) BRIEF confinement is enough (even a few minutes); (2) MORAL PRESSURE alone is NOT confinement ("I\'ll be disappointed if you leave" → consider IIED, not FI); (3) a DANGEROUS/humiliating escape is NOT a reasonable escape (a 3rd-floor ledge doesn\'t defeat FI); (4) SHOPKEEPER\'S PRIVILEGE — a merchant may briefly detain on reasonable suspicion of theft (that\'s a DEFENSE, analyzed after the claim, not a missing element). Also: if the plaintiff was UNAWARE and UNHARMED (e.g., slept through a locked room), the 5th element fails (majority).'},
      {t:'exam', n:'🔒 FI drill — representative calls (full 12-item drill w/ answer key saved as PDF in OneDrive/Bar Prep Guides): guard locks Amy in a stockroom 10 min → FI (brief is enough); "stay or I\'ll reveal your secret" → NO (moral pressure); obvious safe unlocked side door 5 ft away → NO (reasonable escape); nurse refuses to unlock the ward for a competent patient who asks to leave → FI (confinement by omission); withholding keys in a remote lot at 2 a.m. while saying "you can go" → FI (constructive confinement/no reasonable escape); merchant detains on reasonable theft suspicion → FI made out BUT shopkeeper\'s privilege defense; fake "officer" says "you\'re under arrest" and she submits → FI by asserted authority (false arrest). FI vs. look-alikes: FI = confined person; ASSAULT = threatened imminent contact (no confinement needed); IIED = extreme emotional harm without confinement. HABIT: any locking/blocking/holding/refusing-to-release/"you can\'t leave" → run the full 5-element FI IRAC as its own claim, then check consent / shopkeeper\'s privilege as defenses.'}
    ]},
    { w:4, topic:'Intentional infliction of emotional distress (IIED)', tags:['IIED','outrageous conduct','severe distress','parasitic damages','third-party recovery','First Amendment','GTE Southwest','Hustler v. Falwell','Snyder v. Phelps','Siliznoff'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine §1.05 (Intentional Infliction of Emotional Distress).'},
      {t:'exam', n:'📋 Syllabus — Module 4 (Intentional Infliction of Emotional Distress): Reading: D&L §1.05. Required cases: Travelers Ins. Co. v. Smith (991 S.W.2d 591, Ark. 1999); GTE Southwest, Inc. v. Bruce (998 S.W.2d 605, Tex. 1999). Graded: Resource Quiz (5 pts); Module Quiz (20 pts, 30 min timed); Seminar (2 pts).'},
      {t:'concept', n:'IIED is a gap-filler: if another personal injury tort applies, emotional distress damages are parasitic to that tort. IIED only needed when no other tort covers the claim. Hypo: "I\'m going to beat you!" + immediate apprehension = assault; emotional distress is parasitic to the assault, not IIED.'},
      {t:'rule', n:'IIED elements (Restatement Third § 46): (1) Defendant acted intentionally or recklessly. (2) Defendant\'s conduct was extreme and outrageous. (3) Defendant\'s act caused the distress. (4) Plaintiff suffered severe emotional distress. ALL FOUR elements must be analyzed on the exam.'},
      {t:'rule', n:'Element 2 — Extreme and outrageous: Beyond all bounds of human decency, intolerable in a civilized community. Factors elevating conduct: (1) vulnerability of victim (child, elderly, ill). (2) Superior-subordinate relationship. (3) Known hypersensitivity of victim. (4) Pattern of continuous conduct rather than isolated act.'},
      {t:'rule', n:'Element 4 — Severe distress: Mild distress is not enough. Modern trend: physical manifestations no longer required — outrageousness of conduct is the better guarantee of authenticity.'},
      {t:'case', n:'GTE Southwest, Inc. v. Bruce, 998 S.W.2d 605 (Tex. 1999): Supervisor engaged in threats, vulgarity, yelling, screaming regularly over years despite employees\' objections. Held: "It is the severity and regularity of Shields\'s abusive and threatening conduct that brings his behavior into the realm of extreme and outrageous conduct."'},
      {t:'case', n:'Hustler Magazine v. Falwell: Parody ad depicting Falwell could not support IIED — public figures cannot recover for IIED based on speech without proving actual malice (knowledge or reckless disregard of truth/falsity). Public figures cannot use IIED to evade First Amendment protections.'},
      {t:'case', n:'Snyder v. Phelps: Westboro Baptist Church picketing near soldier\'s funeral barred by First Amendment — speech addressed matters of public concern (political/social). IIED claims on speech addressing public concerns are constitutionally barred.'},
      {t:'concept', n:'Third-party bystander recovery — three approaches: Common law: close relative + present + defendant knew bystander was present. Second Restatement: immediate family present (+ non-relatives with physical manifestation). Third Restatement: close family who contemporaneously perceive; does NOT require defendant to know bystander was present.'},
      {t:'concept', n:'IIED does NOT use transferred intent. But if defendant knows a close family member is present, he may be substantially certain that person will suffer distress — satisfying intent directly.'},
      {t:'exam', n:'IIED checklist: (1) Is IIED even needed (parasitic damages)? (2) Define "IIED" on first use. (3) Analyze ALL FOUR elements. (4) Outrageousness factors: vulnerability, relationship, pattern, known sensitivity. (5) Constitutional limits: public figure? matter of public concern? (6) Third-party claim — which Restatement standard applies?'}
    ,
      {t:'rule', n:'Intentional infliction of emotional distress exists when the defendant, by extreme and outrageous conduct, intentionally or recklessly causes the victim severe mental distress. Most states no longer require physical manifestation of the distress.'},
      {t:'rule', n:'Extreme and outrageous conduct is behavior \'beyond the bounds of human decency such that it would be regarded as intolerable in a civilized community.\' Mere rudeness, insults, or callous offensiveness do not suffice.'},
      {t:'concept', n:'Whether conduct is outrageous turns partly on context: the victim\'s vulnerability (a young child or very ill patient), a superior-subordinate relationship (employer/employee, principal/student), and the defendant\'s knowledge of the victim\'s particular hypersensitivity can each make otherwise-tolerable conduct outrageous.'},
      {t:'rule', n:'The mental-state element is satisfied by either intent OR recklessness. Although labeled an \'intentional\' tort, recklessness—a deliberate disregard of a high degree of probability that severe distress will result—suffices for liability, in contrast to most intentional torts where recklessness is insufficient.'},
      {t:'rule', n:'The plaintiff must actually suffer severe mental distress; mild distress will not do. Physical manifestation was originally required but most jurisdictions have abandoned that requirement, reasoning that the outrageousness of the conduct itself authenticates the distress.'},
      {t:'case', n:'State Rubbish Collectors Ass\'n v. Siliznoff (Cal. 1952): the California Supreme Court endorsed the 1947 Restatement amendment recognizing IIED without physical manifestation, allowing a garbage collector to recover for threats to his person, property, and business where assault failed because the threatened harm was not imminent.'},
      {t:'case', n:'Hustler Magazine v. Falwell, 485 U.S. 46 (1988): the First Amendment bars a public figure from recovering for IIED based on a parody not reasonably understood as fact, absent proof of New York Times \'actual malice\' (knowledge of or reckless disregard for falsity). Public figures cannot use IIED to evade defamation\'s constitutional protections.'},
      {t:'case', n:'Snyder v. Phelps, 562 U.S. 443 (2011): the First Amendment bars an IIED claim based on speech on \'matters of public concern,\' so a soldier\'s father could not recover for the Westboro Baptist Church\'s picketing near his son\'s funeral with messages on public issues.'},
      {t:'rule', n:'Bystander/third-party recovery: IIED is not one of the transferred-intent torts, but courts commonly allow a third party to recover only if (1) she is a close relative of the primary victim, (2) she is present at the scene, and (3) the defendant knows she is present. The Restatement (Third) requires a close family member who contemporaneously perceives the event.'},
      {t:'concept', n:'Because intent includes substantial certainty, a defendant who beats up B knowing B\'s child C is present may be substantially certain—and thus intend—that C suffers severe distress, even without any specific desire to distress C. Recklessness toward a third party\'s distress can likewise suffice.'},
      {t:'rule', n:'Special exception: innkeepers, common carriers, and other public utilities are traditionally liable for intentional gross insults causing a patron mental distress, without proof of extreme and outrageous conduct or severe distress. The Restatement (Third) abandons this exception and would require ordinary IIED proof for all defendants.'},
      {t:'exam', n:'Exam tip: when an assault claim fails because a threat of harm is not imminent (a future threat), consider IIED, which—unlike assault—can reach non-imminent threats if the conduct is extreme and outrageous and causes severe distress, as in Siliznoff.'}
    ]},
    { w:5, topic:'Negligence, reasonable person & economic torts', tags:['negligence','duty','breach','BPL','economic torts','fraudulent misrepresentation','interference with contract','good faith and fair dealing','Jacobson v. Hofgard'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 19 (Economic Torts).'},
      {t:'exam', n:'📋 Syllabus — Module 5 (Economic Torts): Reading: D&L Chapter 19. Required cases: Jacobson v. Hofgard (2016 WL 837923, D.D.C. 2016); Alyeska Pipeline Service v. Aurora Air Service (604 P.2d 1090, Alaska 1979); Johnston v. Palmer (963 So.2d 586, Miss. Ct. App. 2007). Graded: Resource Quiz (10 pts); Seminar (2 pts).'},
      {t:'rule', n:'Negligence elements: (1) duty, (2) breach, (3) actual causation, (4) proximate causation, (5) damages.'},
      {t:'concept', n:'Duty: owed to all foreseeable plaintiffs (Cardozo/majority). Reasonable person standard: objective; adjusted for physical disabilities but NOT mental or inexperience.'},
      {t:'concept', n:'BPL formula (Hand formula): Breach when B < P x L — burden of precaution, probability of harm, magnitude of loss.'},
      {t:'case', n:'Cohen v. Petty (negligence): No prior history of illness — could not foresee the blackout, so no breach of duty of reasonable care.'},
      {t:'exam', n:'Duty: foreseeable victim? Breach: reasonable person standard and/or BPL formula. Special duty rules: landowners, professionals, undertakers.'},
      {t:'concept', n:'Economic torts overview (Module 5): Three intentional economic torts: (1) Fraudulent Misrepresentation, (2) Intentional Interference with Contract or Prospective Economic Relations, and (3) Tortious Breach of the Covenant of Good Faith and Fair Dealing.'},
      {t:'rule', n:'Fraudulent Misrepresentation elements: (1) Material misrepresentation of a past or present fact. (2) Scienter — knew it was false OR acted in reckless disregard of truth or falsity. (3) Reliance — defendant intended to induce reliance, misrepresentation caused the reliance, and reliance was justifiable and a substantial factor in plaintiff action. (4) Damages.'},
      {t:'concept', n:'Material misrepresentation — three rules from Jacobson v. Hofgard: (1) Technically true statement can still be a misrepresentation if it creates a false impression. (2) Omission combined with other disclosures can constitute a misrepresentation. (3) Puffery is NOT a material misrepresentation. Puffery = exaggerated or subjective statement that cannot be objectively verified (e.g., "best apple pie in the world," "stunning renovation").'},
      {t:'concept', n:'Opinions — generally NOT material misrepresentations. Two exceptions: (1) Expert to non-expert (mechanic opining on a transmission) — cannot hide behind "it was my opinion." (2) False claim of objectivity — pretending to be a neutral adviser while having a conflicting interest (e.g., posing as a neutral banker to steer plaintiff away from a purchase you intend to make yourself).'},
      {t:'concept', n:'Scienter: Defendant knew the statement was false, OR acted in reckless disregard of its truth or falsity. Reckless disregard = not sure if the statement is true or false but making it as if it were true (e.g., seller unsure if transmission was fixed but tells buyer it has no problems).'},
      {t:'concept', n:'Reliance — three components: (1) Intent to induce: defendant intended plaintiff to rely on the misrepresentation. (2) Causation: misrepresentation actually caused reliance and was a substantial factor in plaintiff decision. (3) Justifiable reliance: if the falsity could be easily recognized by plaintiff (e.g., odometer visibly contradicts mileage claim), reliance is not justifiable. Online/sight-unseen purchase = reliance more likely justifiable.'},
      {t:'concept', n:'Fraudulent misrepresentation damages: (1) Benefit of the bargain (majority): difference between value as represented minus actual value (car worth $12K as represented, worth $5K as is, damages = $7K). (2) Out-of-pocket (minority): amount spent minus value actually received (paid $10K, got $5K car, damages = $5K). (3) Consequential damages and punitive damages also available.'},
      {t:'case', n:'Jacobson v. Hofgard: Sellers advertised townhouse as "newly renovated" (technically true but failure to disclose defects = material misrepresentation by false impression and omission) and as having an "English basement" (technically true but basement was illegal due to unpermitted kitchen = material misrepresentation by omission). "Stunning renovation" = puffery; not a misrepresentation. Key rules: technically true + false impression = misrepresentation; omission = misrepresentation; puffery = not a misrepresentation.'},
      {t:'rule', n:'Intentional Interference with Contract elements: (1) A valid, existing contract between plaintiff and a third party. (2) Defendant knew of the contract. (3) Defendant intentionally interfered (or interference was substantially certain to result). (4) Actual interference occurred as a result. (5) Damages (economic loss, compensatory for mental distress, punitive).'},
      {t:'rule', n:'Intentional Interference with Prospective Economic Relations: Same elements but instead of an actual contract, plaintiff must show a concrete, reasonable economic expectancy — not speculative or too uncertain. A vague future possibility is not enough. Example: estimate given, half-deposit arrangement agreed to verbally = prospective economic relations. General conversation with nothing definite = not enough.'},
      {t:'concept', n:'Justification defense to interference torts: Even if all elements are met, interference may be justified and defendant not liable. Justified interference includes: (1) Providing truthful information. (2) Protecting a person welfare. (3) The contract is illegal. (4) Protecting your own interest in good faith by appropriate means. At-will relationships: third party who lawfully induces an at-will party to end the relationship is generally NOT liable — unless improper or unfair means used (e.g., lying about a competitor to steal a customer).'},
      {t:'rule', n:'Tortious Breach of the Covenant of Good Faith and Fair Dealing: Every contract has an implied covenant of good faith and fair dealing. A PARTY TO THE CONTRACT (not a third party) who acts in bad faith to prevent the other party from receiving the benefit of the bargain can be liable in tort. Bad faith = violation of standards of decency, fairness, or reasonableness. Common context: insurance companies denying claims in bad faith. Example: homeowner locks contractor out of yard specifically to prevent deck completion so second payment never comes due = tortious breach.'},
      {t:'concept', n:'Critical distinction — interference torts vs. covenant of good faith: Intentional interference = THIRD PARTY (outsider) interfering with someone else contractual relationship. Covenant of good faith = one of the PARTIES TO THE CONTRACT acting in bad faith against the other party. Same contract; very different defendant.'},
      {t:'exam', n:'Economic torts exam checklist: (1) Fraudulent misrepresentation: material fact (puffery? technically true but false impression? opinion exception?)? scienter (knew or reckless disregard?)? reliance (intent to induce, causation, justifiable?)? damages (benefit of bargain majority vs. out-of-pocket minority?). (2) Interference with contract: valid contract? defendant knew? intentional interference? actual interference? justified? (3) Interference with prospective economic relations: concrete expectancy, not speculative? then same analysis as interference with contract. (4) Covenant of good faith: is defendant a PARTY (not outsider) to the contract? bad faith conduct depriving other party of benefit of the bargain?'},
      {t:'concept', n:'Causation as the gatekeeper — intentional torts vs. negligence: In both intentional torts and negligence, causation requires showing the defendant’s conduct was a substantial factor in causing this plaintiff’s harm. That same “substantial factor” language appears in the pattern jury instructions for assault, battery, IIED, and negligence alike, and you never reach damages unless you connect the defendant’s act (or failure to act) to the plaintiff’s injury — that is the gatekeeper. The distinction: in intentional torts ask whether the act caused the harm; in negligence ask whether the carelessness caused the harm, remembering negligence covers both acts and failures to act.'}
    ,
      {t:'rule', n:'Fraudulent misrepresentation (deceit) has five elements: (1) a material misrepresentation by the defendant; (2) scienter (the defendant knew the statement was false or made it with reckless disregard as to its truth or falsity); (3) intent to induce reliance; (4) the misrepresentation caused the plaintiff\'s justifiable reliance; and (5) pecuniary damages resulted to the plaintiff.'},
      {t:'concept', n:'Fraudulent misrepresentation is an intentional tort that provides recovery for pure economic loss unassociated with other injury; its essence is an intentional or reckless misrepresentation that induces a victim\'s reliance and causes economic damages. Punitive damages may be recovered where malice is proven.'},
      {t:'rule', n:'The misrepresentation must generally be of a past or present material fact. An assertion is material if a reasonable person would attach importance to it in deciding how to act, or if the maker knows or should know the recipient is likely to regard it as important.'},
      {t:'concept', n:'Statements of opinion are usually not actionable, but exceptions exist: opinions by experts to nonexperts, by fiduciaries, by defendants who mislead the victim about their objectivity, or opinions that imply underlying facts. A misrepresentation of a present intention counts as a present fact, so a fraudulent promise made with no intent to keep it is actionable, though a good-faith broken promise is not.'},
      {t:'concept', n:'Traditionally a mere failure to disclose was not actionable, but exceptions have expanded: fiduciaries must disclose material facts, an actor who initially misleads (even innocently) must correct the misimpression, and sellers increasingly must disclose fundamental defects a buyer would not likely discover.'},
      {t:'rule', n:'Scienter requires that the defendant knew the misrepresentation was false or acted with reckless disregard as to its truth or falsity; recklessness means making the representation while consciously aware of one\'s lack of knowledge about its truth. In either case the defendant is subjectively lying, which distinguishes fraud from negligent misrepresentation.'},
      {t:'rule', n:'Justifiable reliance looks both to the nature of the misrepresentation (reliance on an immaterial fact or mere opinion is generally not justified) and to the qualities of the particular plaintiff; a knowledgeable victim who relies on an obvious falsity is not justified. Because fraud is an intentional tort, contributory negligence is no defense -- even a fool is protected from intentional fraud.'},
      {t:'rule', n:'A substantial majority of courts measure fraud damages by the \'benefit of the bargain\' (value as represented minus actual value), resembling contract recovery, while a minority award only \'out of pocket\' losses (price paid minus actual value). Because misrepresentation is primarily a pecuniary tort, damages for mental distress are ordinarily not awarded.'},
      {t:'rule', n:'The economic loss rule: the overwhelming majority of jurisdictions refuse to find a duty for negligently inflicted PURE economic loss (no physical injury or property damage). Economic loss that is parasitic to a plaintiff\'s own personal injury or property damage, however, is readily recoverable.'},
      {t:'concept', n:'The most persuasive justification for the no-duty economic loss rule is concern about crushing, indeterminate liability out of proportion to fault; other rationales include weak deterrence value, preference for plaintiff self-insurance, and the value of bright-line rules. Critics note the apparent capriciousness of allowing full recovery for minor accompanying property damage while denying identical economic loss to a neighbor who suffered none.'},
      {t:'case', n:'Negligent misrepresentation by information suppliers (e.g., accountants) is an exception to the economic loss rule, and courts use three approaches to third-party (non-privity) duty: near-privity (Ultramares Corp. v. Touche, Cardozo, limiting duty to those virtually in privity), the Restatement (Second) §552 middle ground (a known and intended limited class), and the broadest foreseeability approach. Unlike fraud, negligent misrepresentation allows contributory/comparative negligence as a defense.'},
      {t:'rule', n:'Intentional interference with contract and with prospective economic relations share parallel elements: (1) a valid contract or legitimate economic expectancy between plaintiff and a third party; (2) the defendant\'s knowledge of it; (3) intent to interfere; (4) interference caused by the defendant; and (5) damages. Both torts apply only to an intermeddler disrupting a relationship between OTHER parties, not to a party breaching its own contract.'},
      {t:'case', n:'Lumley v. Gye established interference with contract: a competing theater that induced an opera singer to breach her contract was liable for tortious interference, separate from the singer\'s own contract liability. Texaco, Inc. v. Pennzoil shows the tort\'s modern force, with a multi-billion-dollar judgment for interfering with Pennzoil\'s contract to acquire Getty Oil shares; knowledge is satisfied if the defendant knew facts from which it should have concluded a valid contract existed.'},
      {t:'concept', n:'Interference with prospective economic relations recognizes more justifications than interference with an existing contract, most notably fair competition, and these broader justifications also apply to at-will contracts (which resemble economic expectancies). A valid expectancy is required; a mere hope of customers or profit is insufficient.'},
      {t:'exam', n:'Recognized privileges defeating interference liability include truthful information or honest advice within the scope of a request, action by one responsible for another\'s welfare, interference with an illegal or public-policy-violating contract, and good-faith protection of one\'s own legally protected interests by appropriate means; fair competition additionally privileges interference with prospective relations and at-will contracts. Restatement §767 lists seven factors for whether interference is \'improper.\''}
    ]},
    { w:6, topic:'Intentional tort defenses — privileges, self-defense, consent, necessity & property', tags:['privileges','self-defense','defense of others','consent','necessity','public vs. private necessity','defense of property','shopkeeper\'s privilege','reasonable mistake','Touchet v. Hampton','Vincent v. Lake Erie','Surocco v. Geary','Gortarez v. Smitty’s'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 2 (Defenses to Intentional Torts).'},
      {t:'exam', n:'📋 Syllabus — Module 6 (Defenses to Intentional Torts): Reading: D&L Chapter 2. Required cases: Touchet v. Hampton (950 So.2d 895, La. App. 2007); Gortarez v. Smitty\'s Super Valu (680 P.2d 807, Ariz. 1984); Surocco v. Geary (3 Cal. 69, 1853); Vincent v. Lake Erie Transportation Co. (124 N.W. 221, Minn. 1910). Optional (recommended): Katko v. Briney (183 N.W.2d 657, Iowa 1971); Brown v. Martinez (361 P.2d 152, N.M. 1961). Graded: Resource Quiz (10 pts); Module Quiz (20 pts, 30 min timed); Seminar (2 pts).'},
      {t:'concept', n:'A defense concedes that every element of the intentional tort is met but argues the defendant still should not be liable; the defendant bears the burden of proving it. A privilege is a legal right to act in a way that would otherwise be tortious (e.g., reasonable force in self-defense) — the conduct is treated as justified.'},
      {t:'rule', n:'Defense of self & others (Restatement (Second) §§ 63–65, 76): (1) Reasonable force is privileged to defend self or others from anticipated immediate harmful contact; (2) the initial aggressor has no privilege of self-defense; (3) a reasonable mistake as to the need for, or degree of, force does not destroy the privilege; (4) deadly force is justified only against a threat of deadly force, and retreat may be required absent a stand-your-ground rule.'},
      {t:'rule', n:'Defense of others — the mistake split: Defense of others tracks self-defense, but jurisdictions divide on a reasonable mistake. Common law “step-in-shoes” / alter-ego rule: the defender takes the legal position of the person aided, so if that person actually had no privilege, neither does the defender (no mistake allowed). Modern majority: a reasonable mistake about the need to defend is allowed.'},
      {t:'concept', n:'Consent: the plaintiff agrees to the defendant’s otherwise-tortious conduct. Three kinds (Restatement (Second) §§ 892–892C): (1) Actual — the plaintiff is in fact willing for the conduct to occur; (2) Apparent — the plaintiff’s objective manifestations reasonably lead the defendant to believe there is consent; (3) Implied — the law finds consent where none was expressed, as with emergency medical care.'},
      {t:'rule', n:'Limits on consent: Consent is invalid where there is incapacity, fraud, duress, or illegality, and conduct beyond the scope consented to is not protected. Consent runs to the particular actor and conduct (or substantially the same conduct), and the claimant must have capacity.'},
      {t:'rule', n:'Necessity: a privilege to harm property to avoid a greater harm. Public necessity (risk to many or the public at large) is a complete defense — no compensation owed, and a reasonable mistake does not destroy it. Private necessity (risk to one or a few persons or their property) excuses the trespass but is incomplete — the actor must pay for the actual damage caused. Many courts limit necessity to property torts, not personal injury.'},
      {t:'rule', n:'Property privileges (Restatement (Second)): (1) Defense of property — reasonable, non-deadly force to protect real or personal property, usually only after a request to desist (§§ 77–79); (2) no deadly force to protect property alone — only when the intrusion also threatens personal safety; (3) recapture of chattels — reasonable force in fresh pursuit to retake a chattel taken by fraud or force, but any mistake destroys the privilege (§§ 101–111); (4) shopkeeper’s privilege — a merchant may detain a person reasonably suspected of theft, in or near the store, for a reasonable investigation (§ 120A).'},
      {t:'rule', n:'Shopkeeper’s privilege — three requirements: (1) reasonable cause to suspect theft; (2) a proper purpose (investigation); and (3) a detention carried out in a reasonable manner, for a reasonable time, on or near store grounds. Reasonable cause by itself is only the threshold.'},
      {t:'case', n:'Touchet v. Hampton, 1 So.3d 729 (La. App. 3 Cir. 2008) — consent & provocation: After Touchet left threatening voicemails, Hampton went to Touchet’s workplace days later and beat him. Held a battery — the earlier threats were not consent, and turning, cursing, and starting to stand were not sufficient provocation. “Mere words will not justify a battery.”'},
      {t:'case', n:'Vincent v. Lake Erie Transp. Co., 124 N.W. 221 (Minn. 1910) — private necessity: During a violent storm the crew deliberately kept the steamship moored to the plaintiff’s dock, damaging it. The intrusion was privileged (prudent), but the shipowner must pay — “the plaintiffs are entitled to compensation for the injury done.”'},
      {t:'case', n:'Surocco v. Geary, 3 Cal. 69 (1853) — public necessity: Defendant blew up the plaintiff’s house with gunpowder to stop the 1849 San Francisco fire from spreading. No liability — private property rights yield to the higher law of impending necessity, and the destruction is not a taking for public use. “The private rights of the individual yield to the considerations of general convenience.”'},
      {t:'case', n:'Gortarez v. Smitty’s Super Valu, 680 P.2d 807 (Ariz. 1984) — shopkeeper’s privilege: A guard chased two suspects into the lot, searched one, and put the other in a choke hold over a 59-cent item. Reversed and remanded — reasonable cause is only the threshold; the detention must also be for a proper purpose and reasonable in manner and time. “The use of any force at all will not be privileged until the other has been requested to remain.”'},
      {t:'exam', n:'Self-defense turns on the defendant’s reasonable belief, not on what was actually true. Punching someone who appears to charge with a raised knife is privileged — and the privilege survives even if the object turns out to be a cell phone, because a reasonable mistake as to the need for force does not destroy it.'},
      {t:'exam', n:'Consent-scope hypos: voluntarily joining a contact sport implies consent to contact reasonably anticipated in the game, but not to contact exceeding that scope (too much or too severe). Consent also runs to the actor — a hospital mix-up where the wrong doctor operates is a battery, but a genuine emergency (the consented surgeon falls ill mid-procedure) supplies implied consent.'},
      {t:'exam', n:'Necessity vs. personal injury: many courts limit necessity to property torts. In the “school bus and the cliff” problem (swerving to kill two hikers to save 25 children) there is no settled answer — whether 25 lives make it a public necessity is exactly what a court would wrestle with; self-defense and defense of others are the usual personal-injury privileges.'},
      {t:'exam', n:'Defenses checklist: (1) a defense concedes the elements but defeats liability, and the defendant bears the burden; (2) self-defense / defense of others — reasonable belief + reasonable force, no privilege for aggressors; (3) consent — actual, apparent, or implied, and can be invalidated or exceeded; (4) necessity — public (complete, no pay) vs. private (incomplete, must pay); (5) property defenses — only reasonable, non-deadly force, and the shopkeeper’s privilege needs reasonable cause, proper purpose, and reasonable manner.'}
    ,
      {t:'rule', n:'Defenses to intentional torts are affirmative: the plaintiff must prove the tort\'s elements, but the defendant bears the burden of proving a defense (consent, self-defense, defense of others, defense/recovery of property, or necessity).'},
      {t:'rule', n:'Consent is a complete defense, and it is judged objectively: if A says \'yes,\' B may rely on that manifestation even if A secretly means \'no\' -- but B\'s actual knowledge that A does not really consent negates the defense. Consent may be express (words or gestures), implied from conduct or community custom, or implied by law (e.g., emergency treatment of an unconscious patient).'},
      {t:'case', n:'In O\'Brien v. Cunard S.S. Co., a steamship passenger who joined a line and held up her arm for an inoculation was held to have impliedly consented, because her conduct objectively manifested consent even though she did not subjectively intend it.'},
      {t:'rule', n:'Even validly given consent can be invalidated by: incapacity (infancy, mental impairment, or intoxication -- though incapacity not known or reasonably knowable to the defendant generally will not negate consent), action beyond the scope of consent, fraud as to an essential (not collateral) matter, duress by physical threat (economic pressure usually does not count), or illegality.'},
      {t:'case', n:'Scope-of-consent cases in medicine: in Mohr v. Williams the surgeon got consent to operate on the right ear, operated on the left while the patient was anesthetized, and was held liable for battery; but in Kennedy v. Parrott, puncturing cysts found on the ovaries during an appendectomy was reasonable and within consent, avoiding a second operation.'},
      {t:'rule', n:'Consent to a criminal act: the traditional majority rule holds a person cannot consent to a crime, so both participants in an illegal fight may sue (consent always invalid). The minority/Second Restatement view treats the consent as valid except where the criminal statute exists to protect the victim\'s class (e.g., a law barring juvenile prize-fighting).'},
      {t:'rule', n:'Self-defense permits reasonable force that one sincerely and reasonably believes is necessary to repel an immediate, unlawful threat of harm; it is both subjective (sincere belief) and objective (reasonable). The belief need not be correct -- a reasonable mistake is privileged even if an innocent person is injured -- but a sincere yet unreasonable use of force is not. Preemptive strikes against non-immediate threats and retaliation against a retreating aggressor are not privileged.'},
      {t:'rule', n:'Deadly force (force intended to cause death or serious bodily injury) in self-defense is justified only when the actor reasonably believes she faces death or serious bodily injury; one may not inflict serious injury to avoid a non-serious harm. Note a mere threat to use deadly force (e.g., threatening to shoot) may be reasonable even where actually firing would not be.'},
      {t:'rule', n:'Retreat: there is no duty to retreat from non-deadly force. Where deadly force would be needed, the majority requires no retreat if the actor has a right to be present, while the minority/Restatement requires retreat if it can be safely made -- except from one\'s own dwelling (unless the assailant is a co-occupant).'},
      {t:'rule', n:'Defense of others allows reasonable force to protect a third person (including a stranger) from immediate unlawful harm. Under the limited/\'stands in the shoes\' rule, the intervener is liable if the person defended actually had no privilege (e.g., was resisting a lawful arrest); under the Restatement rule, a reasonable mistake about the third party\'s right to self-defense is privileged.'},
      {t:'rule', n:'Defense of property allows only reasonable force, and -- unlike self-defense -- a reasonable mistake that an intruder is unprivileged is NOT excused (the actor is liable to an innocent privileged party). Deadly force is never justified to protect mere property alone; it becomes available only when self-defense or defense of others is independently triggered. Even slight force is unreasonable if a verbal request would have sufficed.'},
      {t:'rule', n:'Spring guns and mechanical devices: a device intended to inflict death or serious bodily injury is privileged only if the owner would have been privileged to inflict that force in person, and a growing body of authority (including the Model Penal Code) holds such devices are never justifiable -- because they cannot judge necessity, give no warning, and endanger the innocent. Visible deterrents like barbed wire are treated differently and analyzed under negligence.'},
      {t:'rule', n:'Recapture of chattels: an owner may use reasonable force to retake property only in \'hot pursuit\' of the wrongdoer, and acts at her peril -- force misdirected at an innocent party creates liability even if the mistake was reasonable. Deadly force is never reasonable to recover property.'},
      {t:'rule', n:'The merchant\'s/shopkeeper\'s privilege lets a store use reasonable force to detain a suspected shoplifter for a reasonable time and within or near the store\'s premises to investigate. Unlike ordinary defense of property, it generally permits a reasonable mistake, so an innocent customer cannot recover if the store acted reasonably; deadly force is never permitted.'},
      {t:'concept', n:'Necessity privileges interfering with an innocent party\'s property to avoid a greater harm. Public necessity (appropriating/injuring property to protect the community) is a COMPLETE defense with no liability; private necessity (protecting a private interest worth more than the property invaded) is an INCOMPLETE defense -- the actor is privileged to act but must pay for the damage caused.'},
      {t:'case', n:'Ploof v. Putnam: a sudden storm forced the plaintiff to moor his boat at the defendant\'s dock; the defendant\'s servant cast it off, injuring the plaintiff\'s family and boat. Because private necessity gave the plaintiff a privilege to use the dock, the landowner was liable for the wrongful expulsion.'},
      {t:'case', n:'Vincent v. Lake Erie Transp. Co.: a shipowner who keeps his vessel lashed to another\'s dock during a storm is privileged to do so under private necessity, but must compensate the dock owner for the resulting damage -- the classic illustration that private necessity is an incomplete privilege.'},
      {t:'case', n:'Surocco v. Geary illustrates public necessity: the plaintiff\'s house was blown up to create a firebreak and save more of San Francisco from a spreading fire, and there was NO liability for destroying the private property to protect the public -- the key contrast with private necessity\'s compensation requirement.'}
    ]},
    { w:7, topic:'Negligence — duty, the reasonably prudent person & the emergency doctrine (Part 1)', tags:['negligence','prima facie case','duty','standard of care','reasonably prudent person','Cardozo','Andrews','emergency doctrine','physical conditions','intoxication','Posas v. Horton'], notes:[
      {t:'concept', n:'📖 Reading — Diamond & Levine Chapter 3 (Negligence – General Duty of Care).'},
      {t:'exam', n:'📋 Syllabus — Module 7 (Negligence – General Duty of Care): Reading: D&L Chapter 3. Required cases: Posas v. Horton (228 P.3d 457, Nev. 2010); Roberts v. State of Louisiana (396 So.2d 566, La. Ct. App. 1981); Creasy v. Rusk (730 N.E.2d 659, Ind. 2000); Robinson v. Lindsay (598 P.2d 392, Wash. 1979); Dakter v. Cavallino (363 Wis.2d 738, 2015). Graded: Resource Quiz (10 pts); Essay Quiz (100 pts, 1 hr closed book); Seminar (2 pts).'},
      {t:'concept', n:'Seminar 7 focus (Negligence, Duty & Standard of Care — Part 1): Negligence is the most important tort ("the big kahuna") and occupies most of the remaining modules. This seminar covers only the FIRST TWO elements of the prima facie case — the general duty of care owed, and the standard used to measure compliance with it (the reasonably prudent person). Causation and damages come later.'},
      {t:'rule', n:'Prima facie case of negligence: Professor Brown\'s six-part pedagogical breakdown is (1) duty, (2) standard of care, (3) breach, (4) cause in fact, (5) proximate cause, (6) damages. The standard "four-legged table" doctrinal statement is duty, breach, causation, and damages — causation already contains both cause in fact and proximate cause. You will NEVER be wrong stating negligence as duty/breach/causation/damages; Brown just pulls the standard of care out as its own step to sharpen the analysis.'},
      {t:'concept', n:'Why separate out the standard of care: The standard of care is the MEASURE of the duty owed — you cannot tell whether a duty was breached until you know what the duty demanded. Front-loading it ("a reasonably prudent person in the defendant\'s position should have…") tells you where to spend your intellectual energy and keeps the breach analysis from going "all over the place."'},
      {t:'concept', n:'Negligence vs. intentional torts — three differences: (1) Scope of conduct — intentional torts arise from a handful of specific acts; negligence can arise from countless acts ("grains of sand on the beach"). (2) Harm required — intentional-tort claims lie even without real harm (nominal damages); negligence REQUIRES actual harm. (3) Protected interest — intentional torts can rest on dignitary interests alone; negligence focuses on bodily harm or property damage (standalone emotional-harm claims exist only sometimes).'},
      {t:'rule', n:'The duty question asks two things (both trace to Palsgraf): (1) Does THIS defendant owe a duty to THIS plaintiff? and (2) If so, by what standard is that duty measured?'},
      {t:'rule', n:'Cardozo view of duty (majority): Duty is defined by reasonable foreseeability — one owes a duty only to reasonably foreseeable victims, the plaintiffs within the "zone of danger." If a reasonable person could not foresee this plaintiff being endangered, no duty is owed. [Brown: asterisk this — it gets tested.]'},
      {t:'rule', n:'Andrews view of duty: Duty is owed to the world at large to act reasonably — one who acts affirmatively owes a duty to everyone. Foreseeability does its work LATER, in the proximate-cause analysis (could you foresee harm to THIS person?), not at the duty stage. Both views agree on the core: the duty is to act reasonably, and certain relationships create special duties. [Brown: asterisk this — Cardozo vs. Andrews is classic exam fodder.]'},
      {t:'rule', n:'Standard of care — memorize verbatim and be able to recite it at will: "The duty is to act as a reasonably prudent person would under the same or similar circumstances." Failure to meet that standard is a breach of the duty, and negligence liability flows only where conduct has fallen below the relevant standard of care.'},
      {t:'concept', n:'The reasonably prudent person: a mythical creation of the common law — not any real person and not the juror. He is fallible and carries the ordinary weaknesses and frailties of the community, but he is charged with knowing common hazards (fire burns, water is wet, loaded firearms are dangerous) and with noticing what is open and apparent (a bald, treadless tire is dangerous). Because the benchmark is a COMMUNITY standard, a newcomer cannot plead unfamiliarity with locally known facts (e.g., known potholes on a road).'},
      {t:'exam', n:'Brown\'s "What would I do?" technique: for any negligence question, imagine you are the mythological reasonable person standing in the tortfeasor\'s shoes and ask "what would I do?" Work FORWARD — fix the duty and standard of care FIRST, then ask whether they were breached. Do NOT identify the bad act first and reverse-engineer a duty to fit it; racing to the conclusion makes you miss things. Take it step by tiny step.'},
      {t:'concept', n:'Objective vs. subjective standard: the reasonable-person standard is OBJECTIVE — what the mythological reasonable person would do (the law assumes you yourself are a reasonable person). A SUBJECTIVE standard would instead ask what this actual defendant personally believed was reasonable — which is NOT the test for the reasonable-person inquiry.'},
      {t:'rule', n:'When the standard "bends" — flexibility enters through the circumstances, but the standard stays objective. TAKEN INTO ACCOUNT: emergencies and the defendant\'s physical conditions. NOT taken into account: mental conditions and inexperience. So there is no "reasonable but inexperienced person," and an actor\'s mental disability (e.g., Alzheimer\'s) does not lower the standard — a point students often find harsh.'},
      {t:'rule', n:'Emergency doctrine: the standard of care does NOT change in an emergency; the jury simply asks whether the defendant acted as a reasonable person would have GIVEN the emergency. One caught in a sudden predicament is not expected to use the same judgment and reflection as a person with time to deliberate, and an error in judgment is not negligence if reasonable people could have made the same mistake under the same circumstances. Restatement: an emergency is an event requiring a decision within an extremely short time, so unusual the actor cannot draw on ready experience or community knowledge.'},
      {t:'rule', n:'Two limits on the emergency doctrine: (1) it is UNAVAILABLE where the defendant\'s own tortious conduct helped create the emergency; and (2) a defendant can still be negligent for failing to anticipate a FORESEEABLE emergency. Creating the emergency does not excuse you from your duty.'},
      {t:'case', n:'Posas v. Horton (emergency doctrine): Posas braked suddenly when a pedestrian pushing a stroller entered the intersection; Horton, following too closely, rear-ended her. Horton claimed a sudden emergency. Held: reversed and remanded — a sudden-emergency instruction is proper only when the actor is placed in peril through no negligence of their own and was otherwise exercising reasonable care. Horton created her own peril by following too closely, and a stopped car ahead is an ordinary, anticipated hazard of driving, not an emergency. Only Posas faced a genuine emergency (the pedestrian).'},
      {t:'exam', n:'Articulating duty + breach in an emergency problem (worked from Posas v. Horton): front-load the standard, then the breach. "A reasonably prudent person in Horton\'s position should have maintained a safe following distance and stayed aware of her surroundings; Horton breached that standard when she followed too closely." Multi-party wrinkle (chain collisions): ask who breached what duty to whom. Posas could herself claim the emergency against the pedestrian — it is not foreseeable that someone would push a stroller in front of a moving car — even though a following driver like Horton cannot.'},
      {t:'rule', n:'Physical conditions ARE built into the standard: because they are tangible and readily measured (height, loss of a limb, deafness, blindness), a defendant\'s physical conditions are accounted for — a blind person is not held to the standard of a sighted person. But accounting for the condition does not excuse the actor: a jury may find that a reasonable person WITH that condition would have taken greater precautions, and the condition can bar the activity entirely (a legally blind person should not drive — and cannot then ask whether a "reasonable blind driver" would have seen the hazard).'},
      {t:'rule', n:'Intoxication is NOT accounted for: a reasonable person is sober, so a voluntarily intoxicated defendant is held to the standard of a sober person — there is no "reasonable drunk." You cannot cause the very condition that impairs you and then claim its benefit.'},
      {t:'exam', n:'Essay reminder Brown gave for the intentional-torts quiz: do the analysis IN ORDER — start with a volitional act, then intent, then the specific tort, then check defenses. (Logistics he confirmed: there is the stated due date and then the "real" due date — late consequences only start 7 days after the posted due date, and that grace window applies across the modules and essays.)'}
    ,
      {t:'rule', n:'To establish a prima facie negligence case, the plaintiff must prove each element by a preponderance of the evidence (more than 50%): (1) duty/standard of care, (2) breach of duty, (3) cause-in-fact, (4) proximate cause (scope of liability), and (5) damages (a cognizable injury).'},
      {t:'concept', n:'The standard of care is the measure of the duty owed; it is the level of conduct demanded of a person to avoid negligence liability. It is often folded into the breach element, since negligence liability flows only where the defendant\'s conduct falls below the relevant standard of care.'},
      {t:'rule', n:'The most common standard of care requires the defendant to act as a reasonably prudent person would under the same or similar circumstances. Acting reasonably protects the defendant from liability; failing to do so constitutes unreasonable conduct and breach of duty.'},
      {t:'case', n:'In Vaughan v. Menlove (1837), where the defendant\'s negligently piled hay caught fire and destroyed the plaintiff\'s home, the court rejected the defendant\'s argument that he should escape liability if he acted honestly and to the best of his own judgment. It adopted an objective standard requiring the caution of a person of ordinary prudence, establishing the objective reasonable-person test.'},
      {t:'concept', n:'The objective standard is justified on three grounds: a purely subjective standard would be too difficult to apply given infinite gradations of ability; compensation (those most likely to cause harm should pay those they injure); and fairness, since the community is entitled to expect a certain level of behavior. Justice Holmes was a leading advocate, noting the law declines to take a person\'s individual \'personal equation\' into account.'},
      {t:'concept', n:'The reasonable person is a mythical common-law creation, not any real person or juror, and is not infallible but shares community frailties. The reasonable person is charged with knowledge of well-known dangers (e.g., that fire burns, loaded guns are dangerous, worn tires pose risks) and with noticing what is open and apparent, so a defendant\'s claimed ignorance or inexperience is irrelevant.'},
      {t:'rule', n:'Under the emergency doctrine, the jury may consider that the defendant acted under emergency conditions, because the reasonable-person standard already incorporates the circumstances. The standard of care does not change; rather, the defendant in a sudden predicament is not held to the same judgment and reflection as one with time, so an error in judgment is not negligent if reasonable persons could make the same mistake.'},
      {t:'rule', n:'The emergency doctrine is unavailable where the defendant\'s own tortious conduct helped create the emergency (e.g., a speeding driver forced to choose between hitting a child or a car cannot invoke it). A defendant can also be negligent for failing to anticipate foreseeable emergencies, such as a business anticipating fire or a pool operator anticipating drownings.'},
      {t:'rule', n:'A defendant\'s physical conditions (e.g., height, blindness, deafness, loss of a limb) are taken into account, so a blind defendant is compared to a reasonable blind person under like circumstances. This does not guarantee exoneration; a jury may still find the defendant negligent if a reasonable person with that condition would have taken greater precautions, and the condition may demand greater care or bar an activity entirely (e.g., a blind person driving).'},
      {t:'rule', n:'Intoxication is not excused. Because the reasonable person is deemed sober, a voluntarily intoxicated defendant is held to the standard of a sober person, not to that of a reasonable person at that level of intoxication.'},
      {t:'rule', n:'Virtually all U.S. jurisdictions make mental disability wholly irrelevant to negligence liability, holding the insane to a standard of sanity and people with cognitive disabilities to normal intelligence. The rationales are that mental disability is hard to measure and easily feigned, that the innocent plaintiff should be compensated, and that liability prompts guardians to take greater care.'},
      {t:'case', n:'In Breunig v. American Family Ins. Co., the Wisconsin Supreme Court allowed limited departure from the objective standard where a driver is suddenly overcome without forewarning by an incapacitating mental disability. The court still upheld the plaintiff\'s verdict because the jury could find the driver had notice of prior delusions, and Breunig is limited to cases of sudden mental disability.'},
      {t:'rule', n:'A defendant\'s superior skill, knowledge, or experience does not raise the standard above that of the reasonable person, but those superior qualities are relevant to the breach determination. A person who in fact has more than the minimum attention, skill, or knowledge must exercise those superior qualities reasonably under the circumstances.'},
      {t:'rule', n:'Children are not held to the adult reasonable-person standard but to that of a child of like age, experience, and intelligence under similar circumstances, a more subjective test allowing the jury to weigh the child\'s specific capacities. However, a child engaged in an adult or inherently dangerous activity (typically driving a motorized vehicle) is held to the wholly objective adult standard.'},
      {t:'concept', n:'The original \'reasonable man\' standard was criticized as latently gender-biased rather than truly generic; as Professor Leslie Bender noted, \'man is not generic except to other men.\' Most courts replaced it with \'reasonable person,\' though some feminist scholars argue this merely renames a male-defined norm, while a \'reasonable woman\' standard risks treating women\'s responses as abnormal or \'special.\''}
    ,
